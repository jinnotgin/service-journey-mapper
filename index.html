    const saveTimer = useRef(null);
    const lastSavedRef = useRef(null);
    const skipNextSaveRef = useRef(false);
    const undoStackRef = useRef([]);
    const redoStackRef = useRef([]);
    // Mirror of `journeys` kept in sync synchronously so export/save always
    // read the latest value (contentEditable onBlur fires before button clicks).
    const journeysRef = useRef([]);

    const syncHistoryState = useCallback(() => {
        setHistoryState({
            canUndo: undoStackRef.current.length > 0,
            canRedo: redoStackRef.current.length > 0,
        });
    }, []);

    const clearHistory = useCallback(() => {
        undoStackRef.current = [];
        redoStackRef.current = [];
        syncHistoryState();
    }, [syncHistoryState]);

    const applyJourneys = useCallback((nextJourneys) => {
        journeysRef.current = nextJourneys;
        setAllJourneys(nextJourneys);
        setJourneys(nextJourneys);
        setTab((cur) => nextJourneys.length ? Math.min(cur, nextJourneys.length - 1) : 0);
    }, []);

    const replaceJourneys = useCallback((next, { skipSave = false } = {}) => {
        if (skipSave) skipNextSaveRef.current = true;
        applyJourneys(typeof next === "function" ? next(journeysRef.current) : next);
    }, [applyJourneys]);

    const commitJourneys = useCallback((next) => {
        const prev = journeysRef.current;
        const resolved = typeof next === "function" ? next(prev) : next;
        if (resolved === prev) return;

        undoStackRef.current.push(prev);
        if (undoStackRef.current.length > HISTORY_LIMIT) undoStackRef.current.shift();
        redoStackRef.current = [];
        applyJourneys(resolved);
        syncHistoryState();
    }, [applyJourneys, syncHistoryState]);

    const undo = useCallback(() => {
        const previous = undoStackRef.current.pop();
        if (!previous) return;
        redoStackRef.current.push(journeysRef.current);
        if (redoStackRef.current.length > HISTORY_LIMIT) redoStackRef.current.shift();
        applyJourneys(previous);
        setSelected(null);
        syncHistoryState();
    }, [applyJourneys, syncHistoryState]);

    const redo = useCallback(() => {
        const next = redoStackRef.current.pop();
        if (!next) return;
        undoStackRef.current.push(journeysRef.current);
        if (undoStackRef.current.length > HISTORY_LIMIT) undoStackRef.current.shift();
        applyJourneys(next);
        setSelected(null);
        syncHistoryState();
    }, [applyJourneys, syncHistoryState]);

    const refreshProjects = useCallback(async () => {
        setProjects(await dbListProjects());
        setSharedMaps(await dbListSharedMaps());
    }, []);

    const currentName = projects.find((p) => p.id === currentId)?.name || standaloneName || null;

    const markCloudSaved = useCallback((meta = {}) => {
        const at = meta.updatedAt || Date.now();
        setLastSaved(at);
        // An ack the server echoes back to us carries OUR own name/clientId; show
        // "you" for our own edits, the editor's name for everyone else's.
        const myId = getPresenceIdentity().clientId;
        const mine = meta.updatedByClientId && meta.updatedByClientId === myId;
        setLastSavedBy(mine ? "you" : (meta.updatedByName || "you"));
        setSaveState("saved");
    }, []);

    const mirrorCloudState = useCallback(async (mapId, role, name, journeysData, meta = {}, localId = null) => {
        const at = meta.updatedAt || Date.now();
        if (localId != null) {
            await dbSaveCloudMirror(localId, journeysData, mapId, role, { ...meta, updatedAt: at });
        } else if (role !== "owner") {
            await dbUpsertSharedMap(mapId, { name, role, ...meta, updatedAt: at });
        }
        await refreshProjects();
    }, [refreshProjects]);

    // Live mirror context for the socket/op handlers. Keeping these in a ref
    // (instead of as effect deps) prevents the WebSocket from tearing down and
    // reconnecting on every project rename / standalone-name change.
    const cloudCtxRef = useRef({ mapId: null, role: null, name: null, localId: null });
    useEffect(() => {
        cloudCtxRef.current = {
            mapId: sync.mapId,
            role: sync.role,
            name: currentName || standaloneName || "Shared map",
            localId: currentId,
        };
    }, [sync.mapId, sync.role, currentName, standaloneName, currentId]);

    // Mirror a server-driven update using the current context ref. Stable across
    // renames so the socket effect needn't depend on name/id state.
    const mirrorFromSocket = useCallback((journeysData, meta) => {
        const ctx = cloudCtxRef.current;
        mirrorCloudState(ctx.mapId, ctx.role, ctx.name, journeysData, meta, ctx.localId)
            .catch((err) => console.warn("Cloud mirror update failed.", err));
    }, [mirrorCloudState]);

    const announcePresence = useCallback(() => {
        const ws = wsRef.current;
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const me = getPresenceIdentity();
        try {
            ws.send(JSON.stringify({ t: "presence.update", clientId: me.clientId, name: me.name, color: me.color }));
        } catch { /* socket going away; reconnect will retry */ }
    }, []);

    const renameProfile = useCallback((name) => {
        const next = setPresenceName(name);
        setProfile(next);
        announcePresence();
    }, [announcePresence]);

    // Enable sync: mint a cloud map from the current journeys, keep the local
    // (Dexie) project as a mirror, and switch the URL to ?map=<id>. Returns the
    // share tokens (shown to the user once).
    const enableSync = useCallback(async () => {
        if (sync.status === "enabling" || sync.status === "synced") return null;
        setSync((s) => ({ ...s, status: "enabling", error: null }));
        try {
            const { mapId, version, tokens } = await apiCreateMap({
                name: currentName || "Untitled",
                journeys: journeysRef.current,
            });
            setMapToken(mapId, tokens.owner);
            syncVersionRef.current = version;
            setSync({ mapId, role: "owner", status: "synced", error: null });
            if (currentId != null) {
                await dbMarkProjectCloud(currentId, mapId, "owner", { version, updatedAt: Date.now(), updatedByName: getPresenceIdentity().name });
                await refreshProjects();
            }
            markCloudSaved({ updatedAt: Date.now(), updatedByName: getPresenceIdentity().name });
            writeMapRoute(mapId, { replace: true });
            return { mapId, tokens };
        } catch (err) {
            setSync((s) => ({ ...s, status: "error", error: err.message }));
            return null;
        }
    }, [sync.status, currentName, currentId, refreshProjects, markCloudSaved]);

    // Stop sharing: called after the server-side delete succeeds and the token
    // has already been removed from localStorage. Closes the WS, resets sync
    // state, and navigates back to the local project (if one exists) or the library.
    const stopSync = useCallback(() => {
        const localId = currentId;
        setSync({ mapId: null, role: null, status: "off", error: null });
        setPeers([]);
        if (localId != null) {
            writeRoute(localId, { replace: true });
        } else {
            writeMapRoute(null, { replace: true });
            setView("library");
        }
    }, [currentId]);

    useEffect(() => {
        document.title = currentName && view === "project"
            ? `${currentName} - Lanescape`
            : "Lanescape - Service Journey Mapper";
    }, [currentName, view]);

    // Hydrate + mount a shared cloud map once access is granted. `session` is the
    // password session (or null when the map has no password / caller is owner).
    // Shared by the init path and the post-password-prompt path (Phase 5).
    const mountCloudMap = useCallback(async (mapId, token, session) => {
        const data = await apiGetMap(mapId, token, session);
        const hydrated = hydrate(data.journeys || []);
        const linkedProject = await dbFindProjectByCloudMap(mapId);
        let localId = linkedProject?.id ?? null;
        // Owners always get a local "Your projects" mirror — e.g. when opening
        // their own map on a second device that has no local copy yet. Non-owners
        // stay in the lighter "Shared with me" list (no local project created).
        if (localId == null && data.role === "owner") {
            localId = await dbCreateProject(data.name || "Untitled project", hydrated);
            await dbMarkProjectCloud(localId, mapId, "owner", data);
        }
        setCurrentId(localId);
        setStandaloneName(data.name || "Shared map");
        syncVersionRef.current = data.version || 0;
        setSync({ mapId, role: data.role, status: "synced", error: null });
        const isViewer = data.role === "viewer";
        setViewOnly(isViewer);
        setEditMode(!isViewer);
        replaceJourneys(hydrated, { skipSave: true });
        clearHistory();
        setView("project");
        markCloudSaved(data);
        await mirrorCloudState(mapId, data.role, data.name || "Shared map", hydrated, data, localId);
        writeMapRoute(mapId, { replace: true });
        setReady(true);
    }, [clearHistory, markCloudSaved, mirrorCloudState, replaceJourneys]);

    // Submit a password for a gated map (Phase 5). On success store the session
    // and mount the map; on failure return an error string for the modal to show.
    const submitPassword = useCallback(async (password) => {
        if (!passwordGate) return null;
        const { mapId, token } = passwordGate;
        try {
            const res = await apiAccessMap(mapId, token, password);
            if (!res.ok) return "Incorrect password. Please try again.";
            if (res.session) setMapSession(mapId, res.session);
            await mountCloudMap(mapId, token, res.session || null);
            setPasswordGate(null);
            return null;
        } catch (err) {
            return err.message || "Could not open this map.";
        }
    }, [passwordGate, mountCloudMap]);

    // Dismiss the password prompt → fall back to the library.
    const cancelPasswordGate = useCallback(() => {
        setPasswordGate(null);
        setSync({ mapId: null, role: null, status: "off", error: null });
        writeMapRoute(null, { replace: true });
        setView("library");
        setReady(true);
    }, []);

    // ── Init: load project list + reopen last project ──
    useEffect(() => {
        (async () => {
            const embedded = embeddedProject();
            if (embedded) {
                setProjects([]);
                setCurrentId(null);
                setStandaloneName(embedded.name || "Standalone Service Journey");
                setViewOnly(true);
                setView("project");
                setEditMode(false);
                replaceJourneys(hydrate(embedded.journeys || []), { skipSave: true });
                clearHistory();
                setLastSaved(embedded.lastSavedAt ? new Date(embedded.lastSavedAt).getTime() : null);
                setLastSavedBy(null);
                setSaveState("idle");
                setReady(true);
                return;
            }

            // Open a shared cloud map from ?map=<id>. A ?token= in the URL (from
            // a freshly pasted share link) is consumed into localStorage, then
            // stripped from the address bar.
            const mapId = routeMapId();
            if (mapId) {
                const urlToken = new URLSearchParams(window.location.search).get("token");
                if (urlToken) setMapToken(mapId, urlToken);
                const token = getMapToken(mapId);
                try {
                    // Phase 5: probe access first. Owners + non-password maps return
                    // passwordRequired:false (no session). A password-gated map for a
                    // non-owner returns passwordRequired:true → show the prompt; any
                    // session already held (this tab) is reused so a reload skips it.
                    const existingSession = getMapSession(mapId);
                    const access = await apiAccessMap(mapId, token, undefined);
                    if (access.passwordRequired && !existingSession) {
                        // Strip ?token= from the URL before prompting (don't leak it
                        // in the address bar) but keep ?map=.
                        writeMapRoute(mapId, { replace: true });
                        setPasswordGate({ mapId, token });
                        setReady(true); // render the gate; mountCloudMap runs on success
                        return;
                    }
                    await mountCloudMap(mapId, token, access.session || existingSession || null);
                    return;
                } catch (err) {
                    // A stale/expired session (e.g. the owner changed the password)
                    // makes hydrate 401 → re-prompt instead of bouncing to library.
                    if (err && err.passwordRequired) {
                        setMapSession(mapId, null);
                        writeMapRoute(mapId, { replace: true });
                        setPasswordGate({ mapId, token });
                        setReady(true);
                        return;
                    }
                    setSync({ mapId: null, role: null, status: "error", error: err.message });
                    writeMapRoute(null, { replace: true });
                    // fall through to the library
                }
            }

            // Land on the library; the user picks (or creates) a project to enter.
            const list = await dbListProjects();
            setProjects(list);
            setSharedMaps(await dbListSharedMaps());
            const routedId = routeProjectId();
            if (routedId != null) {
                const p = await dbGetProject(routedId);
                if (p) {
                    if (p.cloudMapId && getMapToken(p.cloudMapId)) {
                        await mountCloudMap(p.cloudMapId, getMapToken(p.cloudMapId), getMapSession(p.cloudMapId));
                        return;
                    } else {
                        setCurrentId(routedId);
                        replaceJourneys(hydrate(p.journeys || []), { skipSave: true });
                        clearHistory();
                        setLastSaved(p.updatedAt || null);
                        setLastSavedBy(null);
                        setTab(0);
                        setEditMode(true);
                        setViewOnly(false);
                        setView("project");
                        localStorage.setItem(LAST_KEY, String(routedId));
                        writeRoute(routedId, { replace: true });
                        setReady(true);
                        return;
                    }
                }
                writeRoute(null, { replace: true });
            }
            setView("library");
            setReady(true);
        })();
    }, [clearHistory, mountCloudMap, replaceJourneys]);

    // Keep native browser Back/Forward in sync with the in-app project view.
    useEffect(() => {
        const onPopState = () => {
            // Browser back doesn't blur the focused cell (popstate is same-document),
            // so flush any in-flight cell draft into state before we swap views.
            document.activeElement?.blur?.();
            (async () => {
                const routedMapId = routeMapId();
                if (routedMapId) {
                    const token = getMapToken(routedMapId);
                    if (token) await mountCloudMap(routedMapId, token, getMapSession(routedMapId));
                    return;
                }
                const routedId = routeProjectId();
                if (routedId == null) {
                    setSelected(null);
                    setView("library");
                    await refreshProjects();
                    return;
                }
                const p = await dbGetProject(routedId);
                if (!p) {
                    writeRoute(null, { replace: true });
                    setSelected(null);
                    setView("library");
                    await refreshProjects();
                    return;
                }
                if (p.cloudMapId && getMapToken(p.cloudMapId)) {
                    await mountCloudMap(p.cloudMapId, getMapToken(p.cloudMapId), getMapSession(p.cloudMapId));
                    return;
                }
                setCurrentId(routedId);
                replaceJourneys(hydrate(p.journeys || []), { skipSave: true });
                clearHistory();
                setLastSaved(p.updatedAt || null);
                setLastSavedBy(null);
                setTab(0);
                setEditMode(true);
                setViewOnly(false);
                setSelected(null);
                setView("project");
                localStorage.setItem(LAST_KEY, String(routedId));
                await refreshProjects();
            })();
        };
        window.addEventListener("popstate", onPopState);
        return () => window.removeEventListener("popstate", onPopState);
    }, [clearHistory, mountCloudMap, refreshProjects, replaceJourneys]);

    // ── Autosave current project (debounced) ──
    useEffect(() => {
        if (!ready || currentId == null) return;
        if (skipNextSaveRef.current) {
            skipNextSaveRef.current = false;
            setSaveState("saved");
            return;
        }
        setSaveState("saving");
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => {
            dbSaveJourneys(currentId, journeysRef.current)
                .then(refreshProjects)
                .then(() => { setSaveState("saved"); setLastSaved(Date.now()); setLastSavedBy("you"); });
        }, 600);
        return () => clearTimeout(saveTimer.current);
    }, [journeys, currentId, ready, refreshProjects]);

    // ── Collaborative sync: live WebSocket channel (Phase 2) ──
    // Apply a remote whole-document payload (doc.sync / doc.update / doc.reject):
    // adopt its version and replace journeys without re-saving or re-pushing.
    const applyRemoteDoc = useCallback((parsed) => {
        if (!parsed || typeof parsed.version !== "number") return;
        syncVersionRef.current = parsed.version;
        skipNextPushRef.current = true;
        const hydrated = hydrate(parsed.journeys || []);
        replaceJourneys(hydrated, { skipSave: true });
        markCloudSaved(parsed);
        mirrorFromSocket(hydrated, parsed);
    }, [markCloudSaved, mirrorFromSocket, replaceJourneys]);

    // ── Phase 9: emit an op over the socket for a local optimistic change ──
    // The local immutable updater has already mutated `journeys`; this only sends
    // the matching op. Structural ops carry the baseVersion the local state was
    // built on (the server accepts iff it still matches). cell.set is not
    // version-gated. We never apply our own op inbound (the server broadcasts it
    // only to OTHER clients), so no echo guard is needed for ops — the
    // skipNextPushRef guard is only for the legacy whole-doc push effect.
    const STRUCTURAL_PREFIXES = ["row.", "column.", "stage.", "substage.", "subjourney.", "journey."];
    const emitOp = useCallback((op) => {
        if (sync.status !== "synced" || sync.role === "viewer") return;
        const ws = wsRef.current;
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const structural = STRUCTURAL_PREFIXES.some((p) => op.t.startsWith(p));
        setSaveState("saving");
        // Bump our local version optimistically for a structural op so a rapid
        // burst of structural ops carries increasing baseVersions (the server
        // serializes them; a stale one just triggers a doc.reject resync).
        const frame = structural
            ? { ...op, baseVersion: syncVersionRef.current }
            : { ...op, ts: op.ts ?? Date.now() };
        try { ws.send(JSON.stringify(frame)); } catch { /* socket going away; reconnect resyncs */ }
        if (structural) syncVersionRef.current += 1;
    }, [sync.status, sync.role]);
    const emitOpRef = useRef(emitOp);
    useEffect(() => { emitOpRef.current = emitOp; }, [emitOp]);

    const commitOp = useCallback((op, afterCommit) => {
        const next = applyOp(journeysRef.current, op);
        if (!next) return false;
        commitJourneys(next);
        afterCommit?.(next);
        emitOpRef.current(op);
        return true;
    }, [commitJourneys]);

    const cellIdsByRow = useCallback((journey, leavesPerRow = 1) => {
        const ids = {};
        for (const sj of journey?.subJourneys || []) {
            for (const row of sj.rows || []) {
                if (!row.id) continue;
                ids[row.id] = leavesPerRow === 1
                    ? newId()
                    : Array.from({ length: leavesPerRow }, newId);
            }
        }
        return ids;
    }, []);

    const afterIdFromMovedOrder = useCallback((items, fromIdx, toIdx) => {
        const moved = moveArrayRange(items || [], fromIdx, 1, toIdx);
        if (moved === items) return undefined;
        const id = items?.[fromIdx]?.id;
        const at = moved.findIndex((x) => x.id === id);
        return at <= 0 ? null : moved[at - 1]?.id;
    }, []);

    // Apply an INBOUND remote op (cell.set or a structural op) by id to the local
    // journeys. Structural ops also adopt the new server `version`. If applyOp
    // can't apply it (unknown id), do nothing — the server's doc.reject backstop
    // will follow. Sets skipNextPushRef so the legacy push effect stays quiet.
    const applyRemoteOp = useCallback((op) => {
        const structural = STRUCTURAL_PREFIXES.some((p) => op.t.startsWith(p));
        const next = applyOp(journeysRef.current, op);
        if (!next) return; // unknown id; wait for doc.reject resync
        if (structural && typeof op.version === "number") syncVersionRef.current = op.version;
        skipNextPushRef.current = true;
        replaceJourneys(next, { skipSave: true });
        markCloudSaved(op);
        // cell.set frames carry no version (content is commutative); fall back to
        // the live version so the stored cloudVersion isn't clobbered to 0.
        const meta = typeof op.version === "number" ? op : { ...op, version: syncVersionRef.current };
        mirrorFromSocket(next, meta);
    }, [markCloudSaved, mirrorFromSocket, replaceJourneys]);

    // Defer a remote cell.set only when it targets the cell we are actively
    // editing; a different cell can apply immediately (the Phase 9 headline win).
    const applyOrDeferRemoteOp = useCallback((op) => {
        if (op.t === "cell.set" && op.cellId && op.cellId === editingCellIdRef.current) {
            const el = document.activeElement;
            if (el && (el.isContentEditable || el.tagName === "INPUT" || el.tagName === "TEXTAREA")) {
                const onBlur = () => { el.removeEventListener("blur", onBlur); applyRemoteOp(op); };
                el.addEventListener("blur", onBlur, { once: true });
                return;
            }
        }
        applyRemoteOp(op);
    }, [applyRemoteOp]);

    // If a remote payload arrives while the user is actively editing a grid
    // cell, stash it and apply on the next blur (mirrors the popstate dance).
    const applyOrDeferRemote = useCallback((parsed) => {
        const el = document.activeElement;
        const editing = el && (el.isContentEditable || el.tagName === "INPUT" || el.tagName === "TEXTAREA");
        if (editing) {
            pendingRemoteRef.current = parsed; // newest wins; applied on blur
            const onBlur = () => {
                el.removeEventListener("blur", onBlur);
                const pending = pendingRemoteRef.current;
                pendingRemoteRef.current = null;
                if (pending) applyRemoteDoc(pending);
            };
            el.addEventListener("blur", onBlur, { once: true });
        } else {
            applyRemoteDoc(parsed);
        }
    }, [applyRemoteDoc]);

    // ── Cell locking (Phase 8): soft advisory locks ──
    // True only when locking should be active at all. When not synced (or not an
    // editor in edit mode) locking is fully inert — zero behavior change vs today.
    const lockingActive = sync.status === "synced" && editMode && sync.role !== "viewer";

    // Map cellId -> {clientId,name,color} of the PEER holding it, EXCLUDING our
    // own clientId (our own lock must never lock us out of our own cell).
    const lockedByPeer = useMemo(() => {
        const myId = getPresenceIdentity().clientId;
        const m = new Map();
        for (const l of locks) {
            if (!l || !l.cellId || l.clientId === myId) continue;
            m.set(l.cellId, { clientId: l.clientId, name: l.name, color: l.color });
        }
        return m;
    }, [locks]);

    // Send a lock.* frame if the socket is OPEN and locking is active.
    const sendLock = useCallback((type, cellId) => {
        if (!lockingActive || !cellId) return;
        const ws = wsRef.current;
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        try { ws.send(JSON.stringify({ t: type, cellId })); } catch { /* socket going away */ }
    }, [lockingActive]);

    // Acquire on edit-intent (cell editable focus / tags-cell entering edit).
    // Release any lock we still hold on a different cell first (e.g. moving from a
    // tags cell, which has no blur, straight to another cell).
    const acquireLock = useCallback((cellId) => {
        if (!lockingActive || !cellId) return;
        const prev = editingCellIdRef.current;
        if (prev && prev !== cellId) sendLock("lock.release", prev);
        editingCellIdRef.current = cellId;
        sendLock("lock.acquire", cellId);
    }, [lockingActive, sendLock]);

    // Release on blur / Escape / tab hide / leaving the map.
    const releaseLock = useCallback(() => {
        const cellId = editingCellIdRef.current;
        editingCellIdRef.current = null;
        if (cellId) sendLock("lock.release", cellId);
    }, [sendLock]);

    // Heartbeat while editing so peers / the server keep the lock fresh (~5s).
    useEffect(() => {
        if (!lockingActive) return;
        const id = setInterval(() => {
            const cellId = editingCellIdRef.current;
            if (cellId) sendLock("lock.heartbeat", cellId);
        }, 5000);
        return () => clearInterval(id);
    }, [lockingActive, sendLock]);

    // Release the lock (and blur the cell) when the tab is hidden, so a lock is
    // not held while the editor is away. Also covers Cmd-Tab / minimise.
    useEffect(() => {
        const onHide = () => {
            if (document.visibilityState !== "hidden") return;
            const el = document.activeElement;
            if (el && el.isContentEditable) { try { el.blur(); } catch { /* ignore */ } }
            releaseLock();
        };
        document.addEventListener("visibilitychange", onHide);
        return () => document.removeEventListener("visibilitychange", onHide);
    }, [releaseLock]);

    // Open/maintain the socket while synced; reconnect with capped backoff.
    useEffect(() => {
        if (sync.status !== "synced" || !sync.mapId) return;
        const mapId = sync.mapId;
        const token = getMapToken(mapId);
        const session = getMapSession(mapId); // Phase 5: proof of password (if any)
        let closed = false;
        let retries = 0;
        let reconnectTimer = null;

        const connect = () => {
            if (closed) return;
            const wsBase = SYNC_API_BASE.replace(/^http/, "ws");
            const url = `${wsBase}/api/maps/${encodeURIComponent(mapId)}/sync?token=${encodeURIComponent(token || "")}${session ? `&session=${encodeURIComponent(session)}` : ""}`;
            let ws;
            try { ws = new WebSocket(url); } catch { scheduleReconnect(); return; }
            wsRef.current = ws;
            ws.onopen = () => {
                retries = 0;
                // Announce our presence so peers see us (and we get the roster).
                announcePresence();
            };
            ws.onmessage = (ev) => {
                let parsed;
                try { parsed = JSON.parse(ev.data); } catch { return; }
                // doc.sync, doc.update and doc.reject all carry {version, journeys}
                // and are applied the same way (reject also adopts server version).
                if (parsed.t === "doc.sync" || parsed.t === "doc.update" || parsed.t === "doc.reject") {
                    applyOrDeferRemote(parsed);
                } else if (parsed.t === "presence" && Array.isArray(parsed.peers)) {
                    const myId = getPresenceIdentity().clientId;
                    setPeers(parsed.peers.filter((p) => p && p.clientId && p.clientId !== myId));
                } else if (parsed.t === "locks" && Array.isArray(parsed.locks)) {
                    setLocks(parsed.locks);
                } else if (parsed.t === "lock.denied") {
                    // A peer already holds the cell we just tried to edit: abandon
                    // (blur the active cell). The incoming `locks` frame marks it locked.
                    if (editingCellIdRef.current === parsed.cellId) {
                        editingCellIdRef.current = null;
                        const el = document.activeElement;
                        if (el && el.isContentEditable) { try { el.blur(); } catch { /* ignore */ } }
                    }
                } else if (parsed.t === "cell.set" || STRUCTURAL_PREFIXES.some((p) => String(parsed.t || "").startsWith(p))) {
                    applyOrDeferRemoteOp(parsed);
                } else if (parsed.t === "op.ack" || parsed.t === "doc.ack") {
                    if (typeof parsed.version === "number") syncVersionRef.current = parsed.version;
                    markCloudSaved(parsed);
                    const meta = typeof parsed.version === "number" ? parsed : { ...parsed, version: syncVersionRef.current };
                    mirrorFromSocket(journeysRef.current, meta);
                }
            };
            ws.onclose = () => { if (wsRef.current === ws) { wsRef.current = null; setPeers([]); setLocks([]); } scheduleReconnect(); };
            ws.onerror = () => { try { ws.close(); } catch { /* ignore */ } };
        };

        const scheduleReconnect = () => {
            if (closed) return;
            const delay = Math.min(1000 * 2 ** retries, 15000);
            retries += 1;
            clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(connect, delay);
        };

        connect();
        return () => {
            closed = true;
            clearTimeout(reconnectTimer);
            const ws = wsRef.current;
            wsRef.current = null;
            setPeers([]); // leaving this map; drop the roster
            setLocks([]); // and the lock roster
            editingCellIdRef.current = null;
            if (ws) { ws.onclose = null; ws.onerror = null; try { ws.close(); } catch { /* ignore */ } }
        };
    }, [announcePresence, applyOrDeferRemote, applyOrDeferRemoteOp, markCloudSaved, mirrorFromSocket, sync.mapId, sync.status]);

    // Phase 9 replaces the old "push the entire journeys array on every change"
    // behavior with explicit op emits from the edit handlers. The Worker still
    // accepts doc.push from older clients, but this client no longer sends it for
    // ordinary edits; undo/redo remain local until a future snapshot-diff pass.
    useEffect(() => {
        if (!ready) return;
        if (skipNextPushRef.current) { skipNextPushRef.current = false; return; }
        // no-op by design; local mutation handlers call emitOpRef.current(op).
    }, [journeys, ready, sync.status, sync.role]);

    // ── Load data (JSON array / exported project) ──
    const loadFromText = useCallback(async (text, mode = "replace", options = {}) => {
        const parsed = parseInput(text);
        const data = hydrate(parsed.journeys);
        if (!data.length) throw new Error("No valid journey data found.");
        const baseId = options.forceNew ? null : currentId;
        let id = baseId;
        if (id == null) {
            const name = parsed.name || defaultName(projects);
            id = await dbCreateProject(name, data);
            setCurrentId(id);
            localStorage.setItem(LAST_KEY, String(id));
            writeRoute(id);
        }
        if (baseId == null) {
            replaceJourneys(data);
            clearHistory();
            setTab(0);
            setEditMode(true);
            setView("project");
        } else if (mode === "append") {
            const at = journeysRef.current.length;
            commitJourneys((prev) => [...prev, ...withUniqueSheetTitles(prev, data)]);
            setTab(at);
        } else if (mode === "overwriteAffected") {
            const byTitle = new Map(data.filter((j) => j.title).map((j) => [j.title, j]));
            let firstChanged = -1;
            commitJourneys((prev) => {
                const existingTitles = new Set(prev.map((j) => j.title).filter(Boolean));
                const replaced = prev.map((j, i) => {
                    if (!byTitle.has(j.title)) return j;
                    if (firstChanged < 0) firstChanged = i;
                    return byTitle.get(j.title);
                });
                const newSheets = data.filter((j) => !j.title || !existingTitles.has(j.title));
                return [...replaced, ...newSheets];
            });
            if (firstChanged >= 0) setTab(firstChanged);
        } else {
            commitJourneys(data);
            setTab(0);
        }
        if (options.updateProjectName && parsed.name?.trim() && id != null) {
            await dbRenameProject(id, parsed.name.trim());
        }
        await refreshProjects();
        console.log(`%c✅ Loaded ${data.length} service journey(s)`, "color:#2e7d32;font-weight:bold;font-size:14px");
    }, [clearHistory, commitJourneys, currentId, projects, refreshProjects, replaceJourneys]);

    // ── Immutable updaters ──
    const editJourney = useCallback((jIdx, fn) => {
        commitJourneys((prev) => {
            const j = prev[jIdx];
            if (!j) return prev;
            const nj = fn(j);
            if (nj === j) return prev;
            const next = prev.slice();
            next[jIdx] = nj;
            return next;
        });
    }, [commitJourneys]);

    // Mutate a single cell via `fn(cellCopy) -> cell`.
    const editCell = useCallback((jIdx, sjIdx, rowIdx, cellIdx, fields) => {
        const cell = journeysRef.current[jIdx]?.subJourneys?.[sjIdx]?.rows?.[rowIdx]?.cells?.[cellIdx];
        if (!cell?.id) return;
        const changed = Object.keys(fields || {}).some((k) => JSON.stringify(cell[k]) !== JSON.stringify(fields[k]));
        if (!changed) return;
        commitOp({ t: "cell.set", cellId: cell.id, fields, ts: Date.now() });
    }, [commitOp]);

    // ── Cell handlers ──
    const handleCellEdit = useCallback((jIdx, sjIdx, rowIdx, cellIdx, html) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, { html }), [editCell]);
    const handleCellTags = useCallback((jIdx, sjIdx, rowIdx, cellIdx, tags) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, { tags }), [editCell]);
    const handleCellMode = useCallback((jIdx, sjIdx, rowIdx, cellIdx, mode) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, { mode, ...(mode === "tags" ? { tags: journeysRef.current[jIdx]?.subJourneys?.[sjIdx]?.rows?.[rowIdx]?.cells?.[cellIdx]?.tags || [] } : {}) }), [editCell]);
    const handleCellAlign = useCallback((jIdx, sjIdx, rowIdx, cellIdx, align) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, { align }), [editCell]);

    // ── Row handlers ──
    const handleRowAction = useCallback((jIdx, sjIdx, rowIdx, action, value) => {
        const j = journeysRef.current[jIdx];
        const sj = j?.subJourneys?.[sjIdx];
        const row = sj?.rows?.[rowIdx];
        if (!j || !sj || !row) return;
        if (action === "delete") return commitOp({ t: "row.delete", rowId: row.id });
        if (action === "moveTo") {
            const toRowIdx = Math.max(0, Math.min(value?.toRowIdx ?? rowIdx, sj.rows.length));
            const afterRowId = afterIdFromMovedOrder(sj.rows, rowIdx, toRowIdx);
            if (afterRowId === undefined) return;
            return commitOp({ t: "row.move", rowId: row.id, afterRowId });
        }
        if (action === "insertAbove" || action === "insertBelow") {
            const afterRowId = action === "insertAbove"
                ? (rowIdx > 0 ? sj.rows[rowIdx - 1]?.id : null)
                : row.id;
            return commitOp({ t: "row.insert", subJourneyId: sj.id, afterRowId, row: newRow(totalLeaves(j.stages)) });
        }
        if (action === "type") {
            if (row.rowType === value) return;
            return commitOp({ t: "row.setType", rowId: row.id, rowType: value });
        }
        if (action === "color") {
            if ((row.customColor || undefined) === (value || undefined)) return;
            return commitOp({ t: "row.setColor", rowId: row.id, color: value || undefined });
        }
        if (action === "label") {
            if (row.laneLabel === value) return;
            return commitOp({ t: "row.setLabel", rowId: row.id, label: value });
        }
    }, [afterIdFromMovedOrder, commitOp]);

    const handleAddRow = useCallback((jIdx, sjIdx) => {
        const j = journeysRef.current[jIdx];
        const sj = j?.subJourneys?.[sjIdx];
        if (!j || !sj) return;
        const rows = sj.rows || [];
        commitOp({ t: "row.insert", subJourneyId: sj.id, afterRowId: rows.length ? rows[rows.length - 1].id : null, row: newRow(totalLeaves(j.stages)) });
    }, [commitOp]);

    // ── Stage / sub-stage (column) handlers ──
    const handleStageAction = useCallback((jIdx, action, payload) => {
        const j = journeysRef.current[jIdx];
        if (!j) return;
        const stages = j.stages || [];
        if (action === "addStage") {
            const afterStageId = payload.stageIdx != null ? stages[payload.stageIdx]?.id : (stages.length ? stages[stages.length - 1].id : null);
            const stage = { id: newId(), num: nextStageNum(stages), title: "New Stage", subStages: [] };
            return commitOp({ t: "stage.insert", journeyId: j.id, afterStageId, stage, cellIds: cellIdsByRow(j, leafCount(stage)) });
        }
        if (action === "deleteStage") {
            const { stageIdx } = payload;
            if (stages.length <= 1) { alert("A journey needs at least one stage."); return; }
            const stage = stages[stageIdx];
            if (!stage) return;
            return commitOp({ t: "stage.delete", journeyId: j.id, stageId: stage.id });
        }
        if (action === "moveStage") {
            const { fromIdx } = payload;
            const toIdx = Math.max(0, Math.min(payload.toIdx, stages.length));
            const stage = stages[fromIdx];
            if (!stage) return;
            const afterStageId = afterIdFromMovedOrder(stages, fromIdx, toIdx);
            if (afterStageId === undefined) return;
            return commitOp({ t: "stage.move", journeyId: j.id, stageId: stage.id, afterStageId });
        }
        if (action === "addSubStage") {
            const { stageIdx, subIdx } = payload;
            const stage = stages[stageIdx];
            if (!stage) return;
            const subs = stage.subStages || [];
            const subStage = { id: newId(), title: "New" };
            const afterSubStageId = subIdx != null
                ? (subs[subIdx]?.id ?? null)
                : (subs.length ? subs[subs.length - 1].id : null);
            return commitOp({
                t: "substage.insert",
                journeyId: j.id,
                stageId: stage.id,
                afterSubStageId,
                subStage,
                cellIds: cellIdsByRow(j, 1),
            });
        }
        if (action === "deleteSubStage") {
            const { stageIdx, subIdx } = payload;
            const stage = stages[stageIdx];
            const subStage = stage?.subStages?.[subIdx];
            if (!stage || !subStage) return;
            return commitOp({ t: "substage.delete", journeyId: j.id, stageId: stage.id, subStageId: subStage.id });
        }
        if (action === "moveSubStage") {
            const { stageIdx, fromIdx } = payload;
            const stage = stages[stageIdx];
            const subs = stage?.subStages || [];
            const subStage = subs[fromIdx];
            if (!stage || !subStage || subs.length <= 1) return;
            const toIdx = Math.max(0, Math.min(payload.toIdx, subs.length));
            const afterSubStageId = afterIdFromMovedOrder(subs, fromIdx, toIdx);
            if (afterSubStageId === undefined) return;
            return commitOp({ t: "substage.move", journeyId: j.id, stageId: stage.id, subStageId: subStage.id, afterSubStageId });
        }
        if (action === "renameStage") {
            const stage = stages[payload.stageIdx];
            if (!stage || stage.title === payload.value) return;
            return commitOp({ t: "stage.setLabel", stageId: stage.id, label: payload.value });
        }
        if (action === "renumberStage") {
            const stage = stages[payload.stageIdx];
            if (!stage) return;
            const raw = (payload.value ?? "").trim();
            const num = raw === "" ? null : (Number.isFinite(Number(raw)) ? Number(raw) : raw);
            if (stage.num === num) return;
            return commitOp({ t: "stage.setNum", stageId: stage.id, num });
        }
        if (action === "renameSubStage") {
            const stage = stages[payload.stageIdx];
            const subStage = stage?.subStages?.[payload.subIdx];
            if (!stage || !subStage || subStage.title === payload.value) return;
            return commitOp({ t: "substage.setLabel", stageId: stage.id, subStageId: subStage.id, label: payload.value });
        }
        if (action === "setStageLabel") {
            if (j.stageLabel === payload.value) return;
            return commitOp({ t: "journey.setStageLabel", journeyId: j.id, label: payload.value });
        }
    }, [afterIdFromMovedOrder, cellIdsByRow, commitOp]);

    // ── Project actions ──
    const openProject = useCallback(async (id) => {
        const p = await dbGetProject(id);
        if (!p) return;
        if (p.cloudMapId && getMapToken(p.cloudMapId)) {
            await mountCloudMap(p.cloudMapId, getMapToken(p.cloudMapId), getMapSession(p.cloudMapId));
            return;
        }
        setCurrentId(id);
        replaceJourneys(hydrate(p.journeys || []), { skipSave: true });
        clearHistory();
        setLastSaved(p.updatedAt || null);
        setLastSavedBy(null);
        setTab(0);
        setEditMode(true);
        setViewOnly(false);
        setSync({ mapId: null, role: null, status: "off", error: null });
        setView("project");
        localStorage.setItem(LAST_KEY, String(id));
        writeRoute(id);
    }, [clearHistory, mountCloudMap, replaceJourneys]);

    const openSharedMap = useCallback(async (mapId) => {
        const token = getMapToken(mapId);
        if (!token) return;
        await mountCloudMap(mapId, token, getMapSession(mapId));
    }, [mountCloudMap]);

    const goLibrary = useCallback(() => {
        setSelected(null);
        setView("library");
        writeRoute(null);
        refreshProjects();
    }, [refreshProjects]);

    const doDeleteProject = useCallback(async (id) => {
        await dbDeleteProject(id);
        if (id === currentId) {
            setCurrentId(null);
            replaceJourneys([]);
            clearHistory();
            setTab(0);
            localStorage.removeItem(LAST_KEY);
            setView("library");
            writeRoute(null, { replace: true });
        }
        await refreshProjects();
    }, [clearHistory, currentId, refreshProjects, replaceJourneys]);

    const deleteProject = useCallback((id, name) => {
        setConfirmState({
            title: "Delete project",
            message: `Delete “${name}”? This permanently removes its saved journeys and can't be undone.`,
            confirmLabel: "Delete project",
            danger: true,
            onConfirm: () => doDeleteProject(id),
        });
    }, [doDeleteProject]);

    const renameProject = useCallback(async (id, name) => {
        if (!name || !name.trim()) return;
        await dbRenameProject(id, name.trim());
        await refreshProjects();
    }, [refreshProjects]);

    const renameCurrentProject = useCallback(async (name) => {
        if (currentId == null || !name.trim()) return;
        await dbRenameProject(currentId, name.trim());
        await refreshProjects();
    }, [currentId, refreshProjects]);

    const renameJourneyTitle = useCallback((jIdx, title) => {
        const journey = journeysRef.current[jIdx];
        const nextTitle = title.trim();
        if (!journey || !nextTitle || journey.title === nextTitle) return;
        commitOp({ t: "journey.rename", journeyId: journey.id, name: nextTitle });
    }, [commitOp]);

    const newProject = useCallback(async () => {
        const id = await dbCreateProject(defaultName(projects), []);
        setCurrentId(id);
        replaceJourneys([]);
        clearHistory();
        setTab(0);
        setEditMode(true);
        setViewOnly(false);
        setSync({ mapId: null, role: null, status: "off", error: null });
        setView("project");
        localStorage.setItem(LAST_KEY, String(id));
        writeRoute(id);
        await refreshProjects();
    }, [clearHistory, projects, refreshProjects, replaceJourneys]);

    const newBlankJourney = useCallback(async () => {
        const journey = createBlankJourney(journeysRef.current.length);
        let id = currentId;
        if (id == null && sync.status !== "synced") {
            id = await dbCreateProject("Blank Service Journey", [journey]);
            setCurrentId(id);
            localStorage.setItem(LAST_KEY, String(id));
            replaceJourneys([journey]);
            clearHistory();
            setTab(0);
            setViewOnly(false);
            setSync({ mapId: null, role: null, status: "off", error: null });
            setView("project");
            writeRoute(id);
            await refreshProjects();
            return;
        }
        const afterJourneyId = journeysRef.current.length
            ? journeysRef.current[journeysRef.current.length - 1]?.id
            : null;
        commitOp({ t: "journey.insert", afterJourneyId, journey }, (next) => setTab(next.length - 1));
    }, [clearHistory, commitOp, currentId, refreshProjects, replaceJourneys, sync.status]);

    const deleteJourney = useCallback((jIdx) => {
        const journey = journeysRef.current[jIdx];
        if (!journey) return;
        setConfirmState({
            title: "Delete journey",
            message: `Delete the journey “${journey.title}”? You can undo this right after.`,
            confirmLabel: "Delete journey",
            danger: true,
            onConfirm: () => commitOp({ t: "journey.delete", journeyId: journey.id }, (next) => {
                setTab((cur) => {
                    if (!next.length) return 0;
                    if (cur > jIdx) return cur - 1;
                    if (cur >= next.length) return next.length - 1;
                    return cur;
                });
                setSelected(null);
            }),
        });
    }, [commitOp]);

    const currentExportPayload = useCallback((scope = "project") => {
        const data = journeysRef.current;
        if (!data.length) return null;
        const activeJourney = data[Math.min(tab, data.length - 1)];
        const journeysToExport = scope === "sheet" && activeJourney ? [activeJourney] : data;
        const exportName = scope === "sheet" && activeJourney?.title
            ? `${currentName || "Service Journeys"} - ${activeJourney.title}`
            : currentName || "Service Journeys";
        return {
            type: "service-journey-mapper",
            version: 1,
            name: exportName,
            exportedAt: new Date().toISOString(),
            lastSavedAt: lastSavedRef.current ? new Date(lastSavedRef.current).toISOString() : null,
            journeys: journeysToExport,
        };
    }, [currentName, tab]);

    // ── Export full project state ──
    const exportProject = useCallback(() => {
        const payload = currentExportPayload("project");
        if (!payload) return;
        const savedAt = filenameTimestamp(lastSavedRef.current);
        const filename = [safeName(currentName), savedAt].filter(Boolean).join("_") + ".json";
        downloadFile(filename, JSON.stringify(payload, null, 2), "application/json");
    }, [currentExportPayload, currentName]);

    const exportCurrentSheet = useCallback(() => {
        const payload = currentExportPayload("sheet");
        if (!payload) return;
        const savedAt = filenameTimestamp(lastSavedRef.current);
        const sheetName = payload.journeys[0]?.title || "Sheet";
        const filename = [safeName(currentName), safeName(sheetName), savedAt].filter(Boolean).join("_") + ".json";
        downloadFile(filename, JSON.stringify(payload, null, 2), "application/json");
    }, [currentExportPayload, currentName]);

    const exportStandaloneHtml = useCallback(() => {
        const payload = currentExportPayload("project");
        if (!payload) return;
        downloadFile(safeName(currentName) + ".html", buildStandaloneHtml(payload), "text/html");
    }, [currentExportPayload, currentName]);

    const copyPromptExport = useCallback(async (scope = "project") => {
        const payload = currentExportPayload(scope);
        if (!payload) return;
        await copyTextToClipboard(buildPromptExport(payload));
    }, [currentExportPayload]);

    const copyPromptCurrentSheet = useCallback(() => copyPromptExport("sheet"), [copyPromptExport]);
    const copyPromptProject = useCallback(() => copyPromptExport("project"), [copyPromptExport]);

    const copyIdeationPrompt = useCallback(async () => {
        await copyTextToClipboard(buildIdeationPrompt());
    }, []);

    // Expose to console
    useEffect(() => {
        window.loadJSON = loadFromText;
        window.exportProject = exportProject;
        window.exportCurrentSheet = exportCurrentSheet;
        window.exportStandaloneHtml = exportStandaloneHtml;
        window.exportPrompt = copyPromptExport;
        window.exportSheetPrompt = copyPromptCurrentSheet;
        window.ideationPrompt = copyIdeationPrompt;
        return () => {
            delete window.loadJSON;
            delete window.exportProject;
            delete window.exportCurrentSheet;
            delete window.exportStandaloneHtml;
            delete window.exportPrompt;
            delete window.exportSheetPrompt;
            delete window.ideationPrompt;
        };
    }, [loadFromText, exportProject, exportCurrentSheet, exportStandaloneHtml, copyPromptExport, copyPromptCurrentSheet, copyIdeationPrompt]);

    // App bar height → CSS var
    useEffect(() => {
        const el = appBarRef.current;
        if (!el) return;
        const update = () => document.documentElement.style.setProperty("--appbar-h", el.offsetHeight + "px");
        update();
        const ro = new ResizeObserver(update);
        ro.observe(el);
        return () => ro.disconnect();
    }, []);

    // Leaving edit mode clears the cell selection.
    useEffect(() => { if (!editMode) setSelected(null); }, [editMode]);

    useEffect(() => {
        if (!editMode || !selected) return;
        const clearWhenOutsideCellTools = (e) => {
            if (e.target?.closest?.("[data-cell-key], .cell-toolbar, .tag-color-pop, .tag-suggest")) return;
            setSelected(null);
        };
        document.addEventListener("mousedown", clearWhenOutsideCellTools);
        return () => document.removeEventListener("mousedown", clearWhenOutsideCellTools);
    }, [editMode, selected]);

    // Mirror lastSaved into a ref so export reads the latest value.
    useEffect(() => { lastSavedRef.current = lastSaved; }, [lastSaved]);

    // App-level history shortcuts. Native text undo stays active while editing a field/cell.
    useEffect(() => {
        const isTextEditingTarget = (target) =>
            target?.closest?.('input, textarea, select, [contenteditable="true"]');
        const onKeyDown = (e) => {
            if (!(e.metaKey || e.ctrlKey) || e.altKey || isTextEditingTarget(e.target)) return;
            const key = e.key.toLowerCase();
            if (key === "z" && e.shiftKey) {
                e.preventDefault();
                redo();
            } else if (key === "z") {
                e.preventDefault();
                undo();
            } else if (key === "y") {
                e.preventDefault();
                redo();
            }
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
    }, [redo, undo]);

    // App-level cell mode / align shortcuts (Ctrl+Alt+…).
    // These fire when a cell is selected in edit mode, even if the cell itself
    // doesn't have keyboard focus (e.g. tags mode).
    useEffect(() => {
        const onKeyDown = (e) => {
            if (!editMode || !selected) return;
            if (!(e.metaKey || e.ctrlKey) || !e.altKey) return;
            // Use e.code (physical key) — on macOS the Alt/Option key rewrites
            // e.key (⌥1 → "¡", ⌥L → "¬"), so e.key lookups would never match.
            const modeMap = { Digit1: "text", Digit2: "bullets", Digit3: "boxes", Digit4: "tags" };
            const alignMap = { KeyL: "left", KeyE: "center" };
            if (modeMap[e.code]) {
                e.preventDefault();
                handleCellMode(selected.jIdx, selected.sjIdx, selected.rowIdx, selected.cellIdx, modeMap[e.code]);
            } else if (alignMap[e.code]) {
                e.preventDefault();
                handleCellAlign(selected.jIdx, selected.sjIdx, selected.rowIdx, selected.cellIdx, alignMap[e.code]);
            }
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
    }, [editMode, selected, handleCellMode, handleCellAlign]);

    useEffect(() => {
        const onKeyDown = (e) => {
            if (!editMode || !selected || e.key !== "Escape") return;
            const cell = journeysRef.current[selected.jIdx]?.subJourneys?.[selected.sjIdx]?.rows?.[selected.rowIdx]?.cells?.[selected.cellIdx];
            if ((cell?.mode || "text") !== "tags") return;
            e.preventDefault();
            setSelected(null);
            releaseLock();
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
    }, [editMode, releaseLock, selected]);

    // The cell the format toolbar currently targets.
    const selectedCell = selected
        ? journeys[selected.jIdx]?.subJourneys?.[selected.sjIdx]?.rows?.[selected.rowIdx]?.cells?.[selected.cellIdx]
        : null;
    const selectedKey = selected
        ? `cell-${selected.jIdx}-${selected.sjIdx}-${selected.rowIdx}-${selected.cellIdx}`
        : null;

    // Password gate (Phase 5): block the app behind the prompt until a valid
    // session is obtained (or the user cancels back to the library).
    if (passwordGate) {
        return <PasswordGateModal onSubmit={submitPassword} onCancel={cancelPasswordGate} />;
    }

    if (!ready) return null;

    // ── Home / library screen ──
    if (view === "library") {
        return (
            <>
                <LibraryScreen projects={projects} sharedMaps={sharedMaps} currentId={currentId}
                    profile={profile} onProfileRename={renameProfile}
                    onOpen={openProject} onOpenShared={openSharedMap} onNew={newProject}
                    onRename={renameProject} onDelete={deleteProject}
                    onLoad={() => setModal(true)} />
                {modal && <LoadModal onLoad={(text, mode, opts) => loadFromText(text, mode, { ...opts, forceNew: true })} onClose={() => setModal(false)} currentProjectName={currentName} existingJourneys={[]} />}
                {confirmState && <ConfirmModal {...confirmState} onClose={() => setConfirmState(null)} />}
            </>
        );
    }

    return (
        <>
            <TopBar innerRef={appBarRef} currentName={currentName}
                onRenameCurrent={renameCurrentProject}
                onLibrary={goLibrary}
                onDownloadSheet={exportCurrentSheet} onDownloadProject={exportProject}
                onStandaloneExport={exportStandaloneHtml}
                onPromptSheet={copyPromptCurrentSheet} onPromptProject={copyPromptProject}
                canExport={journeys.length > 0} hasMultipleSheets={journeys.length > 1} saveState={saveState} lastSaved={lastSaved} lastSavedBy={lastSavedBy}
                viewOnly={viewOnly}
                editMode={editMode} onSetEdit={(v) => setEditMode(v)}
                canUndo={historyState.canUndo} canRedo={historyState.canRedo}
                onUndo={undo} onRedo={redo}
                sync={sync} onEnableSync={enableSync} onStopSharing={stopSync} peers={peers} />
            {!viewOnly && editMode && journeys.length > 0 && (
                <FormatToolbar cell={selectedCell} selectedKey={selectedKey}
                    onMode={(m) => selected && handleCellMode(selected.jIdx, selected.sjIdx, selected.rowIdx, selected.cellIdx, m)}
                    onAlign={(a) => selected && handleCellAlign(selected.jIdx, selected.sjIdx, selected.rowIdx, selected.cellIdx, a)} />
            )}
            <main className="main-content">
                {journeys.length === 0 ? (
                    <EmptyState onNew={newBlankJourney} onLoad={() => setModal(true)} onPrompt={copyIdeationPrompt} />
                ) : (
                    journeys.map((j, i) => (
                        <div key={j.id + "-" + i} style={{ display: i === tab ? "block" : "none" }}>
                            <JourneyView journey={j} jIdx={i} editMode={!viewOnly && editMode}
                                selected={selected} onSelect={setSelected} onDeselect={() => { setSelected(null); releaseLock(); }}
                                onTitleEdit={renameJourneyTitle}
                                onCellEdit={handleCellEdit} onCellTags={handleCellTags}
                                onRowAction={handleRowAction} onStageAction={handleStageAction}
                                onAddRow={handleAddRow}
                                lockedByPeer={lockedByPeer} onAcquireLock={acquireLock} onReleaseLock={releaseLock} />
                        </div>
                    ))
                )}
            </main>
            <TabBar journeys={journeys} activeTab={tab} setActiveTab={setTab}
                onNew={newBlankJourney} onLoad={() => setModal(true)}
                onDelete={deleteJourney} viewOnly={viewOnly} />
            {!viewOnly && modal && <LoadModal onLoad={loadFromText} onClose={() => setModal(false)} currentProjectName={currentName} existingJourneys={journeys} />}
            {confirmState && <ConfirmModal {...confirmState} onClose={() => setConfirmState(null)} />}
        </>
    );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
