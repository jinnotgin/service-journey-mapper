<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanescape - Service Journey Mapper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@19.2.0",
            "react/jsx-runtime": "https://esm.sh/react@19.2.0/jsx-runtime",
            "react-dom": "https://esm.sh/react-dom@19.2.0",
            "react-dom/": "https://esm.sh/react-dom@19.2.0/",
            "dexie": "https://esm.sh/dexie@4.0.8"
        }
    }
    </script>


    <script src="https://unpkg.com/@babel/standalone@8.0.2/babel.min.js"></script>
    <style>
        :root {
            /* Type scale — one calm progression, applied everywhere */
            --fs-2xs: 11px;
            --fs-xs:  12px;
            --fs-sm:  13px;
            --fs-md:  14px;
            --fs-lg:  16px;
            --fs-xl:  20px;
            --fs-2xl: 26px;
            /* Warm-neutral ramp, close to shadcn's black and white default */
            --ink-bar:     oklch(99% .002 70);
            --ink-stage:   oklch(96.2% .006 70);
            --ink-sub:     oklch(93.8% .006 70);
            --ink-divider: oklch(60% .008 70);
            /* Primary action is restrained and neutral; semantic row colors stay separate */
            --accent:        oklch(24% .006 70);
            --accent-strong: oklch(18% .006 70);
            --accent-ink:    oklch(98.5% .003 70);
            --accent-soft:   oklch(24% .006 70 / .08);
            --accent-line:   oklch(24% .006 70 / .32);
            --accent-ring:   oklch(24% .006 70 / .22);
            /* Legacy alias — kept so existing references stay valid */
            --primary: var(--ink-stage);
            --red: #c0322f;
            --green: #2f7d4f;
            --blue: #2563a8;
            --purple: #6d4aa0;
            --gold: #b5651d;
            --bg: oklch(97.6% .004 70);
            --surface: oklch(99% .002 70);
            --surface-2: oklch(96.5% .004 70);
            --border: oklch(89% .006 70);
            --border-light: oklch(93.5% .004 70);
            --grid-line: oklch(91% .004 70 / .62);
            --grid-strong: oklch(83% .008 70);
            --note: oklch(99.2% .003 70);
            /* Filled notes use a translucent fill so the lane tint reads through:
               the note lifts off the lane rather than punching a white hole in it. */
            --note-fill: oklch(100% 0 0 / .4);
            --note-border: oklch(84% .008 70 / .55);
            --note-shadow: 0 1px 2px oklch(20% .006 70 / .04), 0 4px 12px oklch(20% .006 70 / .035);
            --text: oklch(27% .008 70);
            --text-sec: oklch(52% .006 70);
            --shadow-sm: 0 1px 2px oklch(20% .006 70 / .05), 0 1px 3px oklch(20% .006 70 / .07);
            --shadow-md: 0 8px 24px oklch(20% .006 70 / .11);
            --shadow-lg: 0 18px 50px oklch(20% .006 70 / .2);
            --radius: 10px;
            /* Canvas track model: lanes are rounded objects floating on the page,
               separated by whitespace gutters. No continuous grid lines. */
            --canvas: oklch(96.8% .004 70);
            --lane-gap: 9px;
            --lane-r: 13px;
            --canvas-pad: 10px;
            --lane-w: 180px;
            /* Sticky offset for stage/step labels: clears the sticky lane rail. */
            --stage-label-left: 192px;
            --appbar-h: 52px;
            --toolbar-h: 0px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:var(--fs-md);line-height:1.5;-webkit-font-smoothing:antialiased}

        /* ===== TOP APP BAR ===== */
        .app-bar{background:var(--ink-bar);color:var(--text);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);box-shadow:0 8px 24px oklch(20% .006 70 / .06)}
        .app-bar-main{display:flex;align-items:center;gap:16px;padding:0 18px;min-height:52px}
        .ab-left{display:flex;align-items:center;gap:12px;min-width:0}
        .ab-back{display:inline-flex;align-items:center;gap:6px;background:var(--surface);color:var(--text);border:1px solid var(--border);padding:7px 11px;border-radius:8px;font-size:var(--fs-sm);font-weight:650;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:background .15s,border-color .15s,box-shadow .15s}
        .ab-back:hover{background:var(--surface-2);border-color:var(--text-sec);box-shadow:0 1px 2px oklch(20% .006 70 / .08)}
        .ab-brand{display:flex;align-items:center;min-width:0;max-width:min(760px,52vw);line-height:1.15}
        .ab-title{font-size:var(--fs-lg);font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
        .cloud-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:7px;margin-left:8px;color:var(--blue);background:oklch(96% .018 245);border:1px solid oklch(86% .035 245);flex:0 0 auto}
        .cloud-badge svg{width:15px;height:15px;stroke:currentColor}
        .ab-spacer{flex:1 1 auto;min-width:8px}
        .inline-title{cursor:default}
        .inline-title.editable{cursor:text;border-radius:5px;transition:background .12s,box-shadow .12s}
        .inline-title.editable:hover{background:var(--accent-soft);box-shadow:0 0 0 4px var(--accent-soft)}
        .inline-title.editable::after{content:"✎";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;margin-left:8px;border-radius:5px;font-size:.68em;opacity:0;transition:opacity .12s,background .12s;vertical-align:middle;color:var(--text-sec);background:var(--surface-2)}
        .inline-title.editable:hover::after{opacity:1}
        .inline-title-input{font:inherit;font-weight:inherit;color:inherit;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:4px 8px;min-width:260px;max-width:100%;outline:none}
        .ab-brand .inline-title-input{width:min(720px,52vw);min-width:min(520px,52vw)}
        .ch-hdr .inline-title-input{width:min(900px,100%);min-width:min(720px,calc(100vw - 80px))}
        .ch-title-input{background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);padding:2px 6px}
        .ab-status{font-size:var(--fs-xs);font-weight:600;white-space:nowrap;flex-shrink:0;color:var(--text-sec)}
        .ab-actions{display:flex;align-items:center;gap:12px;flex-shrink:0;margin-left:auto}
        .ab-btn{background:transparent;color:var(--text);border:1px solid transparent;padding:6px 10px;border-radius:7px;font-size:var(--fs-xs);font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s,color .15s;white-space:nowrap;min-height:32px}
        .ab-btn:hover{background:var(--surface-2);border-color:var(--border)}
        .ab-btn:disabled{opacity:.4;cursor:not-allowed}
        .history-actions{display:inline-flex;align-items:center;gap:1px}
        .presence-stack{display:inline-flex;align-items:center;flex-shrink:0}
        .presence-av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;border:2px solid var(--surface);margin-left:-7px;box-shadow:0 1px 2px oklch(20% .006 70 / .18);cursor:default;user-select:none;text-shadow:0 1px 1px oklch(20% .006 70 / .35)}
        .presence-av:first-child{margin-left:0}
        .presence-av.more{background:var(--surface-2);color:var(--text-sec);text-shadow:none}
        .history-btn{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border:1px solid transparent;border-radius:7px;background:transparent;cursor:pointer;padding:0;transition:background .15s,border-color .15s,opacity .15s}
        .history-btn:hover:not(:disabled){background:var(--surface-2);border-color:var(--border)}
        .history-btn:disabled{cursor:not-allowed;opacity:.34}
        .history-btn svg{width:15px;height:15px;display:block;stroke:currentColor}
        /* segmented Edit | View toggle */
        .ab-seg{display:flex;padding:2px;border:1px solid var(--border);border-radius:9px;background:var(--surface-2)}
        .ab-seg button{background:transparent;color:var(--text-sec);border:none;padding:5px 13px;border-radius:7px;font-size:var(--fs-xs);font-weight:650;cursor:pointer;font-family:inherit;min-height:30px;transition:background .15s,color .15s}
        .ab-seg button:hover{color:var(--text)}
        .ab-seg button.on{background:var(--accent);color:var(--accent-ink)}
        .ab-actions .menu-wrap{display:flex}
        .ab-actions .menu-trigger{width:auto;height:auto;min-height:32px;background:var(--surface);border-color:var(--border);color:var(--text);padding:6px 13px;border-radius:8px;font-size:var(--fs-xs);font-weight:700;white-space:nowrap;box-shadow:0 1px 1px oklch(20% .006 70 / .06)}
        .ab-actions .menu-trigger:hover{background:var(--surface-2)}
        .save-state{display:inline-flex;align-items:center;gap:6px}
        .save-dot{width:7px;height:7px;border-radius:999px;display:inline-block;background:var(--green)}
        .save-saving{color:oklch(82% .05 80)}
        .save-saved{color:var(--text-sec)}
        .save-by{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        /* ===== MAIN ===== */
        .main-content{padding-bottom:50px;min-height:60vh}

        /* ===== EMPTY ===== */
        .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:8px;text-align:center;padding:48px 20px}
        .empty-icon{font-size:2.6rem;opacity:.9}
        .empty-state h2{font-size:var(--fs-xl);color:var(--text);font-weight:700;letter-spacing:-.01em}
        .empty-state p{color:var(--text-sec);max-width:42ch;font-size:var(--fs-sm);line-height:1.55}
        .empty-actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
        .ideate-card{margin-top:30px;max-width:470px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px 28px;text-align:left;box-shadow:var(--shadow-sm)}
        .ideate-title{display:flex;align-items:center;gap:9px;font-size:var(--fs-md);font-weight:700;color:var(--text);margin-bottom:10px}
        .ideate-icon{flex:0 0 20px;text-align:center}
        .ideate-desc{color:var(--text-sec);font-size:var(--fs-sm);line-height:1.6;margin:0 0 14px 29px;max-width:44ch;text-align:left}
        .ideate-steps{margin:0 0 16px 29px;padding-left:22px;color:var(--text-sec);font-size:var(--fs-sm);line-height:1.65;max-width:44ch}
        .ideate-steps li{padding-left:4px;margin-bottom:4px}
        .ideate-steps b{color:var(--text)}
        .ideate-card .btn-p{width:100%}

        /* ===== BUTTONS ===== */
        .btn-p{background:var(--accent);color:var(--accent-ink);border:1px solid oklch(12% .004 70 / .9);padding:10px 22px;border-radius:8px;font-size:var(--fs-sm);font-weight:700;cursor:pointer;transition:background .15s,box-shadow .15s,transform .15s;box-shadow:inset 0 1px 0 oklch(100% 0 0 / .1),0 1px 2px oklch(20% .006 70 / .12)}
        .btn-p:hover{background:var(--accent-strong);box-shadow:inset 0 1px 0 oklch(100% 0 0 / .08),0 2px 5px oklch(20% .006 70 / .16)}
        .btn-p:active{transform:translateY(1px);box-shadow:inset 0 1px 2px oklch(0% 0 0 / .18)}
        .btn-p:disabled,.btn-s:disabled,.btn-danger:disabled{opacity:.4;cursor:not-allowed}
        .btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:9px 16px;border-radius:8px;font-size:var(--fs-sm);font-weight:600;cursor:pointer;transition:background .15s,border-color .15s}
        .btn-s:hover{background:var(--surface-2);border-color:var(--text-sec)}
        .btn-danger{background:var(--red);color:oklch(98.5% .003 70);border:none;padding:10px 22px;border-radius:8px;font-size:var(--fs-sm);font-weight:700;cursor:pointer;transition:filter .15s}
        .btn-danger:hover{filter:brightness(.93)}
        .pc-rename{font-size:var(--fs-md);font-weight:700;padding:6px 9px}

        /* ===== CHAPTER HDR ===== */
        .ch-hdr{padding:14px 28px 12px;background:var(--surface);border-bottom:1px solid var(--border-light)}
        .ch-hdr h2{font-size:var(--fs-xl);color:var(--text);font-weight:700;letter-spacing:-.015em}

        /* ===== STAGE HDR (STICKY) ===== */
        .stage-outer{position:sticky;top:calc(var(--appbar-h,52px) + var(--toolbar-h,0px));z-index:35;background:var(--canvas);padding:4px var(--canvas-pad) 0;box-shadow:0 10px 16px -8px oklch(20% .006 70 / .12)}
        .scroll-hide{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
        .scroll-hide::-webkit-scrollbar{display:none}

        /* ===== SUB-JOURNEY HDR ===== */
        .sj-scroll{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;background:var(--canvas)}
        .sj-scroll::-webkit-scrollbar{display:none}

        /* ===== BP TABLE ===== */
        /* No grid lines anywhere. The table is pure column-alignment plumbing;
           lanes read as rounded tracks separated by vertical gutters. */
        .bp{border-collapse:separate;border-spacing:0;table-layout:fixed;width:max-content}
        .bp td{border:0;padding:11px 13px;vertical-align:top;text-align:left;font-size:var(--fs-sm)}

        /* Body lanes float on the canvas with whitespace gutters between them. */
        .bpw .bp{border-spacing:0 var(--lane-gap)}
        /* Round each lane into one continuous track: left corners on the sticky
           label, right corners on the trailing data cell (mode-aware via :has). */
        .bpw .bp td.ll{border-top-left-radius:var(--lane-r);border-bottom-left-radius:var(--lane-r)}
        .bpw .bp tr>td:last-child:not(.add-col-c),
        .bpw .bp tr>td:has(+ .add-col-c){border-top-right-radius:var(--lane-r);border-bottom-right-radius:var(--lane-r)}
        /* Trailing add-column lane in the body is pure empty space: no fill, no
           border, no rounding. The "+" lives only in the sticky stage header. */
        .bpw .bp .add-col-c{background:transparent!important;border:0!important;border-radius:0!important;box-shadow:none!important}

        /* Lane label */
        .ll{width:var(--lane-w);min-width:var(--lane-w);max-width:var(--lane-w);position:sticky;left:0;z-index:10;font-weight:720;font-size:var(--fs-2xs);text-transform:none;letter-spacing:0;background:var(--surface);padding:16px 14px 16px 17px!important}
        .lane-label{display:flex;align-items:flex-start;gap:9px;line-height:1.25;min-width:0}
        .lane-icon{width:20px;height:20px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;background:oklch(99% .002 70 / .78);color:currentColor;border:1px solid oklch(100% 0 0 / .52);box-shadow:0 1px 2px oklch(20% .006 70 / .04)}
        .lane-icon svg{width:14px;height:14px;stroke:currentColor}
        .lane-copy{display:flex;flex-direction:column;gap:3px;min-width:0}
        .lane-kicker{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:color-mix(in oklch, currentColor 58%, var(--text-sec))}
        .lane-main{font-size:var(--fs-xs);font-weight:800;letter-spacing:.025em;text-transform:uppercase;overflow-wrap:anywhere;color:currentColor}

        /* Stage header cells. The label rail stays an OPAQUE canvas tile so
           columns scrolling underneath it never bleed through. */
        .stg-ll{background:var(--canvas)!important;color:var(--text-sec)!important;text-align:left!important}
        .stg-c{min-width:260px;background:transparent!important;color:var(--text)!important;font-weight:700!important;font-size:var(--fs-md)!important;letter-spacing:0!important;text-align:left!important;vertical-align:middle!important;padding:9px 6px!important}
        /* Stage card spans the full stage width (shows coverage); the label
           inside is sticky so it stays readable across a wide stage. */
        .stage-card{display:flex;align-items:center;justify-content:flex-start;gap:9px;min-height:36px;margin:0 3px;padding:7px 11px 7px 8px;border:1px solid oklch(84% .01 70 / .78);border-radius:9px;background:oklch(98.4% .005 70);box-shadow:0 1px 2px oklch(20% .006 70 / .04);text-align:left}
        .stage-card-label{position:sticky;left:var(--stage-label-left);display:inline-flex;align-items:center;gap:9px;min-width:0;max-width:100%}
        .stage-title{line-height:1.25;overflow-wrap:anywhere}

        /* SJ header cells */
        .sj-ll{background:var(--canvas)!important;color:var(--text-sec)!important;font-size:var(--fs-2xs)!important;text-align:left!important}
        .sj-tc{background:transparent!important;color:var(--text-sec)!important;font-weight:650!important;font-size:var(--fs-2xs)!important;text-transform:uppercase!important;letter-spacing:1.4px!important;text-align:center!important;padding:8px 12px!important}

        /* Data cell */
        .dc{min-width:260px;min-height:82px;position:relative;padding:13px 14px!important;background-clip:padding-box;transition:background .12s ease-out,box-shadow .12s ease-out}
        .dc-span{min-width:auto!important;width:auto!important}

        /* Wrapper */
        /* Canvas inset lives on the non-scrolling wrapper, NOT the scroll
           container, so nothing can scroll into the gap left of the sticky rail. */
        .bp-lane-wrap{padding:0 var(--canvas-pad);background:var(--canvas)}
        .bpw{overflow-x:auto;background:var(--canvas);padding:0 0 var(--lane-gap)}
        .bpw::-webkit-scrollbar{height:10px}
        .bpw::-webkit-scrollbar-track{background:var(--surface-2)}
        .bpw::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;border:2px solid var(--surface-2)}
        .bpw::-webkit-scrollbar-thumb:hover{background:var(--text-sec)}
        .bpw{scrollbar-width:thin;scrollbar-color:var(--border) var(--surface-2)}

        /* ===== ROW TYPES =====
           Label column carries a soft tint + readable colored label; the data
           column stays near-white so written content always leads. */
        .row-parties>.ll{background:oklch(96.5% .012 250);color:oklch(42% .075 250)}
        .row-parties>.dc{background:oklch(98.3% .006 250)}

        .row-operator>.ll{background:var(--surface);color:var(--text)}
        .row-operator>.dc{background:var(--surface)}

        .row-fs-human>.ll{background:oklch(93% .035 245);color:oklch(45% .11 250)}
        .row-fs-human>.dc{background:oklch(98% .012 245)}

        .row-fs-system>.ll{background:oklch(93% .035 245);color:oklch(45% .11 250)}
        .row-fs-system>.dc{background:oklch(98% .012 245)}

        /* Line of visibility = the blueprint's defining moment. A tall, quiet
           band of canvas separates the frontstage cluster from the backstage
           cluster, with a single dashed boundary floating through it. */
        .row-divider>.ll{background:var(--canvas)!important;color:var(--text-sec)!important;border-bottom:0!important}
        .row-divider>.dc{background:transparent!important;color:var(--text-sec);font-weight:700;text-align:center;padding:16px 12px!important;font-size:var(--fs-2xs);text-transform:uppercase;letter-spacing:1.3px;border-bottom:0!important}
        .row-divider .lane-label{align-items:center}
        .row-divider .lane-main{color:var(--text-sec)}
        /* The divider is a pure boundary: any cell content is made weightless
           (font-size:0) so it can never inflate the row, and the dashed line is
           a plain full-width block. */
        .row-divider .cell-note{min-height:0;padding:0!important;border:0!important;background:transparent!important;box-shadow:none!important;display:block;color:transparent;font-size:0;line-height:0;position:relative}
        .row-divider .cell-note::before{content:"";display:block;width:100%;border-top:1.5px dashed oklch(64% .01 70 / .7)}
        .row-divider .cell-note:focus{outline:none;box-shadow:none!important}

        .row-bs-human>.ll{background:oklch(94% .04 80);color:oklch(48% .1 65)}
        .row-bs-human>.dc{background:oklch(98.5% .012 80)}

        .row-bs-system>.ll{background:oklch(94% .04 80);color:oklch(48% .1 65)}
        .row-bs-system>.dc{background:oklch(98.5% .012 80)}

        .row-support>.ll{background:oklch(93% .03 305);color:oklch(46% .11 305)}
        .row-support>.dc{background:oklch(98% .012 305)}

        .row-pain>.ll{background:oklch(92% .04 20);color:oklch(48% .14 25)}
        .row-pain>.dc{background:oklch(98.5% .012 20)}

        .row-verbatim>.ll{background:oklch(94% .05 90);color:oklch(45% .09 75)}
        .row-verbatim>.dc{background:oklch(98.5% .02 90);font-style:italic;color:oklch(45% .07 75);font-size:var(--fs-xs)}

        .row-emotion>.ll{background:oklch(93% .04 155);color:oklch(43% .1 155)}
        .row-emotion>.dc{background:oklch(98% .015 155);text-align:center}

        .row-suggest>.ll{background:oklch(93% .035 235);color:oklch(45% .11 245)}
        .row-suggest>.dc{background:oklch(98% .012 235)}

        /* ===== INNER CELL ELEMENTS ===== */


        .bp-bullet{padding-left:14px;position:relative;margin-bottom:4px}
        .bp-bullet::before{content:'•';position:absolute;left:2px;color:var(--accent-strong);font-weight:700}

        .bp-pain-item{padding:4px 8px;background:oklch(96% .03 20);border:1px solid oklch(88% .05 20);border-radius:4px;margin-bottom:4px;font-size:var(--fs-xs)}
        .bp-suggest-item{padding:4px 8px;background:oklch(96% .03 240);border:1px solid oklch(88% .05 240);border-radius:4px;margin-bottom:4px;font-size:var(--fs-xs)}

        .emotion-icon{font-size:1.4rem;display:block;margin-bottom:2px}
        .emotion-text{font-size:var(--fs-xs);font-weight:600}
        .emotion-neg{color:var(--red)}.emotion-pos{color:var(--green)}.emotion-neu{color:var(--gold)}

        .stage-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--accent-strong);color:var(--accent-ink);border:1px solid var(--accent-strong);font-weight:800;font-size:var(--fs-xs);font-variant-numeric:tabular-nums}

        /* ===== EDITABLE ===== */
        .cell-note{min-height:70px;width:100%;border-radius:8px;padding:10px 11px;outline:none;cursor:text;transition:box-shadow .12s ease-out,background .12s ease-out,border-color .12s ease-out;color:var(--text)}
        .cell-note:empty::before{content:attr(data-placeholder);color:oklch(62% .006 70 / .65);font-weight:600;opacity:0;transition:opacity .12s ease-out;pointer-events:none}
        .dc:hover .cell-note:empty::before,.dc.cell-sel .cell-note:empty::before{opacity:1}
        /* Only plain text / bullet notes get a surface, and it is translucent.
           Boxes carry their own item surfaces; tags carry their own chips. */
        .dc.cell-filled:not(.cell-boxes):not(.cell-tags-mode) .cell-note{background:var(--note-fill);border:1px solid var(--note-border);box-shadow:var(--note-shadow)}
        .dc:hover .cell-note{box-shadow:inset 0 0 0 1px var(--accent-line)}
        .cell-note:focus{background:var(--note);box-shadow:0 0 0 3px var(--accent-soft), inset 0 0 0 2px var(--accent)!important;border-color:transparent}
        .row-divider .cell-note:empty::before{content:""!important;opacity:1!important;display:block;width:100%;border-top:1.5px dashed oklch(64% .01 70 / .7)}

        /* ===== TAB BAR ===== */
        .tab-bar{position:fixed;bottom:0;left:0;right:0;height:42px;background:var(--surface-2);border-top:1px solid var(--border);display:flex;align-items:flex-end;padding:0 8px;z-index:100}
        .tab-scroll{display:flex;align-items:flex-end;overflow-x:auto;flex:1;gap:3px;scrollbar-width:none}
        .tab-scroll::-webkit-scrollbar{display:none}
        .tab-btn{flex-shrink:0;height:32px;border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;background:transparent;color:var(--text-sec);display:flex;align-items:center;max-width:340px;white-space:nowrap;overflow:hidden;transition:background .15s,color .15s}
        .tab-btn:hover{background:var(--surface)}
        .tab-btn.active{background:var(--surface);color:var(--text);border-top:2px solid var(--accent);height:35px;z-index:1}
        .tab-select{min-width:0;flex:1;height:100%;padding:0 14px;border:0;background:transparent;color:inherit;font-size:var(--fs-xs);font-weight:600;cursor:pointer;display:flex;align-items:center;overflow:hidden;font-family:inherit}
        .tab-select{padding-right:6px}
        .tab-ttl{overflow:hidden;text-overflow:ellipsis}
        .tab-del{width:22px;height:22px;margin-right:5px;border:0;border-radius:5px;background:transparent;color:var(--text-sec);font-size:1rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;opacity:.6}
        .tab-del:hover{background:oklch(94% .03 20);color:var(--red);opacity:1}
        .tab-actions{display:flex;align-items:flex-end;gap:6px;margin:0 0 5px 8px;flex-shrink:0}
        .tab-load{height:29px;padding:0 13px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:var(--fs-xs);font-weight:600;cursor:pointer;color:var(--text-sec);transition:background .15s,color .15s;font-family:inherit}
        .tab-load:hover{background:var(--surface-2);color:var(--text)}

        /* ===== MODAL ===== */
        .m-ov{position:fixed;inset:0;background:oklch(25% .02 264 / .42);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:m-fade .14s ease-out}
        @keyframes m-fade{from{opacity:0}to{opacity:1}}
        .m-box{background:var(--surface);border-radius:14px;width:100%;max-width:620px;max-height:82vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:m-rise .18s cubic-bezier(.2,.8,.2,1);will-change:opacity,transform}
        @keyframes m-rise{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
        .m-box.m-sm{max-width:440px}
        .m-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;border-bottom:1px solid var(--border-light)}
        .m-hdr h3{font-size:var(--fs-lg);color:var(--text);font-weight:700;letter-spacing:-.01em}
        .m-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-sec);padding:4px;border-radius:6px;line-height:1}
        .m-close:hover{background:var(--surface-2);color:var(--text)}
        .m-body{padding:16px 22px;flex:1;overflow-y:auto}
        .m-body>p{font-size:var(--fs-sm);color:var(--text-sec);margin-bottom:12px;line-height:1.55}
        .m-body textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:11px;font-family:Menlo,Consolas,monospace;font-size:var(--fs-xs);resize:vertical;line-height:1.5;outline:none}
        .m-body textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
        .m-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:var(--fs-md);color:var(--text);outline:none}
        .m-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
        .m-file{margin-top:10px}
        .m-warn{margin-top:14px;padding:11px 13px;background:oklch(97% .025 85);border:1px solid oklch(84% .065 82);border-radius:8px;font-size:var(--fs-xs);color:oklch(42% .075 78);line-height:1.5}
        .m-summary{display:flex;flex-direction:column;gap:10px;margin-top:14px}
        .m-summary-card{padding:11px 13px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:8px;font-size:var(--fs-xs);line-height:1.5;color:var(--text-sec)}
        .m-summary-card b{color:var(--text)}
        .m-sheet-list{margin-top:6px;padding-left:18px;color:var(--text)}
        .m-sheet-list li{margin-top:3px;overflow-wrap:anywhere}
        .m-check{display:flex;align-items:flex-start;gap:8px;margin-top:10px;color:var(--text);font-size:var(--fs-xs)}
        .m-check input{margin-top:2px;accent-color:var(--accent)}
        .m-ft{padding:14px 22px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px}

        /* ===== LIBRARY (home screen) ===== */
        .lib{max-width:1120px;margin:0 auto;padding:48px 24px 86px}
        .lib-head{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:stretch;gap:28px;margin-bottom:26px}
        .lib-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between}
        .lib-eyebrow-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
        .lib-eyebrow-row .lib-eyebrow{margin-bottom:0}
        .profile-wrap{display:inline-flex}
        .profile-wrap .menu-trigger{width:auto;height:auto;padding:0;border:0;background:transparent;box-shadow:none}
        .profile-wrap .menu-trigger:hover{background:transparent}
        .profile-trigger{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font:inherit;font-size:var(--fs-xs);font-weight:700;cursor:pointer;box-shadow:0 1px 1px oklch(20% .006 70 / .05);white-space:nowrap}
        .profile-trigger:hover{background:var(--surface-2)}
        .profile-trigger .presence-av{margin-left:0;width:22px;height:22px;border-width:0;font-size:9px}
        .profile-form{display:grid;gap:8px;padding:8px;min-width:230px}
        .profile-form label{font-size:var(--fs-2xs);font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text-sec)}
        .profile-form-actions{display:flex;gap:6px}
        .lib-eyebrow{font-size:var(--fs-xs);font-weight:700;color:oklch(42% .08 220);margin-bottom:8px}
        .lib-head h1{font-size:34px;font-weight:800;letter-spacing:0;color:var(--text);line-height:1.08}
        .lib-head p{font-size:var(--fs-sm);color:var(--text-sec);margin-top:10px;max-width:56ch;line-height:1.6}
        .lib-actions{display:flex;gap:8px;flex-shrink:0}
        .lib-actions .btn-s,.lib-actions .btn-p{min-height:40px}
        .project-list{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 12px 30px oklch(30% .012 70 / .08)}
        .library-section{margin-top:22px}
        .library-section:first-of-type{margin-top:0}
        .library-section-title{font-size:var(--fs-xs);font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text-sec);margin:0 0 8px 2px}
        .project-row{width:100%;display:grid;grid-template-columns:minmax(0,1fr) 118px 168px 38px;align-items:center;gap:18px;text-align:left;background:var(--surface);border:0;border-bottom:1px solid var(--border-light);padding:17px 18px 17px 20px;cursor:pointer;font-family:inherit;color:var(--text);transition:background .15s,box-shadow .15s}
        .project-row:last-child{border-bottom:0}
        .project-row:hover{background:oklch(97% .006 70)}
        .project-row.current{background:oklch(97.5% .012 220)}
        .project-row.current:hover{background:oklch(96.5% .015 220)}
        .project-row.add{grid-template-columns:1fr;justify-items:center;color:var(--text-sec);border-top:1px dashed var(--border);font-weight:700;background:oklch(98.5% .003 70);padding:15px 18px}
        .project-row.add:hover{color:var(--text);background:var(--surface-2);box-shadow:none}
        .pc-main{min-width:0}
        .pc-name{font-weight:760;font-size:var(--fs-md);color:var(--text);letter-spacing:0;line-height:1.35;white-space:normal;overflow-wrap:anywhere}
        .pc-badge{display:inline-flex;align-items:center;background:oklch(92.5% .04 220);color:oklch(34% .1 220);font-size:var(--fs-2xs);font-weight:800;padding:3px 7px;border-radius:6px;text-transform:none;letter-spacing:0;margin-bottom:6px}
        .pc-badge.cloud{background:oklch(95% .025 245);color:oklch(38% .1 245);margin-left:6px}
        .pc-count,.pc-updated{font-size:var(--fs-xs);color:var(--text-sec);white-space:nowrap}
        .pc-updated{font-variant-numeric:tabular-nums}
        .pc-menu{display:flex;justify-content:flex-end}
        .pc-add-label{font-size:var(--fs-sm)}
        .lib-empty{text-align:center;padding:60px 20px;color:var(--text-sec);border:1px dashed var(--border);border-radius:8px;background:var(--surface);box-shadow:var(--shadow-sm)}
        .lib-footer{margin-top:26px;display:flex;align-items:center;justify-content:space-between;gap:18px;color:var(--text-sec);font-size:var(--fs-xs)}
        .lib-footer a{color:inherit;font-weight:inherit;text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:1px}
        .lib-footer-left,.lib-privacy{display:flex;align-items:center;gap:8px}
        .lib-separator{width:1px;height:12px;background:var(--border)}
        .lib-version{color:inherit;font-variant-numeric:tabular-nums}
        .lib-privacy{justify-content:flex-end;color:inherit;font-weight:inherit}
        .lib-privacy svg{width:14px;height:14px;stroke:currentColor;flex:0 0 auto}
        .icon-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:var(--fs-xs);font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-sec);transition:background .15s}
        .icon-btn:hover{background:var(--surface-2);color:var(--text)}
        .icon-btn.danger:hover{background:oklch(95% .03 20);color:var(--red);border-color:oklch(85% .06 20)}

        /* ===== RESPONSIVE ===== */
        @media(max-width:980px){
            .app-bar-main{grid-template-columns:1fr;align-items:start}
            .ab-status{justify-self:start}
            .ab-actions{width:100%;overflow-x:auto;padding-bottom:1px;scrollbar-width:none}
            .ab-actions::-webkit-scrollbar{display:none}
        }
        @media(max-width:640px){
            .app-bar-main{padding:8px 14px;gap:7px}
            .ab-brand{max-width:100%}
            .ab-brand .inline-title-input,.ch-hdr .inline-title-input{width:100%;min-width:0}
            .ab-btn{padding:5px 8px}
            .ch-hdr{padding:12px 16px 10px}
            .ch-hdr h2{font-size:var(--fs-lg)}
            .lib{padding:28px 16px 80px}
            .lib-head{grid-template-columns:1fr;align-items:start;gap:14px}
            .lib-head h1{font-size:26px}
            .lib-actions{width:100%}
            .lib-actions .btn-s,.lib-actions .btn-p{flex:1}
            .project-row{grid-template-columns:minmax(0,1fr) 38px;gap:10px}
            .pc-count,.pc-updated{display:none}
            .lib-footer{align-items:center;flex-direction:column;gap:10px;text-align:center}
            .lib-privacy{justify-content:center}
        }
        @media print{
            .tab-bar,.m-ov,.ab-actions,.cell-toolbar,.menu-wrap,.add-col-c,.add-row-bar,.insert-zone,.ins-btn,.edit-bottom-pad{display:none}
            .app-bar,.stage-outer{position:static}
            .ll{position:static}
        }

        /* ===== EDIT MODE ===== */
        .cell-toolbar{position:fixed;z-index:320;display:flex;flex-wrap:nowrap;align-items:center;gap:6px;padding:7px;background:oklch(99% .003 70);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-md);width:max-content;max-width:none;white-space:nowrap}
        .tb-group{display:flex;align-items:center;gap:3px}
        .tb-sep{width:1px;height:20px;background:var(--border-light);margin:0 5px}
        .tb-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:var(--fs-xs);font-weight:650;cursor:pointer;color:var(--text-sec);font-family:inherit;line-height:1.1;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:30px;transition:background .13s ease-out,border-color .13s ease-out,color .13s ease-out,transform .13s ease-out}
        .tb-btn svg{width:15px;height:15px;display:block;stroke:currentColor;flex:0 0 auto}
        .tb-btn.icon-only{width:32px;padding:0}
        .tb-btn:hover:not(:disabled){background:var(--surface-2);border-color:var(--text-sec);color:var(--text)}
        .tb-btn:active:not(:disabled){transform:translateY(.5px);background:oklch(94% .004 70)}
        .tb-btn:focus-visible{outline:2px solid oklch(62% .08 250);outline-offset:1px}
        .tb-btn.active{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
        .tb-btn.active:hover:not(:disabled){background:var(--accent-strong);border-color:var(--accent-strong);color:var(--accent-ink)}
        .tb-btn.active:active:not(:disabled){background:var(--accent-strong);transform:translateY(.5px)}
        .tb-btn:disabled{opacity:.4;cursor:not-allowed}
        .tb-hint{font-size:var(--fs-xs);color:var(--text-sec);padding:0 4px;white-space:nowrap}

        /* dropdown menus */
        .menu-wrap{position:relative;display:inline-block}
        .menu-trigger{background:oklch(99% .002 70 / .92);border:1px solid var(--border);border-radius:6px;width:24px;height:24px;line-height:1;cursor:pointer;color:var(--text-sec);padding:0;display:inline-flex;align-items:center;justify-content:center}
        .menu-trigger svg{width:15px;height:15px;stroke:currentColor}
        .menu-trigger:hover{background:var(--surface)}
        .menu-pop{position:absolute;z-index:130;top:100%;left:0;margin-top:3px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-md);padding:6px;min-width:184px;text-align:left;color:var(--text)}
        .menu-pop.right{left:auto;right:0}
        .menu-portal{position:fixed;z-index:300;margin-top:0;max-width:calc(100vw - 16px)}
        .menu-item{display:flex;align-items:center;gap:7px;width:100%;background:none;border:none;padding:8px 10px;border-radius:7px;font-size:var(--fs-sm);font-weight:500;color:var(--text);cursor:pointer;font-family:inherit;text-align:left}
        .menu-item svg{width:15px;height:15px;stroke:currentColor;flex:0 0 auto}
        .menu-item:hover{background:var(--surface-2)}
        .menu-item:disabled{opacity:.38;cursor:not-allowed}
        .menu-item:disabled:hover{background:none}
        .menu-item.danger{color:var(--red)}
        .menu-item.danger:hover{background:oklch(95% .03 20)}
        .menu-label{padding:7px 10px 4px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
        .menu-divider{height:1px;margin:5px 0;background:var(--line)}
        .menu-head{font-size:var(--fs-2xs);font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-sec);padding:6px 10px 3px}
        .menu-sep{height:1px;background:var(--border-light);margin:5px 0}
        .menu-select{width:calc(100% - 2px);margin:0 1px 4px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:var(--fs-xs)}
        .swatches{display:flex;flex-wrap:wrap;gap:5px;padding:4px 10px 6px}
        .swatch{width:20px;height:20px;border-radius:5px;border:1px solid oklch(0% 0 0 / .12);cursor:pointer;padding:0}
        .swatch:hover{outline:2px solid var(--accent);outline-offset:1px}
        .sw-custom{position:relative;overflow:hidden;background:conic-gradient(#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)}
        .sw-input{position:absolute;inset:-4px;width:130%;height:130%;opacity:0;cursor:pointer;border:none;padding:0;background:none}

        /* text-color control in the format toolbar */
        .tb-color{position:relative;display:inline-block}
        .tb-A{border-bottom:3px solid var(--red);line-height:1;padding-bottom:1px;font-weight:700}
        .color-pop{position:absolute;top:100%;left:0;margin-top:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-md);padding:7px;display:flex;flex-wrap:wrap;gap:5px;width:120px;z-index:320}

        /* header cell menus + editable titles */
        .stg-c,.sub-c{position:relative}
        .stg-c .menu-wrap,.sub-c .menu-wrap{position:absolute;top:4px;right:4px}
        .row-menu{position:absolute;top:3px;right:3px;z-index:11}
        .stg-c>.menu-wrap,.sub-c>.menu-wrap,.row-menu{opacity:0;pointer-events:none;transition:opacity .14s ease-out}
        .stg-c:hover>.menu-wrap,.stg-c:focus-within>.menu-wrap,
        .sub-c:hover>.menu-wrap,.sub-c:focus-within>.menu-wrap,
        .ll:hover .row-menu,.ll:focus-within .row-menu{opacity:1;pointer-events:auto}
        .hdr-edit{outline:none;cursor:text;border-radius:5px;transition:background .12s ease-out,box-shadow .12s ease-out}
        .hdr-edit:hover{background:var(--accent-soft);box-shadow:0 0 0 4px var(--accent-soft)}
        .hdr-edit:focus{background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft), inset 0 0 0 2px var(--accent);border-radius:5px}
        .drag-handle{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;border:1px solid oklch(100% 0 0 / .2);background:oklch(100% 0 0 / .08);color:inherit;cursor:grab;font-size:.66rem;line-height:1;vertical-align:middle;user-select:none;opacity:0;pointer-events:none;transition:opacity .14s ease-out,background .14s ease-out}
        .stg-c:hover>.drag-handle,.stg-c:focus-within>.drag-handle,
        .sub-c:hover>.drag-handle,.sub-c:focus-within>.drag-handle,
        .ll:hover .row-drag,.ll:focus-within .row-drag{opacity:.78;pointer-events:auto}
        .drag-handle:hover{opacity:1;background:oklch(100% 0 0 / .16)}
        .drag-handle:active{cursor:grabbing}
        .row-drag{position:absolute;top:5px;left:5px;z-index:11;border-color:var(--border);background:oklch(99% .002 70 / .7);color:var(--text-sec)}
        .row-drag:hover{background:var(--surface)}
        .ll.ll-editing{padding-left:28px}
        .stg-drag,.sub-drag{position:absolute;top:5px;left:5px}
        .dragging{opacity:.56}
        .drop-before{box-shadow:inset 4px 0 0 var(--accent), inset 0 0 0 1px var(--accent-ring)}
        .drop-after{box-shadow:inset -4px 0 0 var(--accent), inset 0 0 0 1px var(--accent-ring)}
        tr.drop-before>.ll,tr.drop-before>.dc{box-shadow:inset 0 4px 0 var(--accent)}
        .add-row-bar.drop-end{box-shadow:inset 0 3px 0 var(--accent);background:var(--accent-soft)}

        /* sub-stage header row */
        .sub-c{background:transparent!important;color:var(--text-sec)!important;font-weight:600!important;font-size:var(--fs-xs)!important;text-align:center!important;vertical-align:middle!important;border:0!important;padding:10px 12px!important}
        .step-chip{display:flex;align-items:center;justify-content:flex-start;min-height:30px;margin:0 3px;padding:5px 10px;border:1px solid oklch(86% .01 70 / .65);border-radius:8px;background:oklch(98.8% .004 70);box-shadow:0 1px 1px oklch(20% .006 70 / .025);line-height:1.2}
        .step-chip-label{position:sticky;left:var(--stage-label-left);display:inline-block;min-width:0;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        /* add column / add row affordances */
        .add-col-c{min-width:62px;width:62px;background:transparent!important;text-align:center!important;border:0!important;vertical-align:middle!important}
        .add-btn{background:var(--surface);color:var(--text);border:1px dashed var(--border);border-radius:6px;padding:5px 11px;font-size:var(--fs-sm);font-weight:700;cursor:pointer;font-family:inherit}
        .add-btn:hover{background:var(--surface-2)}
        .add-row-bar{padding:6px 0 10px;background:var(--canvas);border:0}
        .add-row-btn{background:var(--surface);border:1px dashed var(--border);border-radius:6px;padding:6px 12px;font-size:var(--fs-xs);font-weight:600;color:var(--text-sec);cursor:pointer;font-family:inherit}
        .add-row-btn:hover{background:var(--bg);color:var(--text);border-color:var(--text-sec)}

        /* hover-revealed insert affordances (edit mode): the transparent zone is
           the boundary/gap target; the visible button stays compact. */

        }
        case "column.delete": {
            const f = opFindJourney(J, op.journeyId); if (!f) return null;
            const stages = (f.j.stages || []).map((s) => ({ ...s, subStages: (s.subStages || []).slice() }));
            const loc = opLocateColumn(stages, op.columnId); if (!loc) return null;
            const leafIdx = loc.leafIdx;
            if (loc.subIdx == null) stages.splice(loc.stageIdx, 1);
            else stages[loc.stageIdx].subStages.splice(loc.subIdx, 1);
            const newTotal = Math.max(totalLeaves(stages), 1);
            const nj = opMapRows({ ...f.j, stages }, (cells, row) => row.rowType === DIVIDER_TYPE
                ? collapseDivider(cells, newTotal) : removeLeafFromRow(cells, leafIdx));
            return opReplaceJourney(J, f.idx, nj);
        }
        case "column.move": {
            const f = opFindJourney(J, op.journeyId); if (!f) return null;
            const stages = (f.j.stages || []).map((s) => ({ ...s, subStages: (s.subStages || []).slice() }));
            const loc = opLocateColumn(stages, op.columnId); if (!loc) return null;
            const from = loc.leafIdx;
            let to;
            if ((op.afterColumnId ?? null) == null) to = 0;
            else { const al = opLocateColumn(stages, op.afterColumnId); if (!al) return null; to = al.leafIdx + 1; }
            if (loc.subIdx == null) {
                const afterLoc = (op.afterColumnId ?? null) == null ? null : opLocateColumn(stages, op.afterColumnId);
                const afterStageId = afterLoc ? stages[afterLoc.stageIdx].id : null;
                const movedStages = opMoveAfter(stages, op.columnId, afterStageId);
                if (!movedStages) return null;
                stages.splice(0, stages.length, ...movedStages);
            } else if ((op.afterColumnId ?? null) == null || opLocateColumn(stages, op.afterColumnId)?.stageIdx === loc.stageIdx) {
                const subs = stages[loc.stageIdx].subStages;
                const movedSubs = opMoveAfter(subs, op.columnId, op.afterColumnId ?? null);
                if (!movedSubs) return null;
                stages[loc.stageIdx] = { ...stages[loc.stageIdx], subStages: movedSubs };
            }
            const nj = { ...f.j, stages, subJourneys: (f.j.subJourneys || []).map((sj) => ({
                ...sj, rows: (sj.rows || []).map((r) => moveLeafRangeInRow(r, from, 1, to)),
            })) };

        }
        case "stage.insert": {
            const f = opFindJourney(J, op.journeyId); if (!f) return null;
            const stages = (f.j.stages || []).slice();
            const inserted = opInsertAfter(stages, op.afterStageId ?? null, op.stage); if (!inserted) return null;
            const insertIdx = (op.afterStageId ?? null) == null ? 0 : inserted.findIndex((s) => s.id === op.stage.id);
            const leafIdx = leafStart(inserted, insertIdx);
            const addLeaves = leafCount(op.stage);
            const cellIds = op.cellIds || {};
            const nj = opMapRows({ ...f.j, stages: inserted }, (cells, row) => {
                if (row.rowType === DIVIDER_TYPE) return collapseDivider(cells, totalLeaves(inserted));

                return c;

        }
        case "stage.delete": {
            const f = opFindJourney(J, op.journeyId); if (!f) return null;
            const stages = (f.j.stages || []).slice();
            const sIdx = stages.findIndex((s) => s.id === op.stageId); if (sIdx < 0) return null;
            const start = leafStart(stages, sIdx), cnt = leafCount(stages[sIdx]);
            stages.splice(sIdx, 1);
            const newTotal = Math.max(totalLeaves(stages), 1);
            const nj = opMapRows({ ...f.j, stages }, (cells, row) => {
                if (row.rowType === DIVIDER_TYPE) return collapseDivider(cells, newTotal);
                let c = cells; for (let k = 0; k < cnt; k++) c = removeLeafFromRow(c, start); return c;
            });
            return opReplaceJourney(J, f.idx, nj);
        }
        case "stage.move": {
            const f = opFindJourney(J, op.journeyId); if (!f) return null;
            const stages = (f.j.stages || []).slice();
            const fromIdx = stages.findIndex((s) => s.id === op.stageId); if (fromIdx < 0) return null;
            let toIdx;
            if ((op.afterStageId ?? null) == null) toIdx = 0;
            else { const ai = stages.findIndex((s) => s.id === op.afterStageId); if (ai < 0) return null; toIdx = ai + 1; }
            const start = leafStart(stages, fromIdx), cnt = leafCount(stages[fromIdx]), target = leafStart(stages, toIdx);
            const movedStages = moveArrayRange(stages, fromIdx, 1, toIdx);
            if (movedStages === stages) return opReplaceJourney(J, f.idx, { ...f.j });
            const nj = { ...f.j, stages: movedStages, subJourneys: (f.j.subJourneys || []).map((sj) => ({
                ...sj, rows: (sj.rows || []).map((r) => moveLeafRangeInRow(r, start, cnt, target)),
            })) };
            return opReplaceJourney(J, f.idx, nj);
        }
        case "stage.setLabel": case "stage.setNum": {
            for (let jIdx = 0; jIdx < J.length; jIdx++) {
                const stages = (J[jIdx].stages || []).slice();
                const sIdx = stages.findIndex((s) => s.id === op.stageId); if (sIdx < 0) continue;
                stages[sIdx] = op.t === "stage.setLabel" ? { ...stages[sIdx], title: op.label } : { ...stages[sIdx], num: op.num };
                return opReplaceJourney(J, jIdx, { ...J[jIdx], stages });
            }
            return null;
        }
        case "substage.insert": {
            const f = opFindJourney(J, op.journeyId); if (!f) return null;
            const stages = (f.j.stages || []).map((s) => ({ ...s, subStages: (s.subStages || []).slice() }));
            const sIdx = stages.findIndex((s) => s.id === op.stageId); if (sIdx < 0) return null;
            const before = stages[sIdx].subStages.length;
            const subs = opInsertAfter(stages[sIdx].subStages, op.afterSubStageId ?? null, op.subStage); if (!subs) return null;
            stages[sIdx] = { ...stages[sIdx], subStages: subs };
            const oldL = Math.max(before, 1), newL = Math.max(before + 1, 1);
            if (newL <= oldL) return opReplaceJourney(J, f.idx, { ...f.j, stages });
            const localIdx = subs.findIndex((s) => s.id === op.subStage.id);
            const gi = leafStart(stages, sIdx) + localIdx;
            const cellIds = op.cellIds || {};
            const nj = opMapRows({ ...f.j, stages }, (cells, row) => row.rowType === DIVIDER_TYPE
                ? collapseDivider(cells, totalLeaves(stages))
                : insertLeafWithId(cells, gi, row.id ? cellIds[row.id] : undefined));
            return opReplaceJourney(J, f.idx, nj);
        }
        case "substage.delete": {
            const f = opFindJourney(J, op.journeyId); if (!f) return null;
            const stages = (f.j.stages || []).map((s) => ({ ...s, subStages: (s.subStages || []).slice() }));
            const sIdx = stages.findIndex((s) => s.id === op.stageId); if (sIdx < 0) return null;
            const subs = stages[sIdx].subStages;
            const subIdx = subs.findIndex((s) => s.id === op.subStageId); if (subIdx < 0) return null;
            const before = subs.length; subs.splice(subIdx, 1);
            const oldL = Math.max(before, 1), newL = Math.max(before - 1, 1);
            if (newL >= oldL) return opReplaceJourney(J, f.idx, { ...f.j, stages });
            const gi = leafStart(stages, sIdx) + Math.min(subIdx, oldL - 1);
            const nj = opMapRows({ ...f.j, stages }, (cells, row) => row.rowType === DIVIDER_TYPE
                ? collapseDivider(cells, Math.max(totalLeaves(stages), 1))
                : removeLeafFromRow(cells, gi));
            return opReplaceJourney(J, f.idx, nj);
        }
        case "substage.move": {
            const f = opFindJourney(J, op.journeyId); if (!f) return null;
            const stages = (f.j.stages || []).map((s) => ({ ...s, subStages: (s.subStages || []).slice() }));
            const sIdx = stages.findIndex((s) => s.id === op.stageId); if (sIdx < 0) return null;
            const subs = stages[sIdx].subStages;
            const fromIdx = subs.findIndex((s) => s.id === op.subStageId);
            if (fromIdx < 0 || subs.length <= 1) return null;
            let toIdx;
            if ((op.afterSubStageId ?? null) == null) toIdx = 0;
            else { const ai = subs.findIndex((s) => s.id === op.afterSubStageId); if (ai < 0) return null; toIdx = ai + 1; }
            const start = leafStart(stages, sIdx), fromLeaf = start + fromIdx, toLeaf = start + toIdx;
            const movedSubs = moveArrayRange(subs, fromIdx, 1, toIdx);
            if (movedSubs === subs) return opReplaceJourney(J, f.idx, { ...f.j });
            stages[sIdx] = { ...stages[sIdx], subStages: movedSubs };
            const nj = { ...f.j, stages, subJourneys: (f.j.subJourneys || []).map((sj) => ({
                ...sj, rows: (sj.rows || []).map((r) => moveLeafRangeInRow(r, fromLeaf, 1, toLeaf)),
            })) };
            return opReplaceJourney(J, f.idx, nj);
        }
        case "substage.setLabel": {
            for (let jIdx = 0; jIdx < J.length; jIdx++) {
                const stages = (J[jIdx].stages || []).map((s) => ({ ...s, subStages: (s.subStages || []).slice() }));
                const sIdx = stages.findIndex((s) => s.id === op.stageId); if (sIdx < 0) continue;
                const subIdx = stages[sIdx].subStages.findIndex((s) => s.id === op.subStageId); if (subIdx < 0) return null;
                stages[sIdx].subStages[subIdx] = { ...stages[sIdx].subStages[subIdx], title: op.label };
                return opReplaceJourney(J, jIdx, { ...J[jIdx], stages });
            }
            return null;
        }
        case "subjourney.insert": {
            const f = opFindJourney(J, op.journeyId); if (!f) return null;
            const sjs = opInsertAfter(f.j.subJourneys || [], op.afterSubJourneyId ?? null, op.subJourney); if (!sjs) return null;
            return opReplaceJourney(J, f.idx, { ...f.j, subJourneys: sjs });
        }
        case "subjourney.delete": {
            for (let jIdx = 0; jIdx < J.length; jIdx++) {
                const sjs = J[jIdx].subJourneys || [];
                if (!sjs.some((sj) => sj.id === op.subJourneyId)) continue;
                return opReplaceJourney(J, jIdx, { ...J[jIdx], subJourneys: sjs.filter((sj) => sj.id !== op.subJourneyId) });
            }
            return null;
        }
        case "subjourney.move": {
            for (let jIdx = 0; jIdx < J.length; jIdx++) {
                const sjs = J[jIdx].subJourneys || [];
                if (!sjs.some((sj) => sj.id === op.subJourneyId)) continue;
                const moved = opMoveAfter(sjs, op.subJourneyId, op.afterSubJourneyId ?? null); if (!moved) return null;
                return opReplaceJourney(J, jIdx, { ...J[jIdx], subJourneys: moved });
            }
            return null;
        }
        case "subjourney.setLabel": {
            for (let jIdx = 0; jIdx < J.length; jIdx++) {
                const sjs = (J[jIdx].subJourneys || []).slice();
                const sjIdx = sjs.findIndex((sj) => sj.id === op.subJourneyId); if (sjIdx < 0) continue;
                sjs[sjIdx] = { ...sjs[sjIdx], label: op.label };
                return opReplaceJourney(J, jIdx, { ...J[jIdx], subJourneys: sjs });
            }
            return null;
        }
        case "journey.insert": {
            return opInsertAfter(J, op.afterJourneyId ?? null, op.journey);
        }
        case "journey.delete": {
            if (!J.some((j) => j.id === op.journeyId)) return null;
            return J.filter((j) => j.id !== op.journeyId);
        }
        case "journey.move": {
            return opMoveAfter(J, op.journeyId, op.afterJourneyId ?? null);
        }
        case "journey.rename": {
            const f = opFindJourney(J, op.journeyId); if (!f) return null;
            return opReplaceJourney(J, f.idx, { ...f.j, title: op.name });
        }
        case "journey.setStageLabel": {
            const f = opFindJourney(J, op.journeyId); if (!f) return null;
            return opReplaceJourney(J, f.idx, { ...f.j, stageLabel: op.label });
        }
        default: return null;
    }
}

// Collect unique tags (keyed by case-insensitive text) across the whole
// document, returning the first-seen color for each. Used for autocomplete.
function collectUsedTags() {
    const map = new Map();
    for (const j of __ALL_JOURNEYS || []) {
        for (const sj of j.subJourneys || []) {
            for (const row of sj.rows || []) {
                for (const cell of row.cells || []) {
                    for (const t of cell.tags || []) {
                        if (!t || !t.text) continue;
                        const key = t.text.trim().toLowerCase();
                        if (!key || map.has(key)) continue;
                        map.set(key, { text: t.text.trim(), bg: t.bg, fg: t.fg });
                    }
                }
            }
        }
    }
    return [...map.values()];
}

// Accept a JSON array of journeys, or an exported project file
// ({ name, journeys }). Returns { name?, journeys }.
function parseInput(text) {
    const t = text.trim();
    if (!t) throw new Error("Input is empty.");
    let obj;
    try {
        obj = JSON.parse(t);
    } catch (e) {
        throw new Error(`Invalid JSON: ${e.message}`);
    }
    if (Array.isArray(obj)) return { journeys: obj };
    if (obj && Array.isArray(obj.journeys)) return { name: obj.name, journeys: obj.journeys };
    throw new Error("Expected a JSON array of journeys, or an object with a \"journeys\" array.");
}

function withUniqueSheetTitles(existingJourneys, incomingJourneys) {
    const used = new Set((existingJourneys || []).map((j) => j?.title).filter(Boolean));
    return (incomingJourneys || []).map((journey) => {
        const title = journey?.title;
        if (!title) return journey;
        const match = title.match(/^(.*) \((\d+)\)$/);
        const base = match ? match[1] : title;
        let next = title;
        let n = match ? Number(match[2]) + 1 : 1;
        while (used.has(next)) {
            next = `${base} (${n})`;
            n++;
        }
        used.add(next);
        return next === title ? journey : { ...journey, title: next };
    });
}

function embeddedProject() {
    const el = document.getElementById("sjm-embedded-project");
    if (!el?.textContent?.trim()) return null;
    try {
        const data = JSON.parse(el.textContent);
        return data && Array.isArray(data.journeys) ? data : null;
    } catch (err) {
        console.warn("Embedded project JSON could not be parsed.", err);
        return null;
    }
}

function downloadFile(filename, text, type) {
    const blob = new Blob([text], { type: type || "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    a.remove(); URL.revokeObjectURL(url);
}

function buildStandaloneHtml(payload) {
    const html = document.documentElement.cloneNode(true);
    html.querySelector("#sjm-embedded-project")?.remove();
    html.querySelectorAll(".menu-portal,.cell-toolbar,.m-ov").forEach((el) => el.remove());
    const root = html.querySelector("#root");
    if (root) root.textContent = "";

    const script = document.createElement("script");
    script.id = "sjm-embedded-project";
    script.type = "application/json";
    script.textContent = JSON.stringify(payload, null, 2).replace(/</g, "\\u003c");

    const appScript = html.querySelector('script[type="text/babel"][data-type="module"]');
    if (appScript?.parentNode) appScript.parentNode.insertBefore(script, appScript);
    else html.querySelector("body")?.prepend(script);

    return "<!DOCTYPE html>\n" + html.outerHTML;
}

async function copyTextToClipboard(text) {
    if (navigator.clipboard?.writeText) {
        try {
            await navigator.clipboard.writeText(text);
            return;
        } catch (err) {
            console.warn("Clipboard API failed, falling back to execCommand.", err);
        }
    }
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
}

const filenameTimestamp = (ts) => {
    if (!ts) return null;
    const d = new Date(ts);
    if (Number.isNaN(d.getTime())) return null;
    const pad = (n) => String(n).padStart(2, "0");
    return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
};

const fmtDate = (ts) => {
    if (!ts) return "—";
    const d = new Date(ts);
    const time = d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    const startOfDay = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
    const dayDiff = Math.round((startOfDay(new Date()) - startOfDay(d)) / 86400000);
    if (dayDiff === 0) return time;
    if (dayDiff === 1) return "yesterday " + time;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) + " " + time;
};

// Whole-document, last-write-wins sync against the Lanescape sync Worker.
// See docs/collab-sync.md. Phase 1 is HTTP only (create + hydrate); the live
// WebSocket channel arrives in Phase 2.
const ROUTE_MAP_PARAM = "map";
// API base: localhost during dev, the deployed Worker in production.
// Paste your workers.dev subdomain here once deployed.
const SYNC_API_BASE = /^(localhost|127\.0\.0\.1)$/.test(window.location.hostname)
    ? "http://localhost:8787"
    : "https://lanescape-sync.jinn.workers.dev";

}

// ── Presence identity (Phase 3) ──
// A stable, ephemeral identity for the presence avatar stack: a per-browser
// clientId, a friendly anonymous name, and a deterministic color (HSL hue
// hashed from the clientId). Persisted in localStorage so a refresh keeps the
// same identity; falls back to an in-memory value if storage is unavailable.
const PRESENCE_ANIMALS = ["Otter", "Heron", "Lynx", "Fox", "Wren", "Tapir", "Ibis", "Koel", "Gull", "Mole", "Vole", "Newt", "Crane", "Finch", "Marten"];
const presenceIdKey = "sjm:presenceId";
const presenceNameKey = "sjm:presenceName";

function hashHue(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
    return h % 360;
}

let _presenceIdentity = null;
function getPresenceIdentity() {
    if (_presenceIdentity) return _presenceIdentity;
    let clientId = null;
    let name = null;
    try {
        clientId = localStorage.getItem(presenceIdKey);
        name = localStorage.getItem(presenceNameKey);
    } catch { /* storage unavailable */ }
    if (!clientId) {
        clientId = (crypto.randomUUID ? crypto.randomUUID() : `c_${Math.random().toString(36).slice(2)}${Date.now().toString(36)}`);
        try { localStorage.setItem(presenceIdKey, clientId); } catch { /* ignore */ }
    }
    if (!name) {
        const animal = PRESENCE_ANIMALS[hashHue(clientId) % PRESENCE_ANIMALS.length];
        name = `Anonymous ${animal}`;
        try { localStorage.setItem(presenceNameKey, name); } catch { /* ignore */ }
    }
    const hue = hashHue(clientId);
    const color = `hsl(${hue} 62% 48%)`;
    _presenceIdentity = { clientId, name, color };
    return _presenceIdentity;
}

function setPresenceName(name) {
    const current = getPresenceIdentity();
    const nextName = (name || "").trim().slice(0, 80) || current.name;
    try { localStorage.setItem(presenceNameKey, nextName); } catch { /* ignore */ }
    _presenceIdentity = { ...current, name: nextName };
    return _presenceIdentity;
}

// Initials for an avatar badge ("Anonymous Otter" -> "AO", "Guest-12" -> "G").
function presenceInitials(name) {
    if (!name) return "?";
    const parts = name.trim().split(/\s+/).filter(Boolean);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return name.trim().slice(0, 2).toUpperCase();
}

// The owner/edit token is kept in localStorage keyed by map id, never left in
// the URL after first use.
const mapTokenKey = (mapId) => `sjm:mapToken:${mapId}`;
const getMapToken = (mapId) => {
    try { return localStorage.getItem(mapTokenKey(mapId)); } catch { return null; }
};
const setMapToken = (mapId, token) => {
    try { localStorage.setItem(mapTokenKey(mapId), token); } catch { /* ignore */ }
};
const removeMapToken = (mapId) => {
    try { localStorage.removeItem(mapTokenKey(mapId)); } catch { /* ignore */ }
};

// Password session (Phase 5): when a map requires a password, POST /api/maps/:id/access
// returns a short-lived session token that proves the password factor. It is kept
// in sessionStorage (per-tab, cleared on close) keyed by map id, and passed to
// hydrate (/doc) and the WS (/sync) as &session=. The password is never stored.
const mapSessionKey = (mapId) => `sjm:mapSession:${mapId}`;
const getMapSession = (mapId) => {
    try { return sessionStorage.getItem(mapSessionKey(mapId)); } catch { return null; }
};
const setMapSession = (mapId, session) => {
    try {
        if (session) sessionStorage.setItem(mapSessionKey(mapId), session);
        else sessionStorage.removeItem(mapSessionKey(mapId));
    } catch { /* ignore */ }
};

function writeMapRoute(mapId, { replace = false } = {}) {

    else url.searchParams.set(ROUTE_MAP_PARAM, mapId);
    // Tokens accepted via ?token= on first open are consumed into localStorage
    // and stripped from the address bar.
    url.searchParams.delete("token");
    const state = { serviceJourneyMapper: true, view: mapId == null ? "library" : "project", mapId: mapId ?? null };

}

// POST /api/maps — mint a cloud map from the current journeys. Returns
// { mapId, version, tokens:{owner,editor,viewer} }.
async function apiCreateMap({ name, journeys }) {
    const res = await fetch(`${SYNC_API_BASE}/api/maps`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, journeys }),
    });
    if (!res.ok) throw new Error(`Could not enable sync (${res.status})`);
    return res.json();
}

// GET /api/maps/:id — hydrate. Returns { journeys, version, role, name }.
// When the map is password-gated, pass the session token (from apiAccessMap) as
// &session=; a 401 means a (re)password prompt is needed.
async function apiGetMap(mapId, token, session) {
    const res = await fetch(`${SYNC_API_BASE}/api/maps/${encodeURIComponent(mapId)}?token=${encodeURIComponent(token || "")}&session=${encodeURIComponent(session || "")}`);
    if (res.status === 401) { const e = new Error("This map requires a password."); e.passwordRequired = true; throw e; }
    if (res.status === 403) throw new Error("This link is not valid or has been disabled.");
    if (res.status === 404) throw new Error("This map no longer exists.");
    if (!res.ok) throw new Error(`Could not load map (${res.status})`);
    return res.json();
}

// POST /api/maps/:id/access — password gate (Phase 5). Exchanges a link token
// (+ optional password) for access. Returns { ok, role, passwordRequired, session? }.
// The password is sent in the POST body, never the URL. Owners + non-password
// maps return { ok:true, passwordRequired:false } with no session needed.
async function apiAccessMap(mapId, token, password) {
    const body = { token };
    if (password != null) body.password = password;
    const res = await fetch(`${SYNC_API_BASE}/api/maps/${encodeURIComponent(mapId)}/access`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
    });
    if (res.status === 403) throw new Error("This link is not valid or has been disabled.");
    if (res.status === 404) throw new Error("This map no longer exists.");
    if (res.status === 401) return { ok: false, passwordRequired: true }; // wrong/missing password
    if (!res.ok) throw new Error(`Could not open map (${res.status})`);
    return res.json();
}

// POST /api/maps/:id/links — owner-only link management (Phase 4). Returns
// { links: { editor:{token,enabled}, viewer:{token,enabled} } }.
async function apiManageLink(mapId, ownerToken, body) {
    const res = await fetch(`${SYNC_API_BASE}/api/maps/${encodeURIComponent(mapId)}/links`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: ownerToken, ...body }),
    });
    if (res.status === 403) throw new Error("Only the map owner can manage links.");
    if (res.status === 404) throw new Error("This map no longer exists.");
    if (!res.ok) throw new Error(`Could not manage links (${res.status})`);
    return res.json();
}

// Fetch the current edit/view share links for the owner. The response also
// carries { passwordEnabled } so the owner UI can reflect the password status.
async function apiGetLinks(mapId, ownerToken) {
    return apiManageLink(mapId, ownerToken, { action: "get" });
}

// Owner-only: set/change the map password (Phase 5).
async function apiSetPassword(mapId, ownerToken, password) {
    return apiManageLink(mapId, ownerToken, { action: "setPassword", password });
}

// Owner-only: remove the map password (Phase 5).
async function apiClearPassword(mapId, ownerToken) {
    return apiManageLink(mapId, ownerToken, { action: "clearPassword" });
}

// Owner-only: permanently delete the map from the server.
async function apiDeleteMap(mapId, ownerToken) {
    const res = await fetch(`${SYNC_API_BASE}/api/maps/${encodeURIComponent(mapId)}`, {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: ownerToken }),
    });
    if (res.status === 403) throw new Error("Only the map owner can delete it.");
    if (!res.ok) throw new Error(`Could not delete map (${res.status})`);
    return res.json();
}

function InlineTitleEdit({ value, fallback, className, inputClassName, disabled, onCommit }) {
    const [editing, setEditing] = useState(false);
    const [draft, setDraft] = useState(value || "");
    const inputRef = useRef(null);

    useEffect(() => {
        if (!editing) setDraft(value || "");
    }, [value, editing]);

    useEffect(() => {
        if (!editing) return;
        inputRef.current?.focus();
        inputRef.current?.select();
    }, [editing]);

    const save = () => {
        const next = draft.trim();
        setEditing(false);
        if (next && next !== value) onCommit(next);
    };
    const cancel = () => {
        setDraft(value || "");
        setEditing(false);
    };

    if (editing) {
        return (
            <input ref={inputRef} className={`${className || ""} inline-title-input ${inputClassName || ""}`}
                value={draft} onChange={(e) => setDraft(e.target.value)}
                onBlur={save}
                onKeyDown={(e) => {
                    if (e.key === "Enter") { e.preventDefault(); save(); }
                    if (e.key === "Escape") { e.preventDefault(); cancel(); }
                }} />
        );
    }

    return (
        <span className={`${className || ""} inline-title${disabled ? "" : " editable"}`}
            title={disabled ? (value || "") : "Edit title"}
            onClick={disabled ? undefined : () => setEditing(true)}>
            {value || fallback}
        </span>
    );
}
