<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanescape - Service Journey Mapper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@19.2.0",
            "react/jsx-runtime": "https://esm.sh/react@19.2.0/jsx-runtime",
            "react-dom": "https://esm.sh/react-dom@19.2.0",
            "react-dom/": "https://esm.sh/react-dom@19.2.0/",
            "dexie": "https://esm.sh/dexie@4.0.8"
        }
    }
    </script>


    <script src="https://unpkg.com/@babel/standalone@8.0.2/babel.min.js"></script>
    <style>
        :root {
            /* Type scale — one calm progression, applied everywhere */
            --fs-2xs: 11px;
            --fs-xs:  12px;
            --fs-sm:  13px;
            --fs-md:  14px;
            --fs-lg:  16px;
            --fs-xl:  20px;
            --fs-2xl: 26px;
            /* Warm-neutral ramp, close to shadcn's black and white default */
            --ink-bar:     oklch(99% .002 70);
            --ink-stage:   oklch(95.5% .004 70);
            --ink-sub:     oklch(92.5% .004 70);
            --ink-divider: oklch(48% .008 70);
            /* Primary action is restrained and neutral; semantic row colors stay separate */
            --accent:        oklch(24% .006 70);
            --accent-strong: oklch(18% .006 70);
            --accent-ink:    oklch(98.5% .003 70);
            --accent-soft:   oklch(24% .006 70 / .08);
            --accent-line:   oklch(24% .006 70 / .32);
            --accent-ring:   oklch(24% .006 70 / .22);
            /* Legacy alias — kept so existing references stay valid */
            --primary: var(--ink-stage);
            --red: #c0322f;
            --green: #2f7d4f;
            --blue: #2563a8;
            --purple: #6d4aa0;
            --gold: #b5651d;
            --bg: oklch(97.6% .004 70);
            --surface: oklch(99% .002 70);
            --surface-2: oklch(96.5% .004 70);
            --border: oklch(89% .006 70);
            --border-light: oklch(93.5% .004 70);
            --text: oklch(27% .008 70);
            --text-sec: oklch(52% .006 70);
            --shadow-sm: 0 1px 2px oklch(20% .006 70 / .05), 0 1px 3px oklch(20% .006 70 / .07);
            --shadow-md: 0 8px 24px oklch(20% .006 70 / .11);
            --shadow-lg: 0 18px 50px oklch(20% .006 70 / .2);
            --radius: 10px;
            --appbar-h: 52px;
            --toolbar-h: 0px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:var(--fs-md);line-height:1.5;-webkit-font-smoothing:antialiased}

        /* ===== TOP APP BAR ===== */
        .app-bar{background:var(--ink-bar);color:var(--text);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);box-shadow:0 8px 24px oklch(20% .006 70 / .06)}
        .app-bar-main{display:flex;align-items:center;gap:16px;padding:0 18px;min-height:52px}
        .ab-left{display:flex;align-items:center;gap:12px;min-width:0}
        .ab-back{display:inline-flex;align-items:center;gap:6px;background:var(--surface);color:var(--text);border:1px solid var(--border);padding:7px 11px;border-radius:8px;font-size:var(--fs-sm);font-weight:650;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:background .15s,border-color .15s,box-shadow .15s}
        .ab-back:hover{background:var(--surface-2);border-color:var(--text-sec);box-shadow:0 1px 2px oklch(20% .006 70 / .08)}
        .ab-brand{display:flex;align-items:center;min-width:0;max-width:min(760px,52vw);line-height:1.15}
        .ab-title{font-size:var(--fs-lg);font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
        .ab-spacer{flex:1 1 auto;min-width:8px}
        .inline-title{cursor:default}
        .inline-title.editable{cursor:text;border-radius:5px;transition:background .12s,box-shadow .12s}
        .inline-title.editable:hover{background:var(--accent-soft);box-shadow:0 0 0 4px var(--accent-soft)}
        .inline-title.editable::after{content:"✎";display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;margin-left:8px;border-radius:5px;font-size:.68em;opacity:0;transition:opacity .12s,background .12s;vertical-align:middle;color:var(--text-sec);background:var(--surface-2)}
        .inline-title.editable:hover::after{opacity:1}
        .inline-title-input{font:inherit;font-weight:inherit;color:inherit;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:4px 8px;min-width:260px;max-width:100%;outline:none}
        .ab-brand .inline-title-input{width:min(720px,52vw);min-width:min(520px,52vw)}
        .ch-hdr .inline-title-input{width:min(900px,100%);min-width:min(720px,calc(100vw - 80px))}
        .ch-title-input{background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);padding:2px 6px}
        .ab-status{font-size:var(--fs-xs);font-weight:600;white-space:nowrap;flex-shrink:0;color:var(--text-sec)}
        .ab-actions{display:flex;align-items:center;gap:12px;flex-shrink:0;margin-left:auto}
        .ab-btn{background:transparent;color:var(--text);border:1px solid transparent;padding:6px 10px;border-radius:7px;font-size:var(--fs-xs);font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s,color .15s;white-space:nowrap;min-height:32px}
        .ab-btn:hover{background:var(--surface-2);border-color:var(--border)}
        .ab-btn:disabled{opacity:.4;cursor:not-allowed}
        .history-actions{display:inline-flex;align-items:center;gap:1px}
        .history-btn{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border:1px solid transparent;border-radius:7px;background:transparent;cursor:pointer;padding:0;transition:background .15s,border-color .15s,opacity .15s}
        .history-btn:hover:not(:disabled){background:var(--surface-2);border-color:var(--border)}
        .history-btn:disabled{cursor:not-allowed;opacity:.34}
        .history-btn svg{width:15px;height:15px;display:block;stroke:currentColor}
        /* segmented Edit | View toggle */
        .ab-seg{display:flex;padding:2px;border:1px solid var(--border);border-radius:9px;background:var(--surface-2)}
        .ab-seg button{background:transparent;color:var(--text-sec);border:none;padding:5px 13px;border-radius:7px;font-size:var(--fs-xs);font-weight:650;cursor:pointer;font-family:inherit;min-height:30px;transition:background .15s,color .15s}
        .ab-seg button:hover{color:var(--text)}
        .ab-seg button.on{background:var(--accent);color:var(--accent-ink)}
        .ab-actions .menu-wrap{display:flex}
        .ab-actions .menu-trigger{width:auto;height:auto;min-height:32px;background:var(--surface);border-color:var(--border);color:var(--text);padding:6px 13px;border-radius:8px;font-size:var(--fs-xs);font-weight:700;white-space:nowrap;box-shadow:0 1px 1px oklch(20% .006 70 / .06)}
        .ab-actions .menu-trigger:hover{background:var(--surface-2)}
        .save-state{display:inline-flex;align-items:center;gap:6px}
        .save-dot{width:7px;height:7px;border-radius:999px;display:inline-block;background:var(--green)}
        .save-saving{color:oklch(82% .05 80)}
        .save-saved{color:var(--text-sec)}

        /* ===== MAIN ===== */
        .main-content{padding-bottom:50px;min-height:60vh}

        /* ===== EMPTY ===== */
        .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:8px;text-align:center;padding:48px 20px}
        .empty-icon{font-size:2.6rem;opacity:.9}
        .empty-state h2{font-size:var(--fs-xl);color:var(--text);font-weight:700;letter-spacing:-.01em}
        .empty-state p{color:var(--text-sec);max-width:42ch;font-size:var(--fs-sm);line-height:1.55}
        .empty-actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
        .ideate-card{margin-top:30px;max-width:470px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px 28px;text-align:left;box-shadow:var(--shadow-sm)}
        .ideate-title{display:flex;align-items:center;gap:9px;font-size:var(--fs-md);font-weight:700;color:var(--text);margin-bottom:10px}
        .ideate-icon{flex:0 0 20px;text-align:center}
        .ideate-desc{color:var(--text-sec);font-size:var(--fs-sm);line-height:1.6;margin:0 0 14px 29px;max-width:44ch;text-align:left}
        .ideate-steps{margin:0 0 16px 29px;padding-left:22px;color:var(--text-sec);font-size:var(--fs-sm);line-height:1.65;max-width:44ch}
        .ideate-steps li{padding-left:4px;margin-bottom:4px}
        .ideate-steps b{color:var(--text)}
        .ideate-card .btn-p{width:100%}

        /* ===== BUTTONS ===== */
        .btn-p{background:var(--accent);color:var(--accent-ink);border:1px solid oklch(12% .004 70 / .9);padding:10px 22px;border-radius:8px;font-size:var(--fs-sm);font-weight:700;cursor:pointer;transition:background .15s,box-shadow .15s,transform .15s;box-shadow:inset 0 1px 0 oklch(100% 0 0 / .1),0 1px 2px oklch(20% .006 70 / .12)}
        .btn-p:hover{background:var(--accent-strong);box-shadow:inset 0 1px 0 oklch(100% 0 0 / .08),0 2px 5px oklch(20% .006 70 / .16)}
        .btn-p:active{transform:translateY(1px);box-shadow:inset 0 1px 2px oklch(0% 0 0 / .18)}
        .btn-p:disabled,.btn-s:disabled,.btn-danger:disabled{opacity:.4;cursor:not-allowed}
        .btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:9px 16px;border-radius:8px;font-size:var(--fs-sm);font-weight:600;cursor:pointer;transition:background .15s,border-color .15s}
        .btn-s:hover{background:var(--surface-2);border-color:var(--text-sec)}
        .btn-danger{background:var(--red);color:oklch(98.5% .003 70);border:none;padding:10px 22px;border-radius:8px;font-size:var(--fs-sm);font-weight:700;cursor:pointer;transition:filter .15s}
        .btn-danger:hover{filter:brightness(.93)}
        .pc-rename{font-size:var(--fs-md);font-weight:700;padding:6px 9px}

        /* ===== CHAPTER HDR ===== */
        .ch-hdr{padding:14px 28px 12px;background:var(--surface);border-bottom:1px solid var(--border-light)}
        .ch-hdr h2{font-size:var(--fs-xl);color:var(--text);font-weight:700;letter-spacing:-.015em}

        /* ===== STAGE HDR (STICKY) ===== */
        .stage-outer{position:sticky;top:calc(var(--appbar-h,52px) + var(--toolbar-h,0px));z-index:35;background:var(--ink-stage);border-bottom:1px solid var(--border);box-shadow:0 3px 8px oklch(20% .006 70 / .08)}
        .scroll-hide{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
        .scroll-hide::-webkit-scrollbar{display:none}

        /* ===== SUB-JOURNEY HDR ===== */
        .sj-scroll{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;background:var(--ink-sub);border:1px solid var(--border);border-top:none}
        .sj-scroll::-webkit-scrollbar{display:none}

        /* ===== BP TABLE ===== */
        .bp{border-collapse:collapse;table-layout:fixed;width:max-content}
        .bp td{border:1px solid var(--border-light);padding:11px 13px;vertical-align:top;text-align:left;font-size:var(--fs-sm)}

        /* Lane label */
        .ll{width:180px;min-width:180px;max-width:180px;position:sticky;left:0;z-index:10;font-weight:700;font-size:var(--fs-2xs);text-transform:uppercase;letter-spacing:.6px;background:var(--surface);border-right:2px solid var(--border)}

        /* Stage header cells */
        .stg-ll{background:var(--ink-stage)!important;color:var(--text-sec)!important;border:1px solid var(--border)!important;border-right:2px solid var(--border)!important;text-align:left!important}
        .stg-c{min-width:260px;background:var(--ink-stage)!important;color:var(--text)!important;font-weight:700!important;font-size:var(--fs-md)!important;letter-spacing:-.005em!important;text-align:center!important;vertical-align:middle!important;border:1px solid var(--border)!important}

        /* SJ header cells */
        .sj-ll{background:var(--ink-sub)!important;color:var(--text-sec)!important;border:1px solid var(--border)!important;border-right:2px solid var(--border)!important;font-size:var(--fs-2xs)!important;text-align:left!important}
        .sj-tc{background:var(--ink-sub)!important;color:var(--text-sec)!important;font-weight:650!important;font-size:var(--fs-2xs)!important;text-transform:uppercase!important;letter-spacing:1.4px!important;text-align:center!important;padding:8px 12px!important;border:1px solid var(--border)!important}

        /* Data cell */
        .dc{min-width:260px}
        .dc-span{min-width:auto!important;width:auto!important}

        /* Wrapper */
        .bpw{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-top:none}
        .bpw::-webkit-scrollbar{height:10px}
        .bpw::-webkit-scrollbar-track{background:var(--surface-2)}
        .bpw::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;border:2px solid var(--surface-2)}
        .bpw::-webkit-scrollbar-thumb:hover{background:var(--text-sec)}
        .bpw{scrollbar-width:thin;scrollbar-color:var(--border) var(--surface-2)}

        /* ===== ROW TYPES =====
           Label column carries a soft tint + readable colored label; the data
           column stays near-white so written content always leads. */
        .row-parties>.ll{background:oklch(96% .004 256);color:var(--text-sec)}
        .row-parties>.dc{background:var(--surface-2)}

        .row-operator>.ll{background:var(--surface);color:var(--text)}
        .row-operator>.dc{background:var(--surface)}

        .row-fs-human>.ll{background:oklch(93% .035 245);color:oklch(45% .11 250)}
        .row-fs-human>.dc{background:oklch(98% .012 245)}

        .row-fs-system>.ll{background:oklch(93% .035 245);color:oklch(45% .11 250)}
        .row-fs-system>.dc{background:oklch(98% .012 245)}

        .row-divider>.ll{background:var(--ink-divider);color:oklch(94% .004 70);border-right-color:oklch(100% 0 0 / .25)}
        .row-divider>.dc{background:var(--ink-divider);color:oklch(94% .004 70);font-weight:600;text-align:center;padding:7px 12px;font-size:var(--fs-2xs);text-transform:uppercase;letter-spacing:1.6px}

        .row-bs-human>.ll{background:oklch(94% .04 80);color:oklch(48% .1 65)}
        .row-bs-human>.dc{background:oklch(98.5% .012 80)}

        .row-bs-system>.ll{background:oklch(94% .04 80);color:oklch(48% .1 65)}
        .row-bs-system>.dc{background:oklch(98.5% .012 80)}

        .row-support>.ll{background:oklch(93% .03 305);color:oklch(46% .11 305)}
        .row-support>.dc{background:oklch(98% .012 305)}

        .row-pain>.ll{background:oklch(92% .04 20);color:oklch(48% .14 25)}
        .row-pain>.dc{background:oklch(98.5% .012 20)}

        .row-verbatim>.ll{background:oklch(94% .05 90);color:oklch(45% .09 75)}
        .row-verbatim>.dc{background:oklch(98.5% .02 90);font-style:italic;color:oklch(45% .07 75);font-size:var(--fs-xs)}

        .row-emotion>.ll{background:oklch(93% .04 155);color:oklch(43% .1 155)}
        .row-emotion>.dc{background:oklch(98% .015 155);text-align:center}

        .row-suggest>.ll{background:oklch(93% .035 235);color:oklch(45% .11 245)}
        .row-suggest>.dc{background:oklch(98% .012 235)}

        /* ===== INNER CELL ELEMENTS ===== */


        .bp-bullet{padding-left:14px;position:relative;margin-bottom:4px}
        .bp-bullet::before{content:'•';position:absolute;left:2px;color:var(--accent-strong);font-weight:700}

        .bp-pain-item{padding:4px 8px;background:oklch(96% .03 20);border:1px solid oklch(88% .05 20);border-radius:4px;margin-bottom:4px;font-size:var(--fs-xs)}
        .bp-suggest-item{padding:4px 8px;background:oklch(96% .03 240);border:1px solid oklch(88% .05 240);border-radius:4px;margin-bottom:4px;font-size:var(--fs-xs)}

        .emotion-icon{font-size:1.4rem;display:block;margin-bottom:2px}
        .emotion-text{font-size:var(--fs-xs);font-weight:600}
        .emotion-neg{color:var(--red)}.emotion-pos{color:var(--green)}.emotion-neu{color:var(--gold)}

        .stage-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--accent-strong);color:var(--accent-ink);border:1px solid var(--accent-strong);font-weight:700;font-size:var(--fs-sm)}

        /* ===== EDITABLE ===== */
        td[contenteditable="true"]{cursor:text;outline:none;transition:box-shadow .12s,background .12s}
        td[contenteditable="true"]:hover{box-shadow:inset 0 0 0 1.5px var(--accent-line)}
        td[contenteditable="true"]:focus{box-shadow:inset 0 0 0 2px var(--accent)}

        /* ===== TAB BAR ===== */
        .tab-bar{position:fixed;bottom:0;left:0;right:0;height:42px;background:var(--surface-2);border-top:1px solid var(--border);display:flex;align-items:flex-end;padding:0 8px;z-index:100}
        .tab-scroll{display:flex;align-items:flex-end;overflow-x:auto;flex:1;gap:3px;scrollbar-width:none}
        .tab-scroll::-webkit-scrollbar{display:none}
        .tab-btn{flex-shrink:0;height:32px;border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;background:transparent;color:var(--text-sec);display:flex;align-items:center;max-width:340px;white-space:nowrap;overflow:hidden;transition:background .15s,color .15s}
        .tab-btn:hover{background:var(--surface)}
        .tab-btn.active{background:var(--surface);color:var(--text);border-top:2px solid var(--accent);height:35px;z-index:1}
        .tab-select{min-width:0;flex:1;height:100%;padding:0 14px;border:0;background:transparent;color:inherit;font-size:var(--fs-xs);font-weight:600;cursor:pointer;display:flex;align-items:center;overflow:hidden;font-family:inherit}
        .tab-select{padding-right:6px}
        .tab-ttl{overflow:hidden;text-overflow:ellipsis}
        .tab-del{width:22px;height:22px;margin-right:5px;border:0;border-radius:5px;background:transparent;color:var(--text-sec);font-size:1rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;opacity:.6}
        .tab-del:hover{background:oklch(94% .03 20);color:var(--red);opacity:1}
        .tab-actions{display:flex;align-items:flex-end;gap:6px;margin:0 0 5px 8px;flex-shrink:0}
        .tab-load{height:29px;padding:0 13px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:var(--fs-xs);font-weight:600;cursor:pointer;color:var(--text-sec);transition:background .15s,color .15s;font-family:inherit}
        .tab-load:hover{background:var(--surface-2);color:var(--text)}

        /* ===== MODAL ===== */
        .m-ov{position:fixed;inset:0;background:oklch(25% .02 264 / .42);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:m-fade .14s ease-out}
        @keyframes m-fade{from{opacity:0}to{opacity:1}}
        .m-box{background:var(--surface);border-radius:14px;width:100%;max-width:620px;max-height:82vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:m-rise .18s cubic-bezier(.2,.8,.2,1);will-change:opacity,transform}
        @keyframes m-rise{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
        .m-box.m-sm{max-width:440px}
        .m-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;border-bottom:1px solid var(--border-light)}
        .m-hdr h3{font-size:var(--fs-lg);color:var(--text);font-weight:700;letter-spacing:-.01em}
        .m-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-sec);padding:4px;border-radius:6px;line-height:1}
        .m-close:hover{background:var(--surface-2);color:var(--text)}
        .m-body{padding:16px 22px;flex:1;overflow-y:auto}
        .m-body>p{font-size:var(--fs-sm);color:var(--text-sec);margin-bottom:12px;line-height:1.55}
        .m-body textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:11px;font-family:Menlo,Consolas,monospace;font-size:var(--fs-xs);resize:vertical;line-height:1.5;outline:none}
        .m-body textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
        .m-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:var(--fs-md);color:var(--text);outline:none}
        .m-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
        .m-file{margin-top:10px}
        .m-warn{margin-top:14px;padding:11px 13px;background:oklch(97% .025 85);border:1px solid oklch(84% .065 82);border-radius:8px;font-size:var(--fs-xs);color:oklch(42% .075 78);line-height:1.5}
        .m-summary{display:flex;flex-direction:column;gap:10px;margin-top:14px}
        .m-summary-card{padding:11px 13px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:8px;font-size:var(--fs-xs);line-height:1.5;color:var(--text-sec)}
        .m-summary-card b{color:var(--text)}
        .m-sheet-list{margin-top:6px;padding-left:18px;color:var(--text)}
        .m-sheet-list li{margin-top:3px;overflow-wrap:anywhere}
        .m-check{display:flex;align-items:flex-start;gap:8px;margin-top:10px;color:var(--text);font-size:var(--fs-xs)}
        .m-check input{margin-top:2px;accent-color:var(--accent)}

<div id="root"></div>
<script type="text/babel" data-type="module">
import React, { useState, useEffect, useRef, useCallback, useMemo } from "react";
import { createRoot } from "react-dom/client";
import { createPortal } from "react-dom";
import Dexie from "dexie";

const COL_W = 260;
const LBL_W = 180;
const DIVIDER_TYPE = "row-divider";
const HISTORY_LIMIT = 40;

// ═══════════════════════════════════════
// STRUCTURE HELPERS (columns / rows / cells)
// ═══════════════════════════════════════
// A "leaf" is a rendered data column. A stage with sub-stages contributes one
// leaf per sub-stage; a stage with none contributes a single leaf (itself).
const leafCount   = (stage) => Math.max((stage?.subStages?.length || 0), 1);
const totalLeaves = (stages) => (stages || []).reduce((n, s) => n + leafCount(s), 0);
const leafStart   = (stages, stageIdx) =>
    (stages || []).slice(0, stageIdx).reduce((n, s) => n + leafCount(s), 0);
const nextStageNum = (stages) => {
    const nums = (stages || []).map((s) => Number(s?.num)).filter(Number.isFinite);
    return nums.length ? Math.max(...nums) + 1 : (stages?.length || 0) + 1;
};

const newCell = () => ({ mode: "text", html: "", align: "left" });
const newRow  = (total) => ({
    rowType: "row-operator",
    laneLabel: "New row",
    cells: Array.from({ length: Math.max(total, 1) }, newCell),
});
const blankCells = (total, mode = "text", align = "left") =>
    Array.from({ length: Math.max(total, 1) }, () => ({ mode, html: "", align }));

const rowWidth = (cells) => (cells || []).reduce((a, c) => a + (c.colspan || 1), 0);
function moveArrayRange(items, from, count, to) {
    if (count <= 0 || from === to || from < 0 || from >= items.length) return items;
    const safeCount = Math.min(count, items.length - from);
    const insertAtOriginal = Math.max(0, Math.min(to, items.length));
    if (insertAtOriginal >= from && insertAtOriginal <= from + safeCount) return items;
    const next = items.slice();
    const moved = next.splice(from, safeCount);
    const insertAt = insertAtOriginal > from ? insertAtOriginal - safeCount : insertAtOriginal;
    next.splice(insertAt, 0, ...moved);
    return next;
}

function cellsToLeafCells(cells) {
    const leaves = [];
    (cells || []).forEach((cell, cellIdx) => {
        const w = cell.colspan || 1;
        const base = { ...cell };
        delete base.colspan;
        for (let i = 0; i < w; i++) leaves.push({ ...base, __spanKey: `${cellIdx}` });
    });
    return leaves;
}

function leafCellsToCells(leaves) {
    const out = [];
    (leaves || []).forEach((leaf) => {
        const { __spanKey, ...cell } = leaf;
        const last = out[out.length - 1];
        if (last && last.__spanKey === __spanKey) {
            last.colspan = (last.colspan || 1) + 1;
        } else {
            out.push({ ...cell, __spanKey, colspan: 1 });
        }
    });
    return out.map(({ __spanKey, ...cell }) => {
        if (cell.colspan === 1) delete cell.colspan;
        return cell;
    });
}

function moveLeafRangeInRow(row, from, count, to) {
    if (row.rowType === DIVIDER_TYPE) return row;
    const leaves = cellsToLeafCells(row.cells);
    const moved = moveArrayRange(leaves, from, count, to);
    if (moved === leaves) return row;
    return { ...row, cells: leafCellsToCells(moved) };
}

// Insert one leaf column at global leaf index `at`. If the position falls inside
// a spanning cell, widen that cell; otherwise insert a fresh empty cell.
function insertLeafIntoRow(cells, at) {
    let pos = 0;
    for (let i = 0; i < cells.length; i++) {
        const w = cells[i].colspan || 1;
        if (at < pos + w) {
            const nc = cells.slice();
            if (at === pos) nc.splice(i, 0, newCell());
            else nc[i] = { ...nc[i], colspan: w + 1 };
            return nc;
        }
        pos += w;
    }
    return [...cells, newCell()];
}

// Remove the leaf column at global leaf index `at`. Shrinks a spanning cell or
// drops a single-width cell.
function removeLeafFromRow(cells, at) {
    let pos = 0;
    for (let i = 0; i < cells.length; i++) {
        const w = cells[i].colspan || 1;
        if (at < pos + w) {
            const nc = cells.slice();
            if (w > 1) {
                const cell = { ...nc[i], colspan: w - 1 };
                if (cell.colspan === 1) delete cell.colspan;
                nc[i] = cell;
            } else nc.splice(i, 1);
            return nc;
        }
        pos += w;
    }
    return cells;
}

// Pad/trim a row's cells so its total width matches `total` leaves.
function normalizeRowCells(cells, total) {
    let w = rowWidth(cells);
    if (w === total) return cells;
    const nc = cells.slice();
    while (w < total) { nc.push(newCell()); w++; }
    while (w > total && nc.length) {
        const last = nc[nc.length - 1];
        const lw = last.colspan || 1;
        if (lw > 1) {
            const c = { ...last, colspan: lw - 1 };
            if (c.colspan === 1) delete c.colspan;
            nc[nc.length - 1] = c;
        } else nc.pop();
        w--;
    }
    return nc;
}

// A divider row is always a single cell merged across every column.
function collapseDivider(cells, total) {
    const first = cells[0] || newCell();
    const c = { mode: "text", html: first.html ?? "", align: first.align || "center" };
    if (total > 1) c.colspan = total;
    return [c];
}
// Expand a (former) divider back into one cell per column.
function expandDivider(cells, total) {
    const first = { ...(cells[0] || newCell()) };
    delete first.colspan;
    return normalizeRowCells([first], total);
}

// Normalize loaded data: ensure stages/cells carry the fields the editor needs.
function hydrate(journeys) {
    return (journeys || []).map((j) => {
        const stages = (j.stages || []).map((s) => ({ ...s, subStages: s.subStages || [] }));
        const total = totalLeaves(stages);
        const subJourneys = (j.subJourneys || []).map((sj) => ({
            ...sj,
            rows: (sj.rows || []).map((r) => {
                const rowType = r.rowType;
                let cells = (r.cells || []).map((c) => ({
                    mode: c.mode || "text",
                    html: c.html ?? "",
                    align: c.align || "left",
                    ...(c.colspan ? { colspan: c.colspan } : {}),
                    ...(c.tags ? { tags: c.tags } : {}),
                }));
                cells = normalizeRowCells(cells, total);
                if (rowType === DIVIDER_TYPE) cells = collapseDivider(cells, total);
                return { ...r, rowType, cells };
            }),
        }));
        return { ...j, stages, subJourneys };
    });
}

// Accept a JSON array of journeys, or an exported project file
// ({ name, journeys }). Returns { name?, journeys }.
function parseInput(text) {
    const t = text.trim();
    if (!t) throw new Error("Input is empty.");
    let obj;
    try {
        obj = JSON.parse(t);
    } catch (e) {
        throw new Error(`Invalid JSON: ${e.message}`);
    }
    if (Array.isArray(obj)) return { journeys: obj };
    if (obj && Array.isArray(obj.journeys)) return { name: obj.name, journeys: obj.journeys };
    throw new Error("Expected a JSON array of journeys, or an object with a \"journeys\" array.");
}

function withUniqueSheetTitles(existingJourneys, incomingJourneys) {
    const used = new Set((existingJourneys || []).map((j) => j?.title).filter(Boolean));
    return (incomingJourneys || []).map((journey) => {
        const title = journey?.title;
        if (!title) return journey;
        const match = title.match(/^(.*) \((\d+)\)$/);
        const base = match ? match[1] : title;
        let next = title;
        let n = match ? Number(match[2]) + 1 : 1;
        while (used.has(next)) {
            next = `${base} (${n})`;
            n++;
        }
        used.add(next);
        return next === title ? journey : { ...journey, title: next };
    });
}

async function copyTextToClipboard(text) {
    if (navigator.clipboard?.writeText) {
        try {
            await navigator.clipboard.writeText(text);
            return;
        } catch (err) {
            console.warn("Clipboard API failed, falling back to execCommand.", err);
        }
    }
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
}

const fmtDate = (ts) => {
    if (!ts) return "—";
    const d = new Date(ts);
    const time = d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    const startOfDay = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
    const dayDiff = Math.round((startOfDay(new Date()) - startOfDay(d)) / 86400000);
    if (dayDiff === 0) return time;

    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) + " " + time;

function InlineTitleEdit({ value, fallback, className, inputClassName, disabled, onCommit }) {
    const [editing, setEditing] = useState(false);
    const [draft, setDraft] = useState(value || "");
    const inputRef = useRef(null);

    useEffect(() => {
        if (!editing) setDraft(value || "");
    }, [value, editing]);

    useEffect(() => {
        if (!editing) return;
        inputRef.current?.focus();
        inputRef.current?.select();
    }, [editing]);

    const save = () => {
        const next = draft.trim();
        setEditing(false);
        if (next && next !== value) onCommit(next);
    };
    const cancel = () => {
        setDraft(value || "");
        setEditing(false);
    };

    if (editing) {
        return (
            <input ref={inputRef} className={`${className || ""} inline-title-input ${inputClassName || ""}`}
                value={draft} onChange={(e) => setDraft(e.target.value)}
                onBlur={save}
                onKeyDown={(e) => {
                    if (e.key === "Enter") { e.preventDefault(); save(); }
                    if (e.key === "Escape") { e.preventDefault(); cancel(); }
                }} />
        );
    }

    return (
        <span className={`${className || ""} inline-title${disabled ? "" : " editable"}`}
            title={disabled ? (value || "") : "Edit title"}
            onClick={disabled ? undefined : () => setEditing(true)}>
            {value || fallback}
        </span>
    );
}

function LoadModal({ onLoad, onClose, currentProjectName, existingJourneys = [] }) {
    const [text, setText] = useState("");
    const [review, setReview] = useState(null);
    const [confirmedProjectDetails, setConfirmedProjectDetails] = useState(false);
    const existingCount = existingJourneys.length;
    const fileRef = useRef(null);
    const bodyRef = useRef(null);

    useEffect(() => {
        if (!review) return;
        bodyRef.current?.scrollTo({ top: bodyRef.current.scrollHeight, behavior: "smooth" });
    }, [review]);

    const handleFile = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => { setText(ev.target.result); setReview(null); setConfirmedProjectDetails(false); };
        r.readAsText(f);
    };

    const getImportReview = () => {
        const parsed = parseInput(text);
        const data = hydrate(parsed.journeys);
        if (!data.length) throw new Error("No valid journey data found.");
        const nextProjectName = parsed.name?.trim() || null;
        const sameProjectName = !currentProjectName || !nextProjectName || nextProjectName === currentProjectName;
        const existingTitles = new Set(existingJourneys.map((j) => j?.title).filter(Boolean));
        const affectedSheets = data
            .map((j) => j?.title)
            .filter((title) => title && existingTitles.has(title));
        return { data, nextProjectName, sameProjectName, affectedSheets };
    };

    const handleReview = () => {
        if (!text.trim()) return;
        try {
            const nextReview = getImportReview();
            setReview(nextReview);
            setConfirmedProjectDetails(false);
            if (!nextReview.affectedSheets.length && (nextReview.sameProjectName || existingCount === 0)) handleSubmit("replace", nextReview);
        }
        catch (err) { alert("Error parsing data:\n" + err.message); }
    };

    const handleSubmit = async (mode, nextReview = review) => {
        if (!text.trim()) return;
        const importReview = nextReview || getImportReview();
        try { await onLoad(text, mode, { updateProjectName: mode === "replace" && !!importReview.nextProjectName && importReview.sameProjectName }); onClose(); }
        catch (err) { alert("Error parsing data:\n" + err.message); }
    };

    const needsChoice = review && review.affectedSheets.length > 0;
    const needsProjectDetailsConfirm = review && !review.sameProjectName && existingCount > 0;
    const canImport = review && (!needsProjectDetailsConfirm || confirmedProjectDetails);

    return (
        <div className="m-ov" onClick={onClose}>
            <div className="m-box" onClick={(e) => e.stopPropagation()}>
                <div className="m-hdr">
                    <h3>Load JSON Data</h3>
                    <button className="m-close" onClick={onClose}>✕</button>
                </div>
                <div ref={bodyRef} className="m-body">
                    <p>Paste extracted JSON below, or upload a <code>.json</code> / <code>.txt</code> file. Exported project files are also accepted.</p>
                    <textarea value={text} onChange={(e) => { setText(e.target.value); setReview(null); setConfirmedProjectDetails(false); }} rows={14}
                        placeholder={'Paste JSON here…\n\nA JSON array of service journeys (each item = one tab).'} />
                    <div className="m-file">
                        <button className="btn-s" onClick={() => fileRef.current?.click()}>📁 Upload file</button>
                        <input ref={fileRef} type="file" accept=".json,.txt" onChange={handleFile} style={{ display: "none" }} />
                    </div>
                    {review && (needsChoice || needsProjectDetailsConfirm) && (
                        <div className="m-summary">
                            {needsChoice && (
                                <div className="m-warn">
                                    ⚠️ {review.affectedSheets.length} imported sheet{review.affectedSheets.length === 1 ? "" : "s"} match existing sheet title{review.affectedSheets.length === 1 ? "" : "s"}.
                                    <b>Affected:</b>
                                    <ul className="m-sheet-list">
                                        {review.affectedSheets.map((title) => <li key={title}>{title}</li>)}
                                    </ul>
                                </div>
                            )}
                            {needsProjectDetailsConfirm && (
                                <div className="m-summary-card">
                                    <b>Different project details</b><br />
                                    Imported project name: {review.nextProjectName}
                                    {currentProjectName && <> <br />Current project name: {currentProjectName}</>}
                                    <label className="m-check">
                                        <input type="checkbox" checked={confirmedProjectDetails} onChange={(e) => setConfirmedProjectDetails(e.target.checked)} />
                                        Keep the current project details and add only the imported sheets.
                                    </label>
                                </div>
                            )}
                        </div>
                    )}
                </div>
                <div className="m-ft">
                    <button className="btn-s" onClick={onClose}>Cancel</button>
                    {!review ? (
                        <button className="btn-p" onClick={handleReview} disabled={!text.trim()}>Load Data</button>
                    ) : needsChoice ? (
                        <>
                            <button className="btn-danger" onClick={() => handleSubmit("overwriteAffected")} disabled={!canImport}>Overwrite affected sheets</button>
                            <button className="btn-p" onClick={() => handleSubmit("append")} disabled={!canImport}>Add as new sheets</button>
                        </>
                    ) : needsProjectDetailsConfirm ? (
                        <button className="btn-p" onClick={() => handleSubmit("append")} disabled={!canImport}>Add sheets</button>
                    ) : existingCount > 0 ? (
                        <button className="btn-p" onClick={() => handleSubmit("append")} disabled={!text.trim()}>Add sheets</button>
                    ) : (
                        <button className="btn-p" onClick={() => handleSubmit("replace")} disabled={!text.trim()}>Load Data</button>
                    )}
                </div>
            </div>
        </div>
    );
}

function ConfirmModal({ title, message, confirmLabel, danger, onConfirm, onClose }) {
    useEffect(() => {
        const h = (e) => { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", h);
        return () => window.removeEventListener("keydown", h);
    }, [onClose]);
    return (
        <div className="m-ov" onClick={onClose}>
            <div className="m-box m-sm" onClick={(e) => e.stopPropagation()}>
                <div className="m-hdr">

                <div className="m-body"><p style={{ margin: 0 }}>{message}</p></div>
                <div className="m-ft">
                    <button className="btn-s" onClick={onClose}>Cancel</button>
                    <button className={danger ? "btn-danger" : "btn-p"}
                        onClick={() => { onConfirm(); onClose(); }}>{confirmLabel || "Confirm"}</button>

function ProjectCard({ p, current, onOpen, onRename, onDelete }) {
    const [editing, setEditing] = useState(false);
    const [draft, setDraft] = useState(p.name);
    const inputRef = useRef(null);
    useEffect(() => { if (editing) { inputRef.current?.focus(); inputRef.current?.select(); } }, [editing]);
    const startRename = () => { setDraft(p.name); setEditing(true); };
    const commit = () => {
        const n = draft.trim();
        setEditing(false);
        if (n && n !== p.name) onRename(p.id, n); else setDraft(p.name);
    };
    const count = p.journeys?.length || 0;
    return (
        <div className={`project-row${current ? " current" : ""}`} role="button" tabIndex={0}
            onClick={() => !editing && onOpen(p.id)}
            onKeyDown={(e) => { if (!editing && (e.key === "Enter" || e.key === " ")) { e.preventDefault(); onOpen(p.id); } }}>
            <div className="pc-main">
                {current && <span className="pc-badge">Last opened</span>}
                {editing ? (
                    <input ref={inputRef} className="m-input pc-rename" value={draft}
                        onClick={(e) => e.stopPropagation()} onChange={(e) => setDraft(e.target.value)} onBlur={commit}
                        onKeyDown={(e) => {
                            if (e.key === "Enter") { e.preventDefault(); commit(); }
                            if (e.key === "Escape") { setDraft(p.name); setEditing(false); }
                        }} />
                ) : (
                    <div className="pc-name" title={p.name}>{p.name}</div>
                )}
            </div>
            <div className="pc-count">{count} journey{count === 1 ? "" : "s"}</div>
            <div className="pc-updated">Modified {fmtDate(p.updatedAt)}</div>
            <div className="pc-menu" onClick={(e) => e.stopPropagation()}>
                <Menu align="right">
                    {(close) => (
                        <>
                            <button className="menu-item" onClick={() => { startRename(); close(); }}><LucideIcon name="pencil" />Rename</button>
                            <button className="menu-item danger" onClick={() => { onDelete(p.id, p.name); close(); }}><LucideIcon name="trash2" />Delete</button>
                        </>
                    )}
                </Menu>
            </div>
        </div>
    );
}

                    <LucideIcon name="shieldCheck" />
                    <span>Private by default. All data is saved in this browser only.</span>
                </div>
            </footer>
        </div>
    );
}

// ═══════════════════════════════════════
// TAB BAR
// ═══════════════════════════════════════
function TabBar({ journeys, activeTab, setActiveTab, onNew, onLoad, onDelete, viewOnly }) {
    if (!journeys.length) return null;
    if (viewOnly && journeys.length <= 1) return null;
    return (
        <div className="tab-bar">
            <div className="tab-scroll">
                {journeys.map((j, i) => (
                    <div key={j.id + i} className={`tab-btn${i === activeTab ? " active" : ""}`}>
                        <button className="tab-select" onClick={() => setActiveTab(i)} title={j.title}>
                            <span className="tab-ttl">{j.title}</span>
                        </button>
                        {!viewOnly && (
                            <button className="tab-del" aria-label={`Delete ${j.title}`}
                                title="Delete sheet" onClick={() => onDelete(i)}>×</button>
                        )}
                    </div>
                ))}
            </div>
            {!viewOnly && (
                <div className="tab-actions">
                    <button className="tab-load" onClick={onLoad}>+ Load</button>
                    <button className="tab-load" onClick={onNew}>+ New</button>
                </div>
            )}
        </div>
    );
}

// ═══════════════════════════════════════
// DROPDOWN MENU (click-away)
// ═══════════════════════════════════════
function Menu({ trigger, align, children }) {
    const [open, setOpen] = useState(false);
    const [pos, setPos] = useState(null);
    const triggerRef = useRef(null);
    const popRef = useRef(null);

    // Position the popup (rendered in a body-level portal so it escapes the
    // table's overflow:auto scroll containers and sticky stacking contexts).
    const place = useCallback(() => {
        const t = triggerRef.current;
        if (!t) return;
        const r = t.getBoundingClientRect();
        setPos({ top: r.bottom + 3, left: r.left, right: window.innerWidth - r.right });
    }, []);

    useEffect(() => {
        if (!open) return;
        place();
        const onDown = (e) => {
            if (popRef.current?.contains(e.target) || triggerRef.current?.contains(e.target)) return;
            setOpen(false);
        };
        document.addEventListener("mousedown", onDown);
        window.addEventListener("scroll", place, true);
        window.addEventListener("resize", place);
        return () => {
            document.removeEventListener("mousedown", onDown);
            window.removeEventListener("scroll", place, true);
            window.removeEventListener("resize", place);
        };
    }, [open, place]);

    return (
        <span className="menu-wrap" ref={triggerRef}>
            <button className="menu-trigger" title="Options" aria-label="Options"
                onClick={(e) => { e.stopPropagation(); setOpen((o) => !o); }}>{trigger || <LucideIcon name="moreVertical" />}</button>
            {open && pos && createPortal(
                <div ref={popRef} className="menu-pop menu-portal"
                    style={align === "right" ? { top: pos.top, right: pos.right, left: "auto" } : { top: pos.top, left: pos.left }}
                    onClick={(e) => e.stopPropagation()}>
                    {typeof children === "function" ? children(() => setOpen(false)) : children}
                </div>, document.body)}
        </span>
    );
}

// ═══════════════════════════════════════
// TAG ADDER (inline, for tags-mode cells)
// ═══════════════════════════════════════
function TagAdder({ onAdd, existing = [] }) {
    const [text, setText] = useState("");
    const [ci, setCi] = useState(0);
    const [pickerOpen, setPickerOpen] = useState(false);
    const [open, setOpen] = useState(false);
    const [hi, setHi] = useState(0);
    const [pickerPos, setPickerPos] = useState(null);
    const [suggestPos, setSuggestPos] = useState(null);
    const rootRef = useRef(null);
    const swatchRef = useRef(null);
    const inputRef = useRef(null);
    const c = TAG_COLORS[ci];

    const taken = useMemo(
        () => new Set(existing.map((t) => (t.text || "").trim().toLowerCase())),
        [existing]
    );

    // Previously-used tags across the doc that match the query and aren't
    // already on this row. Empty query → show all available (capped).
    const suggestions = useMemo(() => {
        const q = text.trim().toLowerCase();
        return collectUsedTags()
            .filter((t) => !taken.has(t.text.toLowerCase()))
            .filter((t) => !q || t.text.toLowerCase().includes(q))
            .slice(0, 8);
    }, [text, taken]);

    const exactExists = useMemo(() => {
        const q = text.trim().toLowerCase();
        return !!q && taken.has(q);
    }, [text, taken]);

    // Unified, navigable option list: matching existing tags first, then a
    // "create new" entry when the typed text isn't already a suggestion/taken.
    const options = useMemo(() => {
        const opts = suggestions.map((t) => ({ kind: "existing", tag: t, key: "e:" + t.text }));
        const q = text.trim();
        if (q && !exactExists && !suggestions.some((s) => s.text.toLowerCase() === q.toLowerCase())) {
            opts.push({ kind: "new", text: q, key: "n:" + q });
        }
        return opts;
    }, [suggestions, text, exactExists]);

    // Keep highlight in range; default to the first option.
    useEffect(() => { setHi(0); }, [text]);
    useEffect(() => {
        setHi((h) => (options.length ? Math.min(h, options.length - 1) : 0));
    }, [options.length]);

    // Position popovers (portaled to body) relative to their anchors, opening
    // upward so they clear the cell toolbar that sits below the cell.
    const placePicker = useCallback(() => {
        const el = swatchRef.current;
        if (!el) return;
        const r = el.getBoundingClientRect();
        setPickerPos({ left: r.left, bottom: window.innerHeight - r.top + 6 });
    }, []);
    const placeSuggest = useCallback(() => {
        const el = inputRef.current;
        if (!el) return;
        const r = el.getBoundingClientRect();
        setSuggestPos({ left: r.left, bottom: window.innerHeight - r.top + 6, minWidth: r.width });
    }, []);

    useEffect(() => {
        if (!pickerOpen) return;
        placePicker();
        window.addEventListener("scroll", placePicker, true);
        window.addEventListener("resize", placePicker);
        return () => { window.removeEventListener("scroll", placePicker, true); window.removeEventListener("resize", placePicker); };
    }, [pickerOpen, placePicker]);

    useEffect(() => {
        if (!open) return;
        placeSuggest();
        window.addEventListener("scroll", placeSuggest, true);
        window.addEventListener("resize", placeSuggest);
        return () => { window.removeEventListener("scroll", placeSuggest, true); window.removeEventListener("resize", placeSuggest); };
    }, [open, placeSuggest]);

    // Close popovers when clicking outside (root or the portaled popovers).
    useEffect(() => {
        if (!open && !pickerOpen) return;
        const onDown = (e) => {
            const t = e.target;
            if (rootRef.current?.contains(t)) return;
            if (t.closest?.(".tag-color-pop, .tag-suggest")) return;
            setOpen(false); setPickerOpen(false);
        };
        document.addEventListener("mousedown", onDown);
        return () => document.removeEventListener("mousedown", onDown);
    }, [open, pickerOpen]);

    const reset = () => { setText(""); setOpen(false); setHi(0); };

    const addNew = () => {
        const t = text.trim();
        if (!t || taken.has(t.toLowerCase())) return;
        // If the typed text matches a previously-used tag, reuse its color
        // instead of the picker color so tag colors stay consistent.
        const match = collectUsedTags().find((u) => u.text.toLowerCase() === t.toLowerCase());
        if (match) onAdd({ text: match.text, bg: match.bg, fg: match.fg });
        else onAdd({ text: t, bg: c.bg, fg: c.fg });
        reset();
    };
    const addExisting = (tag) => {
        if (taken.has(tag.text.toLowerCase())) return;
        onAdd({ text: tag.text, bg: tag.bg, fg: tag.fg });
        reset();
    };
    const commitOption = (opt) => {
        if (!opt) { addNew(); return; }
        if (opt.kind === "existing") addExisting(opt.tag);
        else addNew();
    };

    const onKeyDown = (e) => {
        if (e.key === "ArrowDown") {
            e.preventDefault();
            if (options.length) { setOpen(true); setHi((h) => (h + 1) % options.length); }
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (options.length) { setOpen(true); setHi((h) => (h - 1 + options.length) % options.length); }
        } else if (e.key === "Enter") {
            e.preventDefault();
            if (open && options.length) commitOption(options[hi]);
            else addNew();
        } else if (e.key === "Escape") {
            setOpen(false); setPickerOpen(false);
        }
    };

    return (
        <div className="tag-add" contentEditable={false} ref={rootRef}>
            <div className="tag-add-row">
                <button ref={swatchRef} className="tag-add-color" style={{ background: c.bg }}
                    title={`color: ${c.name}`}
                    onClick={() => { setPickerOpen((o) => !o); setOpen(false); }} />
                <input ref={inputRef} value={text} placeholder="add tag…"
                    onChange={(e) => { setText(e.target.value); setOpen(true); setPickerOpen(false); }}
                    onFocus={() => { setOpen(true); setPickerOpen(false); }}
                    onKeyDown={onKeyDown} />
                <button className="tag-add-go" onClick={addNew} disabled={!text.trim() || exactExists}
                    title={exactExists ? "tag already added" : "add new tag"}>＋</button>
            </div>
            {pickerOpen && pickerPos && createPortal(
                <div className="tag-color-pop" style={{ left: pickerPos.left, bottom: pickerPos.bottom }}>
                    {TAG_COLORS.map((col, i) => (
                        <button key={col.name} className={`tag-color-cell${i === ci ? " sel" : ""}`}
                            style={{ background: col.bg }} title={col.name}
                            onMouseDown={(e) => { e.preventDefault(); setCi(i); setPickerOpen(false); }} />
                    ))}
                </div>, document.body)}
            {open && suggestPos && (options.length > 0 || exactExists) && createPortal(
                <div className="tag-suggest" style={{ left: suggestPos.left, bottom: suggestPos.bottom, minWidth: suggestPos.minWidth }}>
                    {exactExists && (
                        <div className="tag-suggest-note">already added to this cell</div>
                    )}
                    {options.map((opt, i) => opt.kind === "existing" ? (
                        <button key={opt.key} className={`tag-suggest-item${i === hi ? " hi" : ""}`}
                            onMouseEnter={() => setHi(i)}
                            onMouseDown={(e) => { e.preventDefault(); addExisting(opt.tag); }}>
                            <span className="tag-chip" style={{ background: opt.tag.bg, color: opt.tag.fg }}>{opt.tag.text}</span>
                            <span className="tag-suggest-hint">existing</span>
                        </button>
                    ) : (
                        <button key={opt.key} className={`tag-suggest-item tag-suggest-new${i === hi ? " hi" : ""}`}
                            onMouseEnter={() => setHi(i)}
                            onMouseDown={(e) => { e.preventDefault(); addNew(); }}>
                            <span className="tag-chip" style={{ background: c.bg, color: c.fg }}>{opt.text}</span>
                            <span className="tag-suggest-hint">create new</span>
                        </button>
                    ))}
                </div>, document.body)}
        </div>
    );
}

// ═══════════════════════════════════════
// EDITABLE CELL (uncontrolled contentEditable + save/discard)
// ═══════════════════════════════════════
// We own the DOM after mount and only re-sync innerHTML from props when the
// element is NOT focused. This avoids React resetting the caret to the start
// while typing. The edit commits when the cell loses focus (click away, or
// Escape to finish via the keyboard).
function EditableCell({ html, editMode, className, style, colSpan, cellKey, onCommit, onFocusCell, onDone }) {
    const ref = useRef(null);

    useEffect(() => {
        const el = ref.current;
        if (!el || document.activeElement === el) return;
        const next = html || "";
        if (el.innerHTML !== next) el.innerHTML = next;
    }, [html]);

    const handleFocus = () => { onFocusCell?.(); };
    const handleBlur = () => {
        onCommit(ref.current?.innerHTML ?? "");
        onDone?.();
    };
    const handleKeyDown = (e) => {
        // Escape just finishes editing (blur commits); it does not discard.
        if (e.key === "Escape") { e.preventDefault(); ref.current?.blur(); return; }
        // Own the B/I/U shortcuts so they apply our formatting (matching the
        // toolbar) instead of relying on the browser's default contentEditable
        // handling, which can vary by browser/markup.
        if ((e.metaKey || e.ctrlKey) && !e.altKey) {
            const cmd = { b: "bold", i: "italic", u: "underline" }[e.key.toLowerCase()];
            if (cmd) { e.preventDefault(); document.execCommand(cmd, false, null); }
        }
    };

    return (
        <td ref={ref} className={className} style={style} colSpan={colSpan}
            data-cell-key={cellKey}
            contentEditable={editMode} suppressContentEditableWarning
            onFocus={handleFocus} onBlur={handleBlur} onKeyDown={handleKeyDown} />
    );
}

// ═══════════════════════════════════════
// CELL
// ═══════════════════════════════════════
function Cell({ cell, editMode, selected, rowBg, cellKey, onSelect, onEditHtml, onTagsChange, onDeselect }) {
    const mode = cell.mode || "text";
    const alignClass = (cell.align || "left") === "center" ? "al-center" : "al-left";
    const cls = `dc ${alignClass}${cell.colspan ? " dc-span" : ""}${selected ? " cell-sel" : ""}`;
    const style = rowBg ? { background: rowBg } : undefined;

    if (mode === "tags") {
        const tags = cell.tags || [];
        return (
            <td className={cls} colSpan={cell.colspan || undefined} style={style}
                data-cell-key={cellKey} onClick={onSelect}>
                <div className="cell-tags" style={{ justifyContent: (cell.align || "left") === "center" ? "center" : "flex-start" }}>
                    {tags.map((t, i) => (
                        <span key={i} className="tag-chip" style={{ background: t.bg, color: t.fg }}>
                            {t.text}
                            {editMode && selected && <span className="tag-x" title="remove"
                                onClick={(e) => { e.stopPropagation(); onTagsChange(tags.filter((_, k) => k !== i)); }}>✕</span>}
                        </span>
                    ))}
                    {!tags.length && !editMode && <span style={{ color: "var(--text-sec)" }}>—</span>}
                </div>
                {editMode && selected && <TagAdder existing={tags} onAdd={(t) => onTagsChange([...tags, t])} />}
            </td>
        );
    }

    const modeClass = mode === "bullets" ? " cell-bullets" : mode === "boxes" ? " cell-boxes" : "";
    return (
        <EditableCell html={cell.html} editMode={editMode}
            className={`${cls}${modeClass}`} colSpan={cell.colspan || undefined} style={style}
            cellKey={cellKey} onCommit={onEditHtml} onFocusCell={onSelect} onDone={onDeselect} />
    );
}

// ═══════════════════════════════════════
// BLUEPRINT ROW

function BlueprintRow({ row, rowIdx, editMode, total, selectedCellIdx, cellKeyPrefix, dragState, dropRowIdx,

                    <span className="row-menu">

                                    <button className="menu-item" onClick={() => { onRowAction("insertBelow"); close(); }}>↓ Insert row below</button>
                                    <div className="menu-sep" />
                                    <div className="menu-head">Row type</div>
                                    <select className="menu-select" value={row.rowType || ""} onChange={(e) => onRowAction("type", e.target.value)}>

                                        ))}
                                        <label className="swatch sw-custom" title="Custom color…">
                                            <input type="color" className="sw-input"
                                                onChange={(e) => onRowAction("color", e.target.value)} />
                                        </label>
                                        <button className="swatch" title="clear override"
                                            style={{ background: "repeating-linear-gradient(45deg,#fff,#fff 3px,#ddd 3px,#ddd 6px)" }}
                                            onClick={() => onRowAction("color", null)} />
                                    </div>
                                    <div className="menu-sep" />
                                    <button className="menu-item danger" onClick={() => { onRowAction("delete"); close(); }}><LucideIcon name="trash2" />Delete row</button>
                                </>
                            )}
                        </Menu>
                    </span>
                    </>
                )}
                <span className={editMode ? "hdr-edit" : ""} contentEditable={editMode} suppressContentEditableWarning
                    onBlur={editMode ? (e) => onRowAction("label", e.currentTarget.textContent) : undefined}>
                    {row.laneLabel}
                </span>
            </td>
            {isDivider ? (
                <EditableCell html={(row.cells[0] || {}).html || ""} editMode={editMode}

                    colSpan={total} style={rowBg ? { background: rowBg } : undefined}
                    cellKey={`${cellKeyPrefix}-0`}
                    onCommit={(html) => onCellEdit(0, html)} onFocusCell={() => onSelect(0)} onDone={onDeselect} />
            ) : (
                row.cells.map((cell, ci) => (
                    <Cell key={ci} cell={cell} editMode={editMode} rowBg={rowBg}
                        selected={ci === selectedCellIdx}
                        cellKey={`${cellKeyPrefix}-${ci}`}
                        onSelect={() => onSelect(ci)}
                        onEditHtml={(html) => onCellEdit(ci, html)}
                        onTagsChange={(tags) => onCellTags(ci, tags)}
                        onDeselect={onDeselect} />
                ))
            )}
            {editMode && <td className="add-col-c" aria-hidden="true" />}
        </tr>
    );
}

// ═══════════════════════════════════════
// TEXT COLOR CONTROL (popover of swatches)
// ═══════════════════════════════════════
function TextColorControl({ disabled }) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);
    useEffect(() => {
        if (!open) return;
        const h = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
        document.addEventListener("mousedown", h);
        return () => document.removeEventListener("mousedown", h);
    }, [open]);
    // mousedown + preventDefault keeps the cell's text selection while we recolor it.
    const apply = (color) => (e) => {
        e.preventDefault();
        document.execCommand("styleWithCSS", false, true);
        document.execCommand("foreColor", false, color);
        document.execCommand("styleWithCSS", false, false);
        setOpen(false);
    };
    return (
        <div className="tb-color" ref={ref}>
            <button className="tb-btn" disabled={disabled} title="Text color"
                onMouseDown={(e) => { e.preventDefault(); setOpen((o) => !o); }}><span className="tb-A">A</span></button>
            {open && (
                <div className="color-pop" onMouseDown={(e) => e.preventDefault()}>
                    {TEXT_COLORS.map((c) => (
                        <button key={c} className="swatch" style={{ background: c }} title={c} onMouseDown={apply(c)} />
                    ))}
                </div>
            )}
        </div>
    );
}

// ═══════════════════════════════════════
// FORMAT TOOLBAR (acts on the selected cell)
// ═══════════════════════════════════════
function FormatToolbar({ cell, selectedKey, onMode, onAlign }) {
    const toolbarRef = useRef(null);
    const lastSizeRef = useRef({ width: 0, height: 0 });
    const [pos, setPos] = useState(null);
    const disabled = !cell || !selectedKey;
    const mode = cell?.mode || "text";
    const align = cell?.align || "left";
    const exec = (cmd) => document.execCommand(cmd, false, null);
    const place = useCallback(() => {
        if (!selectedKey) { setPos(null); return; }
        const anchor = document.querySelector(`[data-cell-key="${selectedKey}"]`);
        if (!anchor) { setPos(null); return; }
        const r = anchor.getBoundingClientRect();
        const margin = 8;
        const gap = 8;
        const measuredW = toolbarRef.current?.offsetWidth || 0;
        const measuredH = toolbarRef.current?.offsetHeight || 0;
        const w = measuredW || lastSizeRef.current.width;
        const h = measuredH || lastSizeRef.current.height;
        if (!w || !h) { setPos({ top: -9999, left: -9999, measuring: true }); return; }
        if (measuredW && measuredH) lastSizeRef.current = { width: measuredW, height: measuredH };
        let top = r.bottom + gap;
        const centeredLeft = r.left + (r.width / 2) - (w / 2);
        const maxLeft = Math.max(margin, window.innerWidth - w - margin);
        const left = Math.max(margin, Math.min(centeredLeft, maxLeft));

        if (top + h > window.innerHeight - margin) top = r.top - h - gap;
        if (top < margin) top = Math.min(window.innerHeight - h - margin, r.bottom + gap);
        setPos({ top, left, measuring: false });
    }, [selectedKey]);

    useEffect(() => {
        if (disabled) { setPos(null); return; }
        place();
        const raf = window.requestAnimationFrame(place);
        const raf2 = window.requestAnimationFrame(() => window.requestAnimationFrame(place));
        window.addEventListener("scroll", place, true);
        window.addEventListener("resize", place);
        const anchor = document.querySelector(`[data-cell-key="${selectedKey}"]`);
        const ro = anchor ? new ResizeObserver(place) : null;
        if (ro) ro.observe(anchor);
        return () => {
            window.cancelAnimationFrame(raf);
            window.cancelAnimationFrame(raf2);
            window.removeEventListener("scroll", place, true);
            window.removeEventListener("resize", place);
            if (ro) ro.disconnect();
        };
    }, [disabled, place, mode, align, selectedKey]);

    if (disabled || !pos) return null;

    // B/I/U: keep focus in the cell (preventDefault) so execCommand hits its selection.
    const fmt = (cmd) => (e) => { e.preventDefault(); exec(cmd); };
    const keepFocus = (fn) => (e) => { e.preventDefault(); fn(); };
    // Show ⌘/⌥ on Mac, Ctrl/Alt elsewhere. The handler accepts both either way.
    const isMac = /Mac/i.test(navigator.platform || navigator.userAgent);
    const modAlt = isMac ? "⌘⌥" : "Ctrl+Alt+";
    const modCmd = isMac ? "⌘" : "Ctrl+";
    return createPortal(
        <div className="cell-toolbar" ref={toolbarRef} style={{ top: pos.top, left: pos.left, visibility: pos.measuring ? "hidden" : "visible" }}
            onMouseDown={(e) => e.stopPropagation()}>
            <div className="tb-group">
                <button className={`tb-btn${mode === "text" ? " active" : ""}`} title={`Text mode (${modAlt}1)`} onMouseDown={keepFocus(() => onMode("text"))}>Text</button>
                <button className={`tb-btn${mode === "bullets" ? " active" : ""}`} title={`Bullets mode (${modAlt}2)`} onMouseDown={keepFocus(() => onMode("bullets"))}>
                    <LucideIcon name="list" />Bullets
                </button>
                <button className={`tb-btn${mode === "boxes" ? " active" : ""}`} title={`Boxes mode (${modAlt}3)`} onMouseDown={keepFocus(() => onMode("boxes"))}>
                    <LucideIcon name="square" />Boxes
                </button>
                <button className={`tb-btn${mode === "tags" ? " active" : ""}`} title={`Tags mode (${modAlt}4)`} onMouseDown={keepFocus(() => onMode("tags"))}>
                    <LucideIcon name="tag" />Tags
                </button>
            </div>
            <div className="tb-sep" />
            <div className="tb-group">
                <button className={`tb-btn icon-only${align === "left" ? " active" : ""}`} onMouseDown={keepFocus(() => onAlign("left"))} title={`Align left (${modAlt}L)`} aria-label="Align left" aria-pressed={align === "left"}>
                    <LucideIcon name="alignLeft" />
                </button>
                <button className={`tb-btn icon-only${align === "center" ? " active" : ""}`} onMouseDown={keepFocus(() => onAlign("center"))} title={`Align center (${modAlt}E)`} aria-label="Align center" aria-pressed={align === "center"}>
                    <LucideIcon name="alignCenter" />
                </button>
            </div>
            <div className="tb-sep" />
            <div className="tb-group">
                <button className="tb-btn" disabled={mode === "tags"} title={`Bold (${modCmd}B)`} onMouseDown={fmt("bold")} style={{ fontWeight: 800 }}>B</button>
                <button className="tb-btn" disabled={mode === "tags"} title={`Italic (${modCmd}I)`} onMouseDown={fmt("italic")} style={{ fontStyle: "italic" }}>I</button>
                <button className="tb-btn" disabled={mode === "tags"} title={`Underline (${modCmd}U)`} onMouseDown={fmt("underline")} style={{ textDecoration: "underline" }}>U</button>
                <TextColorControl disabled={mode === "tags"} />
            </div>
        </div>, document.body
    );
}

function BlueprintColGroup({ total, includeAddColumn = false }) {
    return (
        <colgroup>
            <col style={{ width: LBL_W }} />
            {Array.from({ length: total }, (_, i) => <col key={i} style={{ width: COL_W }} />)}
            {includeAddColumn && <col style={{ width: 62 }} />}
        </colgroup>
    );
}
