// JOURNEY VIEW
// ═══════════════════════════════════════
function JourneyView({ journey, jIdx, editMode, selected, onSelect, onDeselect,
        onTitleEdit, onCellEdit, onCellTags, onRowAction, onStageAction, onAddRow }) {
    const ref = useRef(null);
    const [dragState, setDragState] = useState(null);
    const [dropTarget, setDropTarget] = useState(null);
    const stages = journey.stages;
    const total = totalLeaves(stages);
    const hasSub = stages.some((s) => (s.subStages?.length || 0) > 0);
    const tw = LBL_W + total * COL_W;
    const hdrW = tw + (editMode ? 62 : 0);
    const onStage = (action, payload) => onStageAction(jIdx, action, payload);
    const clearDrag = () => { setDragState(null); setDropTarget(null); };
    const startDrag = (e, state) => {
        setDragState(state);
        setDropTarget(null);
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", JSON.stringify(state));
    };
    const getDropSide = (e) => {
        const r = e.currentTarget.getBoundingClientRect();
        return e.clientX > r.left + r.width / 2 ? "after" : "before";
    };
    const rowDragOver = (e, sjIdx, rowIdx) => {
        if (dragState?.type !== "row" || dragState.sjIdx !== sjIdx) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        setDropTarget({ type: "row", sjIdx, rowIdx });
    };
    const rowDrop = (e, sjIdx, rowIdx) => {
        if (dragState?.type !== "row" || dragState.sjIdx !== sjIdx) return;
        e.preventDefault();
        onRowAction(jIdx, dragState.sjIdx, dragState.rowIdx, "moveTo", { toRowIdx: rowIdx });
        clearDrag();
    };
    const rowDropEnd = (e, sjIdx, rowCount) => {
        if (dragState?.type !== "row" || dragState.sjIdx !== sjIdx) return;
        e.preventDefault();
        onRowAction(jIdx, sjIdx, dragState.rowIdx, "moveTo", { toRowIdx: rowCount });
        clearDrag();
    };
    const stageDragOver = (e, stageIdx) => {
        if (dragState?.type !== "stage") return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        setDropTarget({ type: "stage", stageIdx, side: getDropSide(e) });
    };
    const stageDrop = (e, stageIdx) => {
        if (dragState?.type !== "stage") return;
        e.preventDefault();
        const side = getDropSide(e);
        onStage("moveStage", { fromIdx: dragState.stageIdx, toIdx: stageIdx + (side === "after" ? 1 : 0) });
        clearDrag();
    };
    const subDragOver = (e, stageIdx, subIdx) => {
        if (dragState?.type !== "subStage" || dragState.stageIdx !== stageIdx) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        setDropTarget({ type: "subStage", stageIdx, subIdx, side: getDropSide(e) });
    };
    const subDrop = (e, stageIdx, subIdx) => {
        if (dragState?.type !== "subStage" || dragState.stageIdx !== stageIdx) return;
        e.preventDefault();
        const side = getDropSide(e);
        onStage("moveSubStage", { stageIdx, fromIdx: dragState.subIdx, toIdx: subIdx + (side === "after" ? 1 : 0) });
        clearDrag();
    };

    // scroll sync
    useEffect(() => {
        const c = ref.current;
        if (!c) return;
        const els = Array.from(c.querySelectorAll("[data-ss]"));
        if (els.length < 2) return;
        let lock = false;
        const hm = new Map();
        els.forEach((el) => {
            const h = () => {
                if (lock) return;
                lock = true;
                const l = el.scrollLeft;
                els.forEach((o) => { if (o !== el) o.scrollLeft = l; });
                requestAnimationFrame(() => { lock = false; });
            };
            hm.set(el, h);
            el.addEventListener("scroll", h, { passive: true });
        });
        return () => hm.forEach((h, el) => el.removeEventListener("scroll", h));
    }, [journey, editMode]);

    return (
        <div ref={ref}>
            {/* Chapter header */}
            <div className="ch-hdr">
                <h2>
                    <InlineTitleEdit value={journey.title} fallback="Untitled Journey"
                        inputClassName="ch-title-input" onCommit={(value) => onTitleEdit(jIdx, value)} />
                </h2>
            </div>

            {/* Stage header — sticky (two rows when sub-stages exist) */}
            <div className="stage-outer">
                <div className="scroll-hide" data-ss="">
                    <table className="bp" style={{ minWidth: hdrW }}>
                        <BlueprintColGroup total={total} includeAddColumn={editMode} />
                        <tbody>
                            <tr>
                                <td className="ll stg-ll" rowSpan={hasSub ? 2 : 1}>
                                    <span className={editMode ? "hdr-edit" : ""} contentEditable={editMode} suppressContentEditableWarning
                                        onBlur={editMode ? (e) => onStage("setStageLabel", { value: e.currentTarget.textContent }) : undefined}>
                                        {journey.stageLabel}
                                    </span>
                                </td>
                                {stages.map((s, si) => {
                                    const lc = leafCount(s);
                                    const sHasSub = (s.subStages?.length || 0) > 0;
                                    return (
                                        <td key={si} className={`stg-c${dropTarget?.type === "stage" && dropTarget.stageIdx === si ? ` drop-${dropTarget.side}` : ""}`} colSpan={lc}
                                            rowSpan={hasSub && !sHasSub ? 2 : 1}
                                            style={{ minWidth: lc * COL_W }}
                                            onDragOver={editMode ? (e) => stageDragOver(e, si) : undefined}
                                            onDrop={editMode ? (e) => stageDrop(e, si) : undefined}>
                                            {editMode && (
                                                <>
                                                <span className="drag-handle stg-drag" draggable title="Drag to reorder stage"
                                                    onDragStart={(e) => startDrag(e, { type: "stage", stageIdx: si })}
                                                    onDragEnd={clearDrag}>⠿</span>
                                                <Menu align="right">
                                                    {(close) => (
                                                        <>
                                                            <button className="menu-item" onClick={() => { onStage("addSubStage", { stageIdx: si }); close(); }}>＋ Add sub-stage</button>
                                                            <button className="menu-item" onClick={() => { onStage("addStage", { stageIdx: si }); close(); }}>＋ Add stage</button>
                                                            <div className="menu-sep" />
                                                            <button className="menu-item danger" onClick={() => { onStage("deleteStage", { stageIdx: si }); close(); }}><LucideIcon name="trash2" />Delete stage</button>
                                                        </>
                                                    )}
                                                </Menu>
                                                </>
                                            )}
                                            <span style={{ display: "inline-flex", alignItems: "flex-start", justifyContent: "center", gap: "6px", textAlign: "left" }}>
                                                {(s.num != null || editMode) && <span className="stage-num" style={{ flexShrink: 0 }}
                                                    contentEditable={editMode} suppressContentEditableWarning
                                                    title={editMode ? "Edit number" : undefined}
                                                    onBlur={editMode ? (e) => onStage("renumberStage", { stageIdx: si, value: e.currentTarget.textContent }) : undefined}>{s.num}</span>}
                                                <span className={editMode ? "hdr-edit" : ""} contentEditable={editMode} suppressContentEditableWarning
                                                    onBlur={editMode ? (e) => onStage("renameStage", { stageIdx: si, value: e.currentTarget.textContent }) : undefined}>
                                                    {s.title}
                                                </span>
                                            </span>
                                        </td>
                                    );
                                })}
                                {editMode && (
                                    <td className="add-col-c" rowSpan={hasSub ? 2 : 1}>
                                        <button className="add-btn" title="Add stage" onClick={() => onStage("addStage", {})}>＋</button>
                                    </td>
                                )}
                            </tr>
                            {hasSub && (
                                <tr>
                                    {stages.map((s, si) => {
                                        const subs = s.subStages || [];
                                        if (!subs.length) return null;
                                        return subs.map((ss, ssi) => (
                                            <td key={si + "-" + ssi}
                                                className={`sub-c${dropTarget?.type === "subStage" && dropTarget.stageIdx === si && dropTarget.subIdx === ssi ? ` drop-${dropTarget.side}` : ""}`}
                                                style={{ minWidth: COL_W }}
                                                onDragOver={editMode ? (e) => subDragOver(e, si, ssi) : undefined}
                                                onDrop={editMode ? (e) => subDrop(e, si, ssi) : undefined}>
                                                {editMode && (
                                                    <>
                                                    <span className="drag-handle sub-drag" draggable title="Drag within this stage"
                                                        onDragStart={(e) => startDrag(e, { type: "subStage", stageIdx: si, subIdx: ssi })}
                                                        onDragEnd={clearDrag}>⠿</span>
                                                    <Menu align="right">
                                                        {(close) => (
                                                            <>
                                                                <button className="menu-item" onClick={() => { onStage("addSubStage", { stageIdx: si }); close(); }}>＋ Add sub-stage</button>
                                                                <div className="menu-sep" />
                                                                <button className="menu-item danger" onClick={() => { onStage("deleteSubStage", { stageIdx: si, subIdx: ssi }); close(); }}><LucideIcon name="trash2" />Delete sub-stage</button>
                                                            </>
                                                        )}
                                                    </Menu>
                                                    </>
                                                )}
                                                <span className={editMode ? "hdr-edit" : ""} contentEditable={editMode} suppressContentEditableWarning
                                                    onBlur={editMode ? (e) => onStage("renameSubStage", { stageIdx: si, subIdx: ssi, value: e.currentTarget.textContent }) : undefined}>
                                                    {ss.title}
                                                </span>
                                            </td>
                                        ));
                                    })}
                                </tr>
                            )}
                        </tbody>
                    </table>
                </div>
            </div>

            {/* Sub-journeys (rows only; section breaks use divider rows) */}
            {journey.subJourneys.map((sj, si) => (
                <div key={si}>
                    <div className="bpw" data-ss="">
                        <table className="bp" style={{ minWidth: hdrW }}>
                            <BlueprintColGroup total={total} includeAddColumn={editMode} />
                            <tbody>
                                {sj.rows.map((row, ri) => (
                                    <BlueprintRow key={ri} row={row} rowIdx={ri}
                                        editMode={editMode} total={total}
                                        cellKeyPrefix={`cell-${jIdx}-${si}-${ri}`}
                                        dragState={dragState?.type === "row" && dragState.sjIdx === si ? dragState : null}
                                        dropRowIdx={dropTarget?.type === "row" && dropTarget.sjIdx === si ? dropTarget.rowIdx : null}
                                        selectedCellIdx={selected && selected.jIdx === jIdx && selected.sjIdx === si && selected.rowIdx === ri ? selected.cellIdx : null}
                                        onSelect={(ci) => onSelect({ jIdx, sjIdx: si, rowIdx: ri, cellIdx: ci })}
                                        onCellEdit={(ci, html) => onCellEdit(jIdx, si, ri, ci, html)}
                                        onCellTags={(ci, tags) => onCellTags(jIdx, si, ri, ci, tags)}
                                        onRowAction={(action, value) => onRowAction(jIdx, si, ri, action, value)}
                                        onRowDragStart={(e) => startDrag(e, { type: "row", sjIdx: si, rowIdx: ri })}
                                        onRowDragOver={(e, targetRowIdx) => rowDragOver(e, si, targetRowIdx)}
                                        onRowDrop={(e, targetRowIdx) => rowDrop(e, si, targetRowIdx)}
                                        onDragEnd={clearDrag}
                                        onDeselect={onDeselect} />
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {editMode && (
                        <div className={`add-row-bar${dropTarget?.type === "rowEnd" && dropTarget.sjIdx === si ? " drop-end" : ""}`}
                            onDragOver={editMode ? (e) => {
                                if (dragState?.type === "row" && dragState.sjIdx === si) {
                                    e.preventDefault();
                                    setDropTarget({ type: "rowEnd", sjIdx: si });
                                }
                            } : undefined}
                            onDrop={editMode ? (e) => rowDropEnd(e, si, sj.rows.length) : undefined}>
                            <button className="add-row-btn" onClick={() => onAddRow(jIdx, si)}>＋ Add row</button>
                        </div>
                    )}
                </div>
            ))}
        </div>
    );
}

// APP
// ═══════════════════════════════════════
function App() {
    const [journeys, setJourneys] = useState([]);
    const [tab, setTab] = useState(0);
    const [modal, setModal] = useState(false);
    // "library" = home screen listing projects; "project" = working inside one.
    const [view, setView] = useState("library");
    const [confirmState, setConfirmState] = useState(null);
    const [projects, setProjects] = useState([]);
    const [currentId, setCurrentId] = useState(null);
    const [standaloneName, setStandaloneName] = useState(null);
    const [viewOnly, setViewOnly] = useState(false);
    const [ready, setReady] = useState(false);
    const [saveState, setSaveState] = useState("idle");
    // Edit is the default working mode; users switch to View when they want to read.
    const [editMode, setEditMode] = useState(true);
    const [selected, setSelected] = useState(null);
    const [lastSaved, setLastSaved] = useState(null);
    const [historyState, setHistoryState] = useState({ canUndo: false, canRedo: false });
    const appBarRef = useRef(null);
    const saveTimer = useRef(null);
    const lastSavedRef = useRef(null);
    const skipNextSaveRef = useRef(false);
    const undoStackRef = useRef([]);
    const redoStackRef = useRef([]);
    // Mirror of `journeys` kept in sync synchronously so export/save always
    // read the latest value (contentEditable onBlur fires before button clicks).
    const journeysRef = useRef([]);

    const syncHistoryState = useCallback(() => {
        setHistoryState({
            canUndo: undoStackRef.current.length > 0,
            canRedo: redoStackRef.current.length > 0,
        });
    }, []);

    const clearHistory = useCallback(() => {
        undoStackRef.current = [];
        redoStackRef.current = [];
        syncHistoryState();
    }, [syncHistoryState]);

    const applyJourneys = useCallback((nextJourneys) => {
        journeysRef.current = nextJourneys;
        setAllJourneys(nextJourneys);
        setJourneys(nextJourneys);
        setTab((cur) => nextJourneys.length ? Math.min(cur, nextJourneys.length - 1) : 0);
    }, []);

    const replaceJourneys = useCallback((next, { skipSave = false } = {}) => {
        if (skipSave) skipNextSaveRef.current = true;
        applyJourneys(typeof next === "function" ? next(journeysRef.current) : next);
    }, [applyJourneys]);

    const commitJourneys = useCallback((next) => {
        const prev = journeysRef.current;
        const resolved = typeof next === "function" ? next(prev) : next;
        if (resolved === prev) return;

        undoStackRef.current.push(prev);
        if (undoStackRef.current.length > HISTORY_LIMIT) undoStackRef.current.shift();
        redoStackRef.current = [];
        applyJourneys(resolved);
        syncHistoryState();
    }, [applyJourneys, syncHistoryState]);

    const undo = useCallback(() => {
        const previous = undoStackRef.current.pop();
        if (!previous) return;
        redoStackRef.current.push(journeysRef.current);
        if (redoStackRef.current.length > HISTORY_LIMIT) redoStackRef.current.shift();
        applyJourneys(previous);
        setSelected(null);
        syncHistoryState();
    }, [applyJourneys, syncHistoryState]);

    const redo = useCallback(() => {
        const next = redoStackRef.current.pop();
        if (!next) return;
        undoStackRef.current.push(journeysRef.current);
        if (undoStackRef.current.length > HISTORY_LIMIT) undoStackRef.current.shift();
        applyJourneys(next);
        setSelected(null);
        syncHistoryState();
    }, [applyJourneys, syncHistoryState]);

    const refreshProjects = useCallback(async () => {
        setProjects(await dbListProjects());
    }, []);

    const currentName = projects.find((p) => p.id === currentId)?.name || standaloneName || null;

    useEffect(() => {
        document.title = currentName && view === "project"
            ? `${currentName} - Lanescape`
            : "Lanescape - Service Journey Mapper";
    }, [currentName, view]);

    // ── Init: load project list + reopen last project ──
    useEffect(() => {
        (async () => {
            const embedded = embeddedProject();
            if (embedded) {
                setProjects([]);
                setCurrentId(null);
                setStandaloneName(embedded.name || "Standalone Service Journey");
                setViewOnly(true);
                setView("project");
                setEditMode(false);
                replaceJourneys(hydrate(embedded.journeys || []), { skipSave: true });
                clearHistory();
                setLastSaved(embedded.lastSavedAt ? new Date(embedded.lastSavedAt).getTime() : null);
                setSaveState("idle");
                setReady(true);
                return;
            }

            // Land on the library; the user picks (or creates) a project to enter.
            const list = await dbListProjects();
            setProjects(list);
            const routedId = routeProjectId();
            if (routedId != null) {
                const p = await dbGetProject(routedId);
                if (p) {
                    setCurrentId(routedId);
                    replaceJourneys(hydrate(p.journeys || []), { skipSave: true });
                    clearHistory();
                    setLastSaved(p.updatedAt || null);
                    setTab(0);
                    setEditMode(true);
                    setView("project");
                    localStorage.setItem(LAST_KEY, String(routedId));
                    writeRoute(routedId, { replace: true });
                    setReady(true);
                    return;
                }
                writeRoute(null, { replace: true });
            }
            setView("library");
            setReady(true);
        })();
    }, [clearHistory, replaceJourneys]);

    // Keep native browser Back/Forward in sync with the in-app project view.
    useEffect(() => {
        if (viewOnly) return;
        const onPopState = () => {
            // Browser back doesn't blur the focused cell (popstate is same-document),
            // so flush any in-flight cell draft into state before we swap views.
            document.activeElement?.blur?.();
            (async () => {
                const routedId = routeProjectId();
                if (routedId == null) {
                    setSelected(null);
                    setView("library");
                    await refreshProjects();
                    return;
                }
                const p = await dbGetProject(routedId);
                if (!p) {
                    writeRoute(null, { replace: true });
                    setSelected(null);
                    setView("library");
                    await refreshProjects();
                    return;
                }
                setCurrentId(routedId);
                replaceJourneys(hydrate(p.journeys || []), { skipSave: true });
                clearHistory();
                setLastSaved(p.updatedAt || null);
                setTab(0);
                setEditMode(true);
                setSelected(null);
                setView("project");
                localStorage.setItem(LAST_KEY, String(routedId));
                await refreshProjects();
            })();
        };
        window.addEventListener("popstate", onPopState);
        return () => window.removeEventListener("popstate", onPopState);
    }, [clearHistory, refreshProjects, replaceJourneys, viewOnly]);

    // ── Autosave current project (debounced) ──
    useEffect(() => {
        if (!ready || currentId == null) return;
        if (skipNextSaveRef.current) {
            skipNextSaveRef.current = false;
            setSaveState("saved");
            return;
        }
        setSaveState("saving");
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => {
            dbSaveJourneys(currentId, journeysRef.current)
                .then(refreshProjects)
                .then(() => { setSaveState("saved"); setLastSaved(Date.now()); });
        }, 600);
        return () => clearTimeout(saveTimer.current);
    }, [journeys, currentId, ready, refreshProjects]);

    // ── Load data (JSON array / exported project) ──
    const loadFromText = useCallback(async (text, mode = "replace", options = {}) => {
        const parsed = parseInput(text);
        const data = hydrate(parsed.journeys);
        if (!data.length) throw new Error("No valid journey data found.");
        const baseId = options.forceNew ? null : currentId;
        let id = baseId;
        if (id == null) {
            const name = parsed.name || defaultName(projects);
            id = await dbCreateProject(name, data);
            setCurrentId(id);
            localStorage.setItem(LAST_KEY, String(id));
            writeRoute(id);
        }
        if (baseId == null) {
            replaceJourneys(data);
            clearHistory();
            setTab(0);
            setEditMode(true);
            setView("project");
        } else if (mode === "append") {
            const at = journeysRef.current.length;
            commitJourneys((prev) => [...prev, ...withUniqueSheetTitles(prev, data)]);
            setTab(at);
        } else if (mode === "overwriteAffected") {
            const byTitle = new Map(data.filter((j) => j.title).map((j) => [j.title, j]));
            let firstChanged = -1;
            commitJourneys((prev) => {
                const existingTitles = new Set(prev.map((j) => j.title).filter(Boolean));
                const replaced = prev.map((j, i) => {
                    if (!byTitle.has(j.title)) return j;
                    if (firstChanged < 0) firstChanged = i;
                    return byTitle.get(j.title);
                });
                const newSheets = data.filter((j) => !j.title || !existingTitles.has(j.title));
                return [...replaced, ...newSheets];
            });
            if (firstChanged >= 0) setTab(firstChanged);
        } else {
            commitJourneys(data);
            setTab(0);
        }
        if (options.updateProjectName && parsed.name?.trim() && id != null) {
            await dbRenameProject(id, parsed.name.trim());
        }
        await refreshProjects();
        console.log(`%c✅ Loaded ${data.length} service journey(s)`, "color:#2e7d32;font-weight:bold;font-size:14px");
    }, [clearHistory, commitJourneys, currentId, projects, refreshProjects, replaceJourneys]);

    // ── Immutable updaters ──
    const editJourney = useCallback((jIdx, fn) => {
        commitJourneys((prev) => {
            const j = prev[jIdx];
            if (!j) return prev;
            const nj = fn(j);
            if (nj === j) return prev;
            const next = prev.slice();
            next[jIdx] = nj;
            return next;
        });
    }, [commitJourneys]);

    // Mutate a single cell via `fn(cellCopy) -> cell`.
    const editCell = useCallback((jIdx, sjIdx, rowIdx, cellIdx, fn) => {
        editJourney(jIdx, (j) => {
            const cur = j.subJourneys?.[sjIdx]?.rows?.[rowIdx]?.cells?.[cellIdx];
            if (!cur) return j;
            const nc = fn({ ...cur });
            if (nc === cur || JSON.stringify(nc) === JSON.stringify(cur)) return j;
            const sjs = j.subJourneys.slice();
            const sj = { ...sjs[sjIdx], rows: sjs[sjIdx].rows.slice() };
            const row = { ...sj.rows[rowIdx], cells: sj.rows[rowIdx].cells.slice() };
            row.cells[cellIdx] = nc;
            sj.rows[rowIdx] = row;
            sjs[sjIdx] = sj;
            return { ...j, subJourneys: sjs };
        });
    }, [editJourney]);

    // ── Cell handlers ──
    const handleCellEdit = useCallback((jIdx, sjIdx, rowIdx, cellIdx, html) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, (c) => (c.html === html ? c : { ...c, html })), [editCell]);
    const handleCellTags = useCallback((jIdx, sjIdx, rowIdx, cellIdx, tags) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, (c) => ({ ...c, tags })), [editCell]);
    const handleCellMode = useCallback((jIdx, sjIdx, rowIdx, cellIdx, mode) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, (c) => ({ ...c, mode, ...(mode === "tags" && !c.tags ? { tags: [] } : {}) })), [editCell]);
    const handleCellAlign = useCallback((jIdx, sjIdx, rowIdx, cellIdx, align) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, (c) => ({ ...c, align })), [editCell]);

    // ── Row handlers ──
    const handleRowAction = useCallback((jIdx, sjIdx, rowIdx, action, value) => {
        editJourney(jIdx, (j) => {
            const total = totalLeaves(j.stages);
            const sjs = j.subJourneys.slice();
            const sj = { ...sjs[sjIdx], rows: sjs[sjIdx].rows.slice() };
            const rows = sj.rows;
            if (action === "delete") rows.splice(rowIdx, 1);
            else if (action === "moveTo") {
                const toRowIdx = Math.max(0, Math.min(value?.toRowIdx ?? rowIdx, rows.length));
                const moved = moveArrayRange(rows, rowIdx, 1, toRowIdx);
                if (moved === rows) return j;
                sj.rows = moved;
                sjs[sjIdx] = sj;
                return { ...j, subJourneys: sjs };
            }
            else if (action === "insertAbove") rows.splice(rowIdx, 0, newRow(total));
            else if (action === "insertBelow") rows.splice(rowIdx + 1, 0, newRow(total));
            else if (action === "type") {
                const cur = rows[rowIdx];
                const wasDivider = cur.rowType === DIVIDER_TYPE;
                const willDivider = value === DIVIDER_TYPE;
                let cells = cur.cells;
                if (willDivider && !wasDivider) cells = collapseDivider(cells, total);
                else if (!willDivider && wasDivider) cells = expandDivider(cells, total);
                rows[rowIdx] = { ...cur, rowType: value, cells };
            }
            else if (action === "color") rows[rowIdx] = { ...rows[rowIdx], customColor: value || undefined };
            else if (action === "label") {
                if (rows[rowIdx].laneLabel === value) return j;
                rows[rowIdx] = { ...rows[rowIdx], laneLabel: value };
            } else return j;
            sj.rows = rows;
            sjs[sjIdx] = sj;
            return { ...j, subJourneys: sjs };
        });
    }, [editJourney]);

    const handleAddRow = useCallback((jIdx, sjIdx) => {
        editJourney(jIdx, (j) => {
            const sjs = j.subJourneys.slice();
            sjs[sjIdx] = { ...sjs[sjIdx], rows: [...sjs[sjIdx].rows, newRow(totalLeaves(j.stages))] };
            return { ...j, subJourneys: sjs };
        });
    }, [editJourney]);

    // ── Stage / sub-stage (column) handlers ──
    const handleStageAction = useCallback((jIdx, action, payload) => {
        editJourney(jIdx, (j) => {
            const stages = j.stages.map((s) => ({ ...s, subStages: (s.subStages || []).slice() }));
            const mapRows = (fn) => j.subJourneys.map((sj) => ({
                ...sj, rows: sj.rows.map((r) => ({ ...r, cells: fn(r.cells) })),
            }));

            if (action === "addStage") {
                const insertAt = payload.stageIdx != null ? payload.stageIdx + 1 : stages.length;
                const leafIdx = leafStart(j.stages, payload.stageIdx != null ? payload.stageIdx : j.stages.length - 1) + leafCount(j.stages[payload.stageIdx != null ? payload.stageIdx : j.stages.length - 1]);
                stages.splice(insertAt, 0, { num: nextStageNum(stages), title: "New Stage", subStages: [] });
                return { ...j, stages, subJourneys: mapRows((cells) => {
                    const c = cells.slice();
                    c.splice(leafIdx, 0, newCell());
                    return c;
                }) };
            }
            if (action === "deleteStage") {
                const { stageIdx } = payload;
                if (stages.length <= 1) { alert("A journey needs at least one stage."); return j; }
                const start = leafStart(j.stages, stageIdx);
                const cnt = leafCount(j.stages[stageIdx]);
                stages.splice(stageIdx, 1);
                return { ...j, stages, subJourneys: mapRows((cells) => {
                    let c = cells;
                    for (let k = 0; k < cnt; k++) c = removeLeafFromRow(c, start);
                    return c;
                }) };
            }
            if (action === "moveStage") {
                const { fromIdx } = payload;
                const toIdx = Math.max(0, Math.min(payload.toIdx, stages.length));
                if (fromIdx < 0 || fromIdx >= stages.length) return j;
                const movedStages = moveArrayRange(stages, fromIdx, 1, toIdx);
                if (movedStages === stages) return j;
                const start = leafStart(j.stages, fromIdx);
                const cnt = leafCount(j.stages[fromIdx]);
                const target = toIdx >= j.stages.length ? totalLeaves(j.stages) : leafStart(j.stages, toIdx);
                return {
                    ...j,
                    stages: movedStages,
                    subJourneys: j.subJourneys.map((sj) => ({
                        ...sj,
                        rows: sj.rows.map((r) => moveLeafRangeInRow(r, start, cnt, target)),
                    })),
                };
            }
            if (action === "addSubStage") {
                const { stageIdx } = payload;
                const before = stages[stageIdx].subStages.length;
                stages[stageIdx].subStages.push({ title: "New" });
                const oldL = Math.max(before, 1), newL = Math.max(before + 1, 1);
                if (newL > oldL) {
                    const gi = leafStart(j.stages, stageIdx) + oldL;
                    return { ...j, stages, subJourneys: mapRows((cells) => insertLeafIntoRow(cells, gi)) };
                }
                return { ...j, stages };
            }
            if (action === "deleteSubStage") {
                const { stageIdx, subIdx } = payload;
                const before = stages[stageIdx].subStages.length;
                stages[stageIdx].subStages.splice(subIdx, 1);
                const oldL = Math.max(before, 1), newL = Math.max(before - 1, 1);
                if (newL < oldL) {
                    const gi = leafStart(j.stages, stageIdx) + Math.min(subIdx, oldL - 1);
                    return { ...j, stages, subJourneys: mapRows((cells) => removeLeafFromRow(cells, gi)) };
                }
                return { ...j, stages };
            }
            if (action === "moveSubStage") {
                const { stageIdx, fromIdx } = payload;
                const subs = stages[stageIdx]?.subStages || [];
                const toIdx = Math.max(0, Math.min(payload.toIdx, subs.length));
                if (subs.length <= 1 || fromIdx < 0 || fromIdx >= subs.length) return j;
                const movedSubs = moveArrayRange(subs, fromIdx, 1, toIdx);
                if (movedSubs === subs) return j;
                stages[stageIdx] = { ...stages[stageIdx], subStages: movedSubs };
                const start = leafStart(j.stages, stageIdx);
                const fromLeaf = start + fromIdx;
                const toLeaf = start + toIdx;
                return {
                    ...j,
                    stages,
                    subJourneys: j.subJourneys.map((sj) => ({
                        ...sj,
                        rows: sj.rows.map((r) => moveLeafRangeInRow(r, fromLeaf, 1, toLeaf)),
                    })),
                };
            }
            if (action === "renameStage") { stages[payload.stageIdx] = { ...stages[payload.stageIdx], title: payload.value }; return { ...j, stages }; }
            if (action === "renumberStage") {
                const raw = (payload.value ?? "").trim();
                stages[payload.stageIdx] = { ...stages[payload.stageIdx], num: raw === "" ? null : (Number.isFinite(Number(raw)) ? Number(raw) : raw) };
                return { ...j, stages };
            }
            if (action === "renameSubStage") {
                stages[payload.stageIdx].subStages[payload.subIdx] = { ...stages[payload.stageIdx].subStages[payload.subIdx], title: payload.value };
                return { ...j, stages };
            }
            if (action === "setStageLabel") {
                if (j.stageLabel === payload.value) return j;
                return { ...j, stageLabel: payload.value };
            }
            return j;
        });
    }, [editJourney]);

    // ── Project actions ──
    const openProject = useCallback(async (id) => {
        const p = await dbGetProject(id);
        if (!p) return;
        setCurrentId(id);
        replaceJourneys(hydrate(p.journeys || []), { skipSave: true });
        clearHistory();
        setLastSaved(p.updatedAt || null);
        setTab(0);
        setEditMode(true);
        setView("project");
        localStorage.setItem(LAST_KEY, String(id));
        writeRoute(id);
    }, [clearHistory, replaceJourneys]);

    const goLibrary = useCallback(() => {
        setSelected(null);
        setView("library");
        writeRoute(null);
        refreshProjects();
    }, [refreshProjects]);

    const doDeleteProject = useCallback(async (id) => {
        await dbDeleteProject(id);
        if (id === currentId) {
            setCurrentId(null);
            replaceJourneys([]);
            clearHistory();
            setTab(0);
            localStorage.removeItem(LAST_KEY);
            setView("library");
            writeRoute(null, { replace: true });
        }
        await refreshProjects();
    }, [clearHistory, currentId, refreshProjects, replaceJourneys]);

    const deleteProject = useCallback((id, name) => {
        setConfirmState({
            title: "Delete project",
            message: `Delete “${name}”? This permanently removes its saved journeys and can't be undone.`,
            confirmLabel: "Delete project",
            danger: true,
            onConfirm: () => doDeleteProject(id),
        });
    }, [doDeleteProject]);

    const renameProject = useCallback(async (id, name) => {
        if (!name || !name.trim()) return;
        await dbRenameProject(id, name.trim());
        await refreshProjects();
    }, [refreshProjects]);

    const renameCurrentProject = useCallback(async (name) => {
        if (currentId == null || !name.trim()) return;
        await dbRenameProject(currentId, name.trim());
        await refreshProjects();
    }, [currentId, refreshProjects]);

    const renameJourneyTitle = useCallback((jIdx, title) => {
        editJourney(jIdx, (j) => {
            const nextTitle = title.trim();
            if (!nextTitle || j.title === nextTitle) return j;
            return { ...j, title: nextTitle };
        });
    }, [editJourney]);

    const newProject = useCallback(async () => {
        const id = await dbCreateProject(defaultName(projects), []);
        setCurrentId(id);
        replaceJourneys([]);
        clearHistory();
        setTab(0);
        setEditMode(true);
        setView("project");
        localStorage.setItem(LAST_KEY, String(id));
        writeRoute(id);
        await refreshProjects();
    }, [clearHistory, projects, refreshProjects, replaceJourneys]);

    const newBlankJourney = useCallback(async () => {
        const journey = createBlankJourney(journeysRef.current.length);
        let id = currentId;
        if (id == null) {
            id = await dbCreateProject("Blank Service Journey", [journey]);
            setCurrentId(id);
            localStorage.setItem(LAST_KEY, String(id));
            replaceJourneys([journey]);
            clearHistory();
            setTab(0);
            setView("project");
            writeRoute(id);
            await refreshProjects();
            return;
        }
        commitJourneys((prev) => {
            const next = [...prev, journey];
            setTab(next.length - 1);
            return next;
        });
    }, [clearHistory, commitJourneys, currentId, refreshProjects, replaceJourneys]);

    const deleteJourney = useCallback((jIdx) => {
        const journey = journeysRef.current[jIdx];
        if (!journey) return;
        setConfirmState({
            title: "Delete journey",
            message: `Delete the journey “${journey.title}”? You can undo this right after.`,
            confirmLabel: "Delete journey",
            danger: true,
            onConfirm: () => commitJourneys((prev) => {
                const next = prev.filter((_, i) => i !== jIdx);
                setTab((cur) => {
                    if (!next.length) return 0;
                    if (cur > jIdx) return cur - 1;
                    if (cur >= next.length) return next.length - 1;
                    return cur;
                });
                setSelected(null);
                return next;
            }),
        });
    }, [commitJourneys]);

    const currentExportPayload = useCallback((scope = "project") => {
        const data = journeysRef.current;
        if (!data.length) return null;
        const activeJourney = data[Math.min(tab, data.length - 1)];
        const journeysToExport = scope === "sheet" && activeJourney ? [activeJourney] : data;
        const exportName = scope === "sheet" && activeJourney?.title
            ? `${currentName || "Service Journeys"} - ${activeJourney.title}`
            : currentName || "Service Journeys";
        return {
            type: "service-journey-mapper",
            version: 1,
            name: exportName,
            exportedAt: new Date().toISOString(),
            lastSavedAt: lastSavedRef.current ? new Date(lastSavedRef.current).toISOString() : null,
            journeys: journeysToExport,
        };
    }, [currentName, tab]);

    // ── Export full project state ──
    const exportProject = useCallback(() => {
        const payload = currentExportPayload("project");
        if (!payload) return;
        const savedAt = filenameTimestamp(lastSavedRef.current);
        const filename = [safeName(currentName), savedAt].filter(Boolean).join("_") + ".json";
        downloadFile(filename, JSON.stringify(payload, null, 2), "application/json");
    }, [currentExportPayload, currentName]);

    const exportCurrentSheet = useCallback(() => {
        const payload = currentExportPayload("sheet");
        if (!payload) return;
        const savedAt = filenameTimestamp(lastSavedRef.current);
        const sheetName = payload.journeys[0]?.title || "Sheet";
        const filename = [safeName(currentName), safeName(sheetName), savedAt].filter(Boolean).join("_") + ".json";
        downloadFile(filename, JSON.stringify(payload, null, 2), "application/json");
    }, [currentExportPayload, currentName]);

    const exportStandaloneHtml = useCallback(() => {
        const payload = currentExportPayload("project");
        if (!payload) return;
        downloadFile(safeName(currentName) + ".html", buildStandaloneHtml(payload), "text/html");
    }, [currentExportPayload, currentName]);

    const copyPromptExport = useCallback(async (scope = "project") => {
        const payload = currentExportPayload(scope);
        if (!payload) return;
        await copyTextToClipboard(buildPromptExport(payload));
    }, [currentExportPayload]);

    const copyPromptCurrentSheet = useCallback(() => copyPromptExport("sheet"), [copyPromptExport]);
    const copyPromptProject = useCallback(() => copyPromptExport("project"), [copyPromptExport]);

    const copyIdeationPrompt = useCallback(async () => {
        await copyTextToClipboard(buildIdeationPrompt());
    }, []);

    // Expose to console
    useEffect(() => {
        window.loadJSON = loadFromText;
        window.exportProject = exportProject;
        window.exportCurrentSheet = exportCurrentSheet;
        window.exportStandaloneHtml = exportStandaloneHtml;
        window.exportPrompt = copyPromptExport;
        window.exportSheetPrompt = copyPromptCurrentSheet;
        window.ideationPrompt = copyIdeationPrompt;
        return () => {
            delete window.loadJSON;
            delete window.exportProject;
            delete window.exportCurrentSheet;
            delete window.exportStandaloneHtml;
            delete window.exportPrompt;
            delete window.exportSheetPrompt;
            delete window.ideationPrompt;
        };
    }, [loadFromText, exportProject, exportCurrentSheet, exportStandaloneHtml, copyPromptExport, copyPromptCurrentSheet, copyIdeationPrompt]);

    // App bar height → CSS var
    useEffect(() => {
        const el = appBarRef.current;
        if (!el) return;
        const update = () => document.documentElement.style.setProperty("--appbar-h", el.offsetHeight + "px");
        update();
        const ro = new ResizeObserver(update);
        ro.observe(el);
        return () => ro.disconnect();
    }, []);

    // Leaving edit mode clears the cell selection.
    useEffect(() => { if (!editMode) setSelected(null); }, [editMode]);

    useEffect(() => {
        if (!editMode || !selected) return;
        const clearWhenOutsideCellTools = (e) => {
            if (e.target?.closest?.("[data-cell-key], .cell-toolbar, .tag-color-pop, .tag-suggest")) return;
            setSelected(null);
        };
        document.addEventListener("mousedown", clearWhenOutsideCellTools);
        return () => document.removeEventListener("mousedown", clearWhenOutsideCellTools);
    }, [editMode, selected]);

    // Mirror lastSaved into a ref so export reads the latest value.
    useEffect(() => { lastSavedRef.current = lastSaved; }, [lastSaved]);

    // App-level history shortcuts. Native text undo stays active while editing a field/cell.
    useEffect(() => {
        const isTextEditingTarget = (target) =>
            target?.closest?.('input, textarea, select, [contenteditable="true"]');
        const onKeyDown = (e) => {
            if (!(e.metaKey || e.ctrlKey) || e.altKey || isTextEditingTarget(e.target)) return;
            const key = e.key.toLowerCase();
            if (key === "z" && e.shiftKey) {
                e.preventDefault();
                redo();
            } else if (key === "z") {
                e.preventDefault();
                undo();
            } else if (key === "y") {
                e.preventDefault();
                redo();
            }
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
    }, [redo, undo]);

    // App-level cell mode / align shortcuts (Ctrl+Alt+…).
    // These fire when a cell is selected in edit mode, even if the cell itself
    // doesn't have keyboard focus (e.g. tags mode).
    useEffect(() => {
        const onKeyDown = (e) => {
            if (!editMode || !selected) return;
            if (!(e.metaKey || e.ctrlKey) || !e.altKey) return;
            // Use e.code (physical key) — on macOS the Alt/Option key rewrites
            // e.key (⌥1 → "¡", ⌥L → "¬"), so e.key lookups would never match.
            const modeMap = { Digit1: "text", Digit2: "bullets", Digit3: "boxes", Digit4: "tags" };
            const alignMap = { KeyL: "left", KeyE: "center" };
            if (modeMap[e.code]) {
                e.preventDefault();
                handleCellMode(selected.jIdx, selected.sjIdx, selected.rowIdx, selected.cellIdx, modeMap[e.code]);
            } else if (alignMap[e.code]) {
                e.preventDefault();
                handleCellAlign(selected.jIdx, selected.sjIdx, selected.rowIdx, selected.cellIdx, alignMap[e.code]);
            }
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
    }, [editMode, selected, handleCellMode, handleCellAlign]);

    // The cell the format toolbar currently targets.
    const selectedCell = selected
        ? journeys[selected.jIdx]?.subJourneys?.[selected.sjIdx]?.rows?.[selected.rowIdx]?.cells?.[selected.cellIdx]
        : null;
    const selectedKey = selected
        ? `cell-${selected.jIdx}-${selected.sjIdx}-${selected.rowIdx}-${selected.cellIdx}`
        : null;

    if (!ready) return null;

    // ── Home / library screen ──
    if (!viewOnly && view === "library") {
        return (
            <>
                <LibraryScreen projects={projects} currentId={currentId}
                    onOpen={openProject} onNew={newProject}
                    onRename={renameProject} onDelete={deleteProject}
                    onLoad={() => setModal(true)} />
                {modal && <LoadModal onLoad={(text, mode, opts) => loadFromText(text, mode, { ...opts, forceNew: true })} onClose={() => setModal(false)} currentProjectName={currentName} existingJourneys={[]} />}
                {confirmState && <ConfirmModal {...confirmState} onClose={() => setConfirmState(null)} />}
            </>
        );
    }

    return (
        <>
            <TopBar innerRef={appBarRef} currentName={currentName}
                onRenameCurrent={renameCurrentProject}
                onLibrary={goLibrary}
                onDownloadSheet={exportCurrentSheet} onDownloadProject={exportProject}
                onStandaloneExport={exportStandaloneHtml}
                onPromptSheet={copyPromptCurrentSheet} onPromptProject={copyPromptProject}
                canExport={journeys.length > 0} hasMultipleSheets={journeys.length > 1} saveState={saveState} lastSaved={lastSaved}
                viewOnly={viewOnly}
                editMode={editMode} onSetEdit={(v) => setEditMode(v)}
                canUndo={historyState.canUndo} canRedo={historyState.canRedo}
                onUndo={undo} onRedo={redo} />
            {!viewOnly && editMode && journeys.length > 0 && (
                <FormatToolbar cell={selectedCell} selectedKey={selectedKey}
                    onMode={(m) => selected && handleCellMode(selected.jIdx, selected.sjIdx, selected.rowIdx, selected.cellIdx, m)}
                    onAlign={(a) => selected && handleCellAlign(selected.jIdx, selected.sjIdx, selected.rowIdx, selected.cellIdx, a)} />
            )}
            <main className="main-content">
                {journeys.length === 0 ? (
                    <EmptyState onNew={newBlankJourney} onLoad={() => setModal(true)} onPrompt={copyIdeationPrompt} />
                ) : (
                    journeys.map((j, i) => (
                        <div key={j.id + "-" + i} style={{ display: i === tab ? "block" : "none" }}>
                            <JourneyView journey={j} jIdx={i} editMode={!viewOnly && editMode}
                                selected={selected} onSelect={setSelected} onDeselect={() => setSelected(null)}
                                onTitleEdit={renameJourneyTitle}
                                onCellEdit={handleCellEdit} onCellTags={handleCellTags}
                                onRowAction={handleRowAction} onStageAction={handleStageAction}
                                onAddRow={handleAddRow} />
                        </div>
                    ))
                )}
            </main>
            <TabBar journeys={journeys} activeTab={tab} setActiveTab={setTab}
                onNew={newBlankJourney} onLoad={() => setModal(true)}
                onDelete={deleteJourney} viewOnly={viewOnly} />
            {!viewOnly && modal && <LoadModal onLoad={loadFromText} onClose={() => setModal(false)} currentProjectName={currentName} existingJourneys={journeys} />}
            {confirmState && <ConfirmModal {...confirmState} onClose={() => setConfirmState(null)} />}
        </>
    );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
