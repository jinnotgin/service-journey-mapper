// Share / enable-sync control in the app bar. Phase 1: turns a local project
// into a cloud map and surfaces shareable edit/view links.
// Build a shareable link for a map + token (?map=<id>&token=<token>).
function mapLinkFor(mapId, token) {
    const url = new URL(window.location.href);
    url.searchParams.delete(ROUTE_PROJECT_PARAM);
    url.searchParams.set(ROUTE_MAP_PARAM, mapId || "");
    if (token) url.searchParams.set("token", token);
    else url.searchParams.delete("token");
    return url.toString();
}

// Owner-only management of one share link (edit or view): copy, enable/disable,
// rotate. Lives inside the Share menu. State is driven by the server-fetched
// link, so it works after a reload (no in-memory token dependency).
function ShareLinkRow({ mapId, kind, link, onChange }) {
    const [copied, setCopied] = useState(false);
    const [busy, setBusy] = useState(false);
    const [confirmRotate, setConfirmRotate] = useState(false);
    const role = kind === "edit" ? "editor" : "viewer";
    const label = kind === "edit" ? "Edit link" : "View-only link";
    const enabled = !!link?.enabled;
    const ownerToken = getMapToken(mapId);

    const copy = async () => {
        if (!enabled || !link?.token) return;
        try {
            await navigator.clipboard.writeText(mapLinkFor(mapId, link.token));
            setCopied(true); setTimeout(() => setCopied(false), 1600);
        } catch { /* ignore */ }
    };
    const toggle = async () => {
        setBusy(true);
        try {
            const { links } = await apiManageLink(mapId, ownerToken, { action: "setEnabled", role, enabled: !enabled });
            onChange(links);
        } catch (e) { /* surfaced by caller status */ } finally { setBusy(false); }
    };
    const rotate = async () => {
        setBusy(true);
        try {
            const { links } = await apiManageLink(mapId, ownerToken, { action: "rotate", role });
            onChange(links);
            setConfirmRotate(false);
        } catch (e) { /* ignore */ } finally { setBusy(false); }
    };

    return (
        <div style={{ display: "grid", gap: 5 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: "var(--fs-xs)", color: "var(--text-sec)" }}>{label}</span>
                <span style={{ fontSize: "11px", fontWeight: 700, color: enabled ? "var(--text-sec)" : "var(--muted)" }}>
                    {enabled ? "Active" : "Disabled"}
                </span>
            </div>
            <button className="menu-item" onClick={copy} disabled={!enabled || busy}>
                {copied ? "Copied ✓" : (enabled ? `Copy ${kind} link` : "Link disabled")}
            </button>
            <div style={{ display: "flex", gap: 6 }}>
                <button className="menu-item" style={{ flex: 1 }} onClick={toggle} disabled={busy}>
                    {enabled ? "Disable" : "Enable"}
                </button>
                {confirmRotate ? (
                    <button className="menu-item danger" style={{ flex: 1 }} onClick={rotate} disabled={busy}>
                        {busy ? "Rotating…" : "Confirm rotate"}
                    </button>
                ) : (
                    <button className="menu-item" style={{ flex: 1 }} onClick={() => setConfirmRotate(true)} disabled={busy}
                        title="Invalidate the current link and generate a new one">
                        Rotate
                    </button>
                )}
            </div>
            {confirmRotate && (
                <span style={{ fontSize: "11px", color: "var(--muted)" }}>
                    Rotating invalidates the old {kind} link.{" "}
                    <button className="link-btn" onClick={() => setConfirmRotate(false)}
                        style={{ background: "none", border: "none", padding: 0, color: "var(--text-sec)", cursor: "pointer", textDecoration: "underline", fontSize: "11px", fontFamily: "inherit" }}>
                        Cancel
                    </button>
                </span>
            )}
        </div>
    );
}

// Owner-only password section in the Share menu (Phase 5). Shows the current
// status (Off / On) and lets the owner set, change, or remove a single map
// password that gates all share links. The password is sent to the server (over
// setPassword) and never stored client-side.
function PasswordControl({ mapId, enabled, onChange }) {
    const [editing, setEditing] = useState(false);
    const [value, setValue] = useState("");
    const [busy, setBusy] = useState(false);
    const [err, setErr] = useState("");
    const ownerToken = getMapToken(mapId);

    const save = async () => {
        if (!value || busy) return;
        setBusy(true); setErr("");
        try {
            const { passwordEnabled } = await apiSetPassword(mapId, ownerToken, value);
            onChange(!!passwordEnabled);
            setEditing(false); setValue("");
        } catch (e) { setErr(e.message || "Could not save password"); }
        finally { setBusy(false); }
    };
    const remove = async () => {
        setBusy(true); setErr("");
        try {
            const { passwordEnabled } = await apiClearPassword(mapId, ownerToken);
            onChange(!!passwordEnabled);
        } catch (e) { setErr(e.message || "Could not remove password"); }
        finally { setBusy(false); }
    };

    return (
        <div style={{ display: "grid", gap: 5, borderTop: "1px solid var(--border)", paddingTop: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: "var(--fs-xs)", color: "var(--text-sec)" }}>Password</span>
                <span style={{ fontSize: "11px", fontWeight: 700, color: enabled ? "var(--text-sec)" : "var(--muted)" }}>
                    {enabled ? "On" : "Off"}
                </span>
            </div>
            {editing ? (
                <div style={{ display: "grid", gap: 6 }}>
                    <input className="m-input" type="password" value={value} placeholder="New password"
                        autoComplete="new-password" autoFocus
                        onChange={(e) => { setValue(e.target.value); if (err) setErr(""); }}
                        onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); save(); } }} />
                    <div style={{ display: "flex", gap: 6 }}>
                        <button className="menu-item" style={{ flex: 1 }} onClick={save} disabled={!value || busy}>
                            {busy ? "Saving…" : "Save"}
                        </button>
                        <button className="menu-item" style={{ flex: 1 }} onClick={() => { setEditing(false); setValue(""); setErr(""); }} disabled={busy}>
                            Cancel
                        </button>
                    </div>
                </div>
            ) : (
                <div style={{ display: "flex", gap: 6 }}>
                    <button className="menu-item" style={{ flex: 1 }} onClick={() => setEditing(true)} disabled={busy}>
                        {enabled ? "Change password" : "Set password"}
                    </button>
                    {enabled && (
                        <button className="menu-item danger" style={{ flex: 1 }} onClick={remove} disabled={busy}>
                            {busy ? "Removing…" : "Remove"}
                        </button>
                    )}
                </div>
            )}
            {enabled && !editing && (
                <span style={{ fontSize: "11px", color: "var(--muted)" }}>
                    People opening a share link must enter this password.
                </span>
            )}
            {err && <span style={{ fontSize: "11px", color: "var(--red)" }}>{err}</span>}
        </div>
    );
}

function ShareControl({ sync, onEnableSync, onStopSharing }) {
    const [links, setLinks] = useState(null); // {editor:{token,enabled}, viewer:{...}}
    const [pwEnabled, setPwEnabled] = useState(false); // Phase 5: map password status
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState("");
    const [copiedSelf, setCopiedSelf] = useState(false);
    const [confirmStop, setConfirmStop] = useState(false);
    const [stopping, setStopping] = useState(false);
    const isOwner = sync.role === "owner";

    const loadLinks = useCallback(async () => {
        if (!isOwner || !sync.mapId) return;
        setLoading(true); setError("");
        try {
            const { links, passwordEnabled } = await apiGetLinks(sync.mapId, getMapToken(sync.mapId));
            setLinks(links);
            setPwEnabled(!!passwordEnabled);
        } catch (e) {
            setError(e.message || "Could not load links");
        } finally { setLoading(false); }
    }, [isOwner, sync.mapId]);

    const handleEnable = async () => { await onEnableSync(); };
    const stopSharing = async () => {
        setStopping(true);
        try {
            await apiDeleteMap(sync.mapId, getMapToken(sync.mapId));
            removeMapToken(sync.mapId);
            onStopSharing();
        } catch (e) {
            setError(e.message || "Could not delete map");
            setStopping(false);
            setConfirmStop(false);
        }
    };
    const copySelf = async () => {
        try {
            await navigator.clipboard.writeText(mapLinkFor(sync.mapId, getMapToken(sync.mapId)));
            setCopiedSelf(true); setTimeout(() => setCopiedSelf(false), 1600);
        } catch { /* ignore */ }
    };

    if (sync.status !== "synced") {
        return (
            <button className="ab-back" onClick={handleEnable} disabled={sync.status === "enabling"}
                title="Create a shareable cloud copy of this map">
                {sync.status === "enabling" ? "Sharing…" : "Share map"}
            </button>
        );
    }

    return (
        <Menu trigger="Share ▾" align="right" onOpen={loadLinks}>
            {() => (
                <div style={{ padding: "10px 12px", minWidth: 280, display: "grid", gap: 12 }}>
                    <div className="menu-label">Anyone with a link can join</div>
                    {!isOwner ? (
                        <div style={{ display: "grid", gap: 6 }}>
                            <span style={{ fontSize: "var(--fs-xs)", color: "var(--text-sec)" }}>
                                You're in this shared map as {sync.role}.
                            </span>
                            <button className="menu-item" onClick={copySelf}>
                                {copiedSelf ? "Copied ✓" : "Copy this link"}
                            </button>
                        </div>
                    ) : loading && !links ? (
                        <span style={{ fontSize: "var(--fs-sm)", color: "var(--text-sec)" }}>Loading links…</span>
                    ) : error ? (
                        <span style={{ fontSize: "var(--fs-sm)", color: "var(--red)" }}>{error}</span>
                    ) : links ? (
                        <>
                            <ShareLinkRow mapId={sync.mapId} kind="edit" link={links.editor} onChange={setLinks} />
                            <ShareLinkRow mapId={sync.mapId} kind="view" link={links.viewer} onChange={setLinks} />
                            <PasswordControl mapId={sync.mapId} enabled={pwEnabled}
                                onChange={(pe) => setPwEnabled(pe)} />
                            <div style={{ borderTop: "1px solid var(--border)", paddingTop: 10, display: "grid", gap: 6 }}>
                                {confirmStop ? (
                                    <>
                                        <span style={{ fontSize: "11px", color: "var(--text-sec)" }}>
                                            This permanently deletes the cloud map. Collaborators will lose access.
                                        </span>
                                        <div style={{ display: "flex", gap: 6 }}>
                                            <button className="menu-item danger" style={{ flex: 1 }} onClick={stopSharing} disabled={stopping}>
                                                {stopping ? "Deleting…" : "Yes, delete"}
                                            </button>
                                            <button className="menu-item" style={{ flex: 1 }} onClick={() => setConfirmStop(false)} disabled={stopping}>
                                                Cancel
                                            </button>
                                        </div>
                                    </>
                                ) : (
                                    <button className="menu-item danger" onClick={() => setConfirmStop(true)}>
                                        Stop sharing &amp; delete
                                    </button>
                                )}
                            </div>
                        </>
                    ) : (
                        <span style={{ fontSize: "var(--fs-sm)", color: "var(--text-sec)" }}>No links available.</span>
                    )}
                </div>
            )}
        </Menu>
    );
}

// Presence avatar stack (Phase 3): a compact, overlapping row of badges for the
// other people currently in this map. Caps at 5 avatars + a "+N" badge.
function PresenceStack({ peers }) {
    if (!peers || peers.length === 0) return null;
    const MAX = 5;
    const shown = peers.slice(0, MAX);
    const extra = peers.length - shown.length;
    return (
        <div className="presence-stack" aria-label={`${peers.length} other ${peers.length === 1 ? "person" : "people"} here`}>
            {shown.map((p) => (
                <span key={p.clientId} className="presence-av" title={p.name || "Anonymous"}
                    style={{ background: p.color || "var(--text-sec)" }}>
                    {presenceInitials(p.name)}
                </span>
            ))}
            {extra > 0 && (
                <span className="presence-av more" title={`${extra} more`}>+{extra}</span>
            )}
        </div>
    );
}

function saveStatusLabel(saveState, lastSaved) {
    if (saveState === "saving") return "Saving...";
    if (!lastSaved) return "";
    return `Saved ${fmtDate(lastSaved)}`;
}

function saveStatusTooltip(lastSaved, lastSavedBy) {
    if (!lastSaved) return "";
    const who = lastSavedBy || "you";
    return `Saved by ${who} ${fmtDate(lastSaved)}`;
}

// LOAD MODAL
// ═══════════════════════════════════════
function LoadModal({ onLoad, onClose, currentProjectName, existingJourneys = [] }) {
    const [text, setText] = useState("");
    const [review, setReview] = useState(null);
    const [confirmedProjectDetails, setConfirmedProjectDetails] = useState(false);
    const existingCount = existingJourneys.length;
    const fileRef = useRef(null);
    const bodyRef = useRef(null);

    useEffect(() => {
        if (!review) return;
        bodyRef.current?.scrollTo({ top: bodyRef.current.scrollHeight, behavior: "smooth" });
    }, [review]);

    const handleFile = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => { setText(ev.target.result); setReview(null); setConfirmedProjectDetails(false); };
        r.readAsText(f);
    };

    const getImportReview = () => {
        const parsed = parseInput(text);
        const data = hydrate(parsed.journeys);
        if (!data.length) throw new Error("No valid journey data found.");
        const nextProjectName = parsed.name?.trim() || null;
        const sameProjectName = !currentProjectName || !nextProjectName || nextProjectName === currentProjectName;
        const existingTitles = new Set(existingJourneys.map((j) => j?.title).filter(Boolean));
        const affectedSheets = data
            .map((j) => j?.title)
            .filter((title) => title && existingTitles.has(title));
        return { data, nextProjectName, sameProjectName, affectedSheets };
    };

    const handleReview = () => {
        if (!text.trim()) return;
        try {
            const nextReview = getImportReview();
            setReview(nextReview);
            setConfirmedProjectDetails(false);
            if (!nextReview.affectedSheets.length && (nextReview.sameProjectName || existingCount === 0)) handleSubmit("replace", nextReview);
        }
        catch (err) { alert("Error parsing data:\n" + err.message); }
    };

    const handleSubmit = async (mode, nextReview = review) => {
        if (!text.trim()) return;
        const importReview = nextReview || getImportReview();
        try { await onLoad(text, mode, { updateProjectName: mode === "replace" && !!importReview.nextProjectName && importReview.sameProjectName }); onClose(); }
        catch (err) { alert("Error parsing data:\n" + err.message); }
    };

    const needsChoice = review && review.affectedSheets.length > 0;
    const needsProjectDetailsConfirm = review && !review.sameProjectName && existingCount > 0;
    const canImport = review && (!needsProjectDetailsConfirm || confirmedProjectDetails);

    return (
        <div className="m-ov" onClick={onClose}>
            <div className="m-box" onClick={(e) => e.stopPropagation()}>
                <div className="m-hdr">
                    <h3>Load JSON Data</h3>
                    <button className="m-close" onClick={onClose}>✕</button>
                </div>
                <div ref={bodyRef} className="m-body">
                    <p>Paste extracted JSON below, or upload a <code>.json</code> / <code>.txt</code> file. Exported project files are also accepted.</p>
                    <textarea value={text} onChange={(e) => { setText(e.target.value); setReview(null); setConfirmedProjectDetails(false); }} rows={14}
                        placeholder={'Paste JSON here…\n\nA JSON array of service journeys (each item = one tab).'} />
                    <div className="m-file">
                        <button className="btn-s" onClick={() => fileRef.current?.click()}>📁 Upload file</button>
                        <input ref={fileRef} type="file" accept=".json,.txt" onChange={handleFile} style={{ display: "none" }} />
                    </div>
                    {review && (needsChoice || needsProjectDetailsConfirm) && (
                        <div className="m-summary">
                            {needsChoice && (
                                <div className="m-warn">
                                    ⚠️ {review.affectedSheets.length} imported sheet{review.affectedSheets.length === 1 ? "" : "s"} match existing sheet title{review.affectedSheets.length === 1 ? "" : "s"}.
                                    <b>Affected:</b>
                                    <ul className="m-sheet-list">
                                        {review.affectedSheets.map((title) => <li key={title}>{title}</li>)}
                                    </ul>
                                </div>
                            )}
                            {needsProjectDetailsConfirm && (
                                <div className="m-summary-card">
                                    <b>Different project details</b><br />
                                    Imported project name: {review.nextProjectName}
                                    {currentProjectName && <> <br />Current project name: {currentProjectName}</>}
                                    <label className="m-check">
                                        <input type="checkbox" checked={confirmedProjectDetails} onChange={(e) => setConfirmedProjectDetails(e.target.checked)} />
                                        Keep the current project details and add only the imported sheets.
                                    </label>
                                </div>
                            )}
                        </div>
                    )}
                </div>
                <div className="m-ft">
                    <button className="btn-s" onClick={onClose}>Cancel</button>
                    {!review ? (
                        <button className="btn-p" onClick={handleReview} disabled={!text.trim()}>Load Data</button>
                    ) : needsChoice ? (
                        <>
                            <button className="btn-danger" onClick={() => handleSubmit("overwriteAffected")} disabled={!canImport}>Overwrite affected sheets</button>
                            <button className="btn-p" onClick={() => handleSubmit("append")} disabled={!canImport}>Add as new sheets</button>
                        </>
                    ) : needsProjectDetailsConfirm ? (
                        <button className="btn-p" onClick={() => handleSubmit("append")} disabled={!canImport}>Add sheets</button>
                    ) : existingCount > 0 ? (
                        <button className="btn-p" onClick={() => handleSubmit("append")} disabled={!text.trim()}>Add sheets</button>
                    ) : (
                        <button className="btn-p" onClick={() => handleSubmit("replace")} disabled={!text.trim()}>Load Data</button>
                    )}
                </div>
            </div>
        </div>
    );
}

function ConfirmModal({ title, message, confirmLabel, danger, onConfirm, onClose }) {
    useEffect(() => {
        const h = (e) => { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", h);
        return () => window.removeEventListener("keydown", h);
    }, [onClose]);
    return (
        <div className="m-ov" onClick={onClose}>
            <div className="m-box m-sm" onClick={(e) => e.stopPropagation()}>
                <div className="m-hdr">

                </div>
                <div className="m-body"><p style={{ margin: 0 }}>{message}</p></div>
                <div className="m-ft">
                    <button className="btn-s" onClick={onClose}>Cancel</button>
                    <button className={danger ? "btn-danger" : "btn-p"}

}

// Password gate (Phase 5): shown when opening a password-protected share link.
// `onSubmit(password)` returns null on success or an error string to display.
function PasswordGateModal({ onSubmit, onCancel }) {
    const [password, setPassword] = useState("");
    const [error, setError] = useState("");
    const [busy, setBusy] = useState(false);
    const inputRef = useRef(null);
    useEffect(() => { inputRef.current?.focus(); }, []);
    useEffect(() => {
        const h = (e) => { if (e.key === "Escape") onCancel(); };
        window.addEventListener("keydown", h);
        return () => window.removeEventListener("keydown", h);
    }, [onCancel]);

    const submit = async () => {
        if (!password || busy) return;
        setBusy(true); setError("");
        const err = await onSubmit(password);
        if (err) { setError(err); setBusy(false); }
        // On success the modal unmounts (passwordGate cleared by the parent).
    };

    return (
        <div className="m-ov" onClick={onCancel}>
            <div className="m-box m-sm" onClick={(e) => e.stopPropagation()}>
                <div className="m-hdr">
                    <h3>Password required</h3>
                    <button className="m-close" onClick={onCancel} aria-label="Close">✕</button>
                </div>
                <div className="m-body" style={{ display: "grid", gap: 10 }}>
                    <p style={{ margin: 0, color: "var(--text-sec)", fontSize: "var(--fs-sm)" }}>
                        This shared map is protected. Enter the password to open it.
                    </p>
                    <input ref={inputRef} className="m-input" type="password" value={password}
                        placeholder="Password" autoComplete="current-password"
                        onChange={(e) => { setPassword(e.target.value); if (error) setError(""); }}
                        onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); submit(); } }} />
                    {error && <span style={{ color: "var(--red)", fontSize: "var(--fs-sm)" }}>{error}</span>}
                </div>
                <div className="m-ft">
                    <button className="btn-s" onClick={onCancel}>Cancel</button>
                    <button className="btn-p" onClick={submit} disabled={!password || busy}>
                        {busy ? "Checking…" : "Open map"}
                    </button>
                </div>
            </div>
        </div>
    );
}

function ProjectCard({ p, current, onOpen, onRename, onDelete }) {
    const [editing, setEditing] = useState(false);
    const [draft, setDraft] = useState(p.name);
    const inputRef = useRef(null);
    useEffect(() => { if (editing) { inputRef.current?.focus(); inputRef.current?.select(); } }, [editing]);
    const startRename = () => { setDraft(p.name); setEditing(true); };
    const commit = () => {
        const n = draft.trim();
        setEditing(false);
        if (n && n !== p.name) onRename(p.id, n); else setDraft(p.name);
    };
    const count = p.journeys?.length || 0;
    // Cloud-linked projects show the collaborative edit (who/when), not the local
    // mirror's write time. fall back to the local Modified timestamp otherwise.
    const cloudWhen = p.cloudMapId ? (p.cloudUpdatedAt || p.updatedAt) : null;
    const cloudWho = p.cloudUpdatedByName;
    const updatedLabel = p.cloudMapId
        ? (cloudWho ? `Updated by ${cloudWho} ${fmtDate(cloudWhen)}` : `Updated ${fmtDate(cloudWhen)}`)
        : `Modified ${fmtDate(p.updatedAt)}`;
    return (
        <div className={`project-row${current ? " current" : ""}`} role="button" tabIndex={0}
            onClick={() => !editing && onOpen(p.id)}
            onKeyDown={(e) => { if (!editing && (e.key === "Enter" || e.key === " ")) { e.preventDefault(); onOpen(p.id); } }}>
            <div className="pc-main">
                {current && <span className="pc-badge">Last opened</span>}
                {p.cloudMapId && <span className="pc-badge cloud">Cloud</span>}
                {editing ? (
                    <input ref={inputRef} className="m-input pc-rename" value={draft}
                        onClick={(e) => e.stopPropagation()} onChange={(e) => setDraft(e.target.value)} onBlur={commit}
                        onKeyDown={(e) => {
                            if (e.key === "Enter") { e.preventDefault(); commit(); }
                            if (e.key === "Escape") { setDraft(p.name); setEditing(false); }
                        }} />
                ) : (
                    <div className="pc-name" title={p.name}>{p.name}</div>
                )}
            </div>
            <div className="pc-count">{count} journey{count === 1 ? "" : "s"}</div>
            <div className="pc-updated" title={updatedLabel}>{updatedLabel}</div>
            <div className="pc-menu" onClick={(e) => e.stopPropagation()}>
                <Menu align="right">
                    {(close) => (
                        <>
                            <button className="menu-item" onClick={() => { startRename(); close(); }}><LucideIcon name="pencil" />Rename</button>
                            <button className="menu-item danger" onClick={() => { onDelete(p.id, p.name); close(); }}><LucideIcon name="trash2" />Delete</button>
                        </>
                    )}
                </Menu>
            </div>
        </div>
    );
}

// ═══════════════════════════════════════
// DROPDOWN MENU (click-away)
// ═══════════════════════════════════════
function Menu({ trigger, align, children, onOpen }) {
    const [open, setOpen] = useState(false);
    const [pos, setPos] = useState(null);
    const triggerRef = useRef(null);
    const popRef = useRef(null);

    // Position the popup (rendered in a body-level portal so it escapes the
    // table's overflow:auto scroll containers and sticky stacking contexts).
    // We always resolve to a `left` coordinate (even for align="right") so the
    // result can be clamped to the viewport, preventing the popup from being
    // clipped off the left/right edge on narrow screens. The popup width is
    // measured from the rendered node when available; until then we fall back
    // to the CSS min-width (184) so the very first frame is still on-screen.
    const place = useCallback(() => {
        const t = triggerRef.current;
        if (!t) return;
        const r = t.getBoundingClientRect();
        const M = 8; // viewport margin
        const w = popRef.current?.getBoundingClientRect().width || 184;
        // Intended left: align the popup's right edge to the trigger's right
        // edge for align="right", otherwise its left edge to the trigger's left.
        let left = align === "right" ? r.right - w : r.left;
        // Clamp horizontally so the popup stays fully on-screen.
        left = Math.min(Math.max(M, left), Math.max(M, window.innerWidth - w - M));
        setPos({ top: r.bottom + 3, left });
    }, [align]);

    useEffect(() => {
        if (!open) return;
        place();
        // Re-place once the portal has rendered so we can measure its real
        // width and clamp accurately (the first pass uses the fallback width).
        const raf = requestAnimationFrame(place);
        const onDown = (e) => {
            if (popRef.current?.contains(e.target) || triggerRef.current?.contains(e.target)) return;
            setOpen(false);
        };
        document.addEventListener("mousedown", onDown);
        window.addEventListener("scroll", place, true);
        window.addEventListener("resize", place);
        return () => {
            cancelAnimationFrame(raf);
            document.removeEventListener("mousedown", onDown);
            window.removeEventListener("scroll", place, true);
            window.removeEventListener("resize", place);
        };
    }, [open, place]);

    return (
        <span className="menu-wrap" ref={triggerRef}>
            <button className="menu-trigger" title="Options" aria-label="Options"
                onClick={(e) => { e.stopPropagation(); setOpen((o) => { if (!o) onOpen?.(); return !o; }); }}>{trigger || <LucideIcon name="moreVertical" />}</button>
            {open && pos && createPortal(
                <div ref={popRef} className="menu-pop menu-portal"
                    style={{ top: pos.top, left: pos.left }}
                    onClick={(e) => e.stopPropagation()}>
                    {typeof children === "function" ? children(() => setOpen(false)) : children}
                </div>, document.body)}
        </span>
    );
}

// ═══════════════════════════════════════
// TAG ADDER (inline, for tags-mode cells)
// ═══════════════════════════════════════
function TagAdder({ onAdd, onCancel, existing = [] }) {
    const [text, setText] = useState("");
    const [ci, setCi] = useState(0);
    const [pickerOpen, setPickerOpen] = useState(false);
    const [open, setOpen] = useState(false);
    const [hi, setHi] = useState(0);
    const [pickerPos, setPickerPos] = useState(null);
    const [suggestPos, setSuggestPos] = useState(null);
    const rootRef = useRef(null);
    const swatchRef = useRef(null);
    const inputRef = useRef(null);
    const c = TAG_COLORS[ci];

    const taken = useMemo(
        () => new Set(existing.map((t) => (t.text || "").trim().toLowerCase())),
        [existing]
    );

    // Previously-used tags across the doc that match the query and aren't
    // already on this row. Empty query → show all available (capped).
    const suggestions = useMemo(() => {
        const q = text.trim().toLowerCase();
        return collectUsedTags()
            .filter((t) => !taken.has(t.text.toLowerCase()))
            .filter((t) => !q || t.text.toLowerCase().includes(q))
            .slice(0, 8);
    }, [text, taken]);

    const exactExists = useMemo(() => {
        const q = text.trim().toLowerCase();
        return !!q && taken.has(q);
    }, [text, taken]);

    // Unified, navigable option list: matching existing tags first, then a
    // "create new" entry when the typed text isn't already a suggestion/taken.
    const options = useMemo(() => {
        const opts = suggestions.map((t) => ({ kind: "existing", tag: t, key: "e:" + t.text }));
        const q = text.trim();
        if (q && !exactExists && !suggestions.some((s) => s.text.toLowerCase() === q.toLowerCase())) {
            opts.push({ kind: "new", text: q, key: "n:" + q });
        }
        return opts;
    }, [suggestions, text, exactExists]);

    // Keep highlight in range; default to the first option.
    useEffect(() => { setHi(0); }, [text]);
    useEffect(() => {
        setHi((h) => (options.length ? Math.min(h, options.length - 1) : 0));
    }, [options.length]);

    // Position popovers (portaled to body) relative to their anchors, opening
    // upward so they clear the cell toolbar that sits below the cell.
    const placePicker = useCallback(() => {
        const el = swatchRef.current;
        if (!el) return;
        const r = el.getBoundingClientRect();
        setPickerPos({ left: r.left, bottom: window.innerHeight - r.top + 6 });
    }, []);
    const placeSuggest = useCallback(() => {
        const el = inputRef.current;
        if (!el) return;
        const r = el.getBoundingClientRect();
        setSuggestPos({ left: r.left, bottom: window.innerHeight - r.top + 6, minWidth: r.width });
    }, []);

    useEffect(() => {
        if (!pickerOpen) return;
        placePicker();
        window.addEventListener("scroll", placePicker, true);
        window.addEventListener("resize", placePicker);
        return () => { window.removeEventListener("scroll", placePicker, true); window.removeEventListener("resize", placePicker); };
    }, [pickerOpen, placePicker]);

    useEffect(() => {
        if (!open) return;
        placeSuggest();
        window.addEventListener("scroll", placeSuggest, true);
        window.addEventListener("resize", placeSuggest);
        return () => { window.removeEventListener("scroll", placeSuggest, true); window.removeEventListener("resize", placeSuggest); };
    }, [open, placeSuggest]);

    // Close popovers when clicking outside (root or the portaled popovers).
    useEffect(() => {
        if (!open && !pickerOpen) return;
        const onDown = (e) => {
            const t = e.target;
            if (rootRef.current?.contains(t)) return;
            if (t.closest?.(".tag-color-pop, .tag-suggest")) return;
            setOpen(false); setPickerOpen(false);
        };
        document.addEventListener("mousedown", onDown);
        return () => document.removeEventListener("mousedown", onDown);
    }, [open, pickerOpen]);

    const reset = () => { setText(""); setOpen(false); setHi(0); };

    const addNew = () => {
        const t = text.trim();
        if (!t || taken.has(t.toLowerCase())) return;
        // If the typed text matches a previously-used tag, reuse its color
        // instead of the picker color so tag colors stay consistent.
        const match = collectUsedTags().find((u) => u.text.toLowerCase() === t.toLowerCase());
        if (match) onAdd({ text: match.text, bg: match.bg, fg: match.fg });
        else onAdd({ text: t, bg: c.bg, fg: c.fg });
        reset();
    };
    const addExisting = (tag) => {
        if (taken.has(tag.text.toLowerCase())) return;
        onAdd({ text: tag.text, bg: tag.bg, fg: tag.fg });
        reset();
    };
    const commitOption = (opt) => {
        if (!opt) { addNew(); return; }
        if (opt.kind === "existing") addExisting(opt.tag);
        else addNew();
    };

    const onKeyDown = (e) => {
        if (e.key === "ArrowDown") {
            e.preventDefault();
            if (options.length) { setOpen(true); setHi((h) => (h + 1) % options.length); }
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (options.length) { setOpen(true); setHi((h) => (h - 1 + options.length) % options.length); }
        } else if (e.key === "Enter") {
            e.preventDefault();
            if (open && options.length) commitOption(options[hi]);
            else addNew();
        } else if (e.key === "Escape") {
            e.preventDefault();
            setOpen(false); setPickerOpen(false);
            onCancel?.();
        }
    };

    return (
        <div className="tag-add" contentEditable={false} ref={rootRef}>
            <div className="tag-add-row">
                <button ref={swatchRef} className="tag-add-color" style={{ background: c.bg }}
                    title={`color: ${c.name}`}
                    onClick={() => { setPickerOpen((o) => !o); setOpen(false); }} />
                <input ref={inputRef} value={text} placeholder="add tag…"
                    onChange={(e) => { setText(e.target.value); setOpen(true); setPickerOpen(false); }}
                    onFocus={() => { setOpen(true); setPickerOpen(false); }}
                    onKeyDown={onKeyDown} />
                <button className="tag-add-go" onClick={addNew} disabled={!text.trim() || exactExists}
                    title={exactExists ? "tag already added" : "add new tag"}>＋</button>
            </div>
            {pickerOpen && pickerPos && createPortal(
                <div className="tag-color-pop" style={{ left: pickerPos.left, bottom: pickerPos.bottom }}>
                    {TAG_COLORS.map((col, i) => (
                        <button key={col.name} className={`tag-color-cell${i === ci ? " sel" : ""}`}
                            style={{ background: col.bg }} title={col.name}
                            onMouseDown={(e) => { e.preventDefault(); setCi(i); setPickerOpen(false); }} />
                    ))}
                </div>, document.body)}
            {open && suggestPos && (options.length > 0 || exactExists) && createPortal(
                <div className="tag-suggest" style={{ left: suggestPos.left, bottom: suggestPos.bottom, minWidth: suggestPos.minWidth }}>
                    {exactExists && (
                        <div className="tag-suggest-note">already added to this cell</div>
                    )}
                    {options.map((opt, i) => opt.kind === "existing" ? (
                        <button key={opt.key} className={`tag-suggest-item${i === hi ? " hi" : ""}`}
                            onMouseEnter={() => setHi(i)}
                            onMouseDown={(e) => { e.preventDefault(); addExisting(opt.tag); }}>
                            <span className="tag-chip" style={{ background: opt.tag.bg, color: opt.tag.fg }}>{opt.tag.text}</span>
                            <span className="tag-suggest-hint">existing</span>
                        </button>
                    ) : (
                        <button key={opt.key} className={`tag-suggest-item tag-suggest-new${i === hi ? " hi" : ""}`}
                            onMouseEnter={() => setHi(i)}
                            onMouseDown={(e) => { e.preventDefault(); addNew(); }}>
                            <span className="tag-chip" style={{ background: c.bg, color: c.fg }}>{opt.text}</span>
                            <span className="tag-suggest-hint">create new</span>
                        </button>
                    ))}
                </div>, document.body)}
        </div>
    );
}

// ═══════════════════════════════════════
// EDITABLE CELL (uncontrolled contentEditable + save/discard)
// ═══════════════════════════════════════
// We own the DOM after mount and only re-sync innerHTML from props when the
// element is NOT focused. This avoids React resetting the caret to the start
// while typing. The edit commits when the cell loses focus (click away, or
// Escape to finish via the keyboard).
function EditableCell({ html, editMode, className, style, colSpan, cellKey, cellId, lockedBy,
        onCommit, onFocusCell, onDone, onAcquireLock, onReleaseLock }) {
    const ref = useRef(null);
    // A peer is editing this cell: render it read-only and do not let it focus.
    const peerLocked = !!lockedBy;

    useEffect(() => {
        const el = ref.current;
        // When a peer holds the lock React controls this td (badge + html via
        // dangerouslySetInnerHTML), so don't imperatively touch innerHTML here.
        if (!el || peerLocked || document.activeElement === el) return;
        const next = html || "";
        if (el.innerHTML !== next) el.innerHTML = next;
    }, [html, peerLocked]);

    const handleFocus = () => {
        onFocusCell?.();
        // Edit-intent: acquire the lock on focus (NOT on selection/click).
        onAcquireLock?.(cellId);
    };
    const handleBlur = () => {
        onCommit(ref.current?.innerHTML ?? "");
        onDone?.();
        onReleaseLock?.(); // clean release on blur (also covers Escape, which blurs)
    };
    const handleKeyDown = (e) => {
        // Escape just finishes editing (blur commits); it does not discard.
        if (e.key === "Escape") { e.preventDefault(); ref.current?.blur(); return; }
        // Own the B/I/U shortcuts so they apply our formatting (matching the
        // toolbar) instead of relying on the browser's default contentEditable
        // handling, which can vary by browser/markup.
        if ((e.metaKey || e.ctrlKey) && !e.altKey) {
            const cmd = { b: "bold", i: "italic", u: "underline" }[e.key.toLowerCase()];
            if (cmd) { e.preventDefault(); document.execCommand(cmd, false, null); }
        }
    };

    // Peer-locked: React fully owns the td (read-only, no focus, badge + html).
    if (peerLocked) {
        return (
            <td className={className} style={style} colSpan={colSpan}
                data-cell-key={cellKey}
                title={`Editing: ${lockedBy.name || "Someone"}`}>
                <div key="locked" className="cell-note cell-locked-html" dangerouslySetInnerHTML={{ __html: html || "" }} />
                <LockBadge lockedBy={lockedBy} />
            </td>
        );
    }

    return (
        <td className={className} style={style} colSpan={colSpan}
            data-cell-key={cellKey}
            onMouseDown={(e) => {
                if (!editMode || e.target !== e.currentTarget) return;
                e.preventDefault();
                ref.current?.focus();
            }}>
            <div key="editable" ref={ref} className="cell-note" contentEditable={editMode} suppressContentEditableWarning
                data-placeholder={editMode ? "Add note" : ""}
                dangerouslySetInnerHTML={{ __html: html || "" }}
                onFocus={handleFocus} onBlur={handleBlur} onKeyDown={handleKeyDown} />
        </td>
    );
}

// ═══════════════════════════════════════
// CELL
// ═══════════════════════════════════════
// Small badge shown on a cell another collaborator is currently editing (Phase 8).
function LockBadge({ lockedBy }) {
    if (!lockedBy) return null;
    return (
        <span className="cell-lock-badge" style={{ background: lockedBy.color || "var(--accent)" }}
            title={`Editing: ${lockedBy.name || "Someone"}`} aria-label={`Editing: ${lockedBy.name || "Someone"}`}>
            {presenceInitials(lockedBy.name)}
        </span>
    );
}

function Cell({ cell, editMode, selected, rowBg, cellKey, onSelect, onEditHtml, onTagsChange, onDeselect,
        lockedBy, onAcquireLock, onReleaseLock }) {
    const mode = cell.mode || "text";
    const alignClass = (cell.align || "left") === "center" ? "al-center" : "al-left";
    const peerLocked = !!lockedBy; // a DIFFERENT collaborator is editing this cell
    const hasHtml = !!String(cell.html || "").replace(/<br\s*\/?>|&nbsp;|\s|<[^>]*>/gi, "");
    const cls = `dc ${alignClass}${cell.colspan ? " dc-span" : ""}${selected ? " cell-sel" : ""}${peerLocked ? " cell-locked" : ""}${hasHtml ? " cell-filled" : ""}`;
    const style = rowBg ? { background: rowBg } : undefined;

    if (mode === "tags") {
        const tags = cell.tags || [];
        // While a peer holds the lock, the tags cell is read-only: no select, no
        // add/remove affordances. Tags edit is an edit-intent → acquire on entering
        // edit (selecting in edit mode), release when deselected.
        return (
            <td className={`${cls} cell-tags-mode${tags.length ? " cell-filled" : ""}`} colSpan={cell.colspan || undefined} style={style}
                data-cell-key={cellKey}
                onClick={peerLocked ? undefined : () => { onSelect(); if (editMode && !selected) onAcquireLock?.(cell.id); }}>
                <div className="cell-tags" style={{ justifyContent: (cell.align || "left") === "center" ? "center" : "flex-start" }}>
                    {tags.map((t, i) => (
                        <span key={i} className="tag-chip" style={{ background: t.bg, color: t.fg }}>
                            {t.text}
                            {editMode && selected && !peerLocked && <span className="tag-x" title="remove"
                                onClick={(e) => { e.stopPropagation(); onTagsChange(tags.filter((_, k) => k !== i)); }}>✕</span>}
                        </span>
                    ))}
                    {!tags.length && <span className="cell-empty-hint">{editMode ? "Add tags" : "No tags"}</span>}
                </div>
                {editMode && selected && !peerLocked && <TagAdder existing={tags}
                    onAdd={(t) => onTagsChange([...tags, t])}
                    onCancel={onDeselect} />}
                <LockBadge lockedBy={lockedBy} />
            </td>
        );
    }

    const modeClass = mode === "bullets" ? " cell-bullets" : mode === "boxes" ? " cell-boxes" : "";
    return (
        <EditableCell html={cell.html} editMode={editMode}
            className={`${cls}${modeClass}`} colSpan={cell.colspan || undefined} style={style}
            cellKey={cellKey} cellId={cell.id} lockedBy={lockedBy}
            onCommit={onEditHtml} onFocusCell={onSelect} onDone={onDeselect}
            onAcquireLock={onAcquireLock} onReleaseLock={onReleaseLock} />
    );
}

// ═══════════════════════════════════════
// BLUEPRINT ROW
// ═══════════════════════════════════════
function BlueprintRow({ row, rowIdx, editMode, total, selectedCellIdx, cellKeyPrefix, dragState, dropRowIdx,
        onSelect, onCellEdit, onCellTags, onRowAction, onRowDragStart, onRowDragOver, onRowDrop, onDragEnd, onDeselect,
        lockedByPeer, onAcquireLock, onReleaseLock }) {
    const rowBg = row.customColor || null;
    const isDivider = row.rowType === DIVIDER_TYPE;
    return (
        <tr className={`${row.rowType || ""}${dragState?.type === "row" && dragState.rowIdx === rowIdx ? " dragging" : ""}${dropRowIdx === rowIdx ? " drop-before" : ""}`}
            onDragOver={editMode ? (e) => onRowDragOver(e, rowIdx) : undefined}
            onDrop={editMode ? (e) => onRowDrop(e, rowIdx) : undefined}>
            <td className={`ll${editMode ? " ll-editing" : ""}`} style={rowBg ? { background: rowBg } : undefined}>
                {editMode && (
                    <>
                    <span className="drag-handle row-drag" draggable title="Drag to reorder row"
                        onDragStart={(e) => onRowDragStart(e, rowIdx)} onDragEnd={onDragEnd}>⠿</span>
                    <span className="insert-zone ins-row-t-zone">
                        <button type="button" className="ins-btn" title="Add row here"
                            onClick={() => onRowAction("insertAbove")}>+</button>
                    </span>
                    <span className="row-menu">
                        <Menu align="left">
                            {(close) => (
                                <>
                                    <button className="menu-item" onClick={() => { onRowAction("insertAbove"); close(); }}>↑ Insert row above</button>
                                    <button className="menu-item" onClick={() => { onRowAction("insertBelow"); close(); }}>↓ Insert row below</button>
                                    <div className="menu-sep" />
                                    <div className="menu-head">Row type</div>
                                    <select className="menu-select" value={row.rowType || ""} onChange={(e) => onRowAction("type", e.target.value)}>
                                        {ROW_TYPES.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                                    </select>
                                    <div className="menu-head">Background</div>
                                    <div className="swatches">
                                        {ROW_COLORS.map((c) => (
                                            <button key={c} className="swatch" style={{ background: c }} title={c}
                                                onClick={() => onRowAction("color", c)} />
                                        ))}
                                        <label className="swatch sw-custom" title="Custom color…">
                                            <input type="color" className="sw-input"
                                                onChange={(e) => onRowAction("color", e.target.value)} />
                                        </label>
                                        <button className="swatch" title="clear override"
                                            style={{ background: "repeating-linear-gradient(45deg,#fff,#fff 3px,#ddd 3px,#ddd 6px)" }}
                                            onClick={() => onRowAction("color", null)} />
                                    </div>
                                    <div className="menu-sep" />
                                    <button className="menu-item danger" onClick={() => { onRowAction("delete"); close(); }}><LucideIcon name="trash2" />Delete row</button>
                                </>
                            )}
                        </Menu>
                    </span>
                    </>
                )}
                <LaneLabel rowType={row.rowType} label={row.laneLabel} editable={editMode}
                    onCommit={(value) => onRowAction("label", value)} />
            </td>
            {isDivider ? (() => {
                const dCell = row.cells[0] || {};
                const dLock = lockedByPeer?.get(dCell.id) || null;
                return (
                <EditableCell html={dCell.html || ""} editMode={editMode}
                    className={`dc dc-span al-center${selectedCellIdx === 0 ? " cell-sel" : ""}${dLock ? " cell-locked" : ""}`}
                    colSpan={total} style={rowBg ? { background: rowBg } : undefined}
                    cellKey={`${cellKeyPrefix}-0`} cellId={dCell.id} lockedBy={dLock}
                    onCommit={(html) => onCellEdit(0, html)} onFocusCell={() => onSelect(0)} onDone={onDeselect}
                    onAcquireLock={onAcquireLock} onReleaseLock={onReleaseLock} />
                );
            })() : (
                row.cells.map((cell, ci) => (
                    <Cell key={ci} cell={cell} editMode={editMode} rowBg={rowBg}
                        selected={ci === selectedCellIdx}
                        cellKey={`${cellKeyPrefix}-${ci}`}
                        lockedBy={lockedByPeer?.get(cell.id) || null}
                        onAcquireLock={onAcquireLock} onReleaseLock={onReleaseLock}
                        onSelect={() => onSelect(ci)}
                        onEditHtml={(html) => onCellEdit(ci, html)}
                        onTagsChange={(tags) => onCellTags(ci, tags)}
                        onDeselect={onDeselect} />
                ))
            )}
            {editMode && <td className="add-col-c" aria-hidden="true" />}
        </tr>
    );
}

// ═══════════════════════════════════════
// TEXT COLOR CONTROL (popover of swatches)
// ═══════════════════════════════════════
function TextColorControl({ disabled }) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);
    useEffect(() => {
        if (!open) return;
        const h = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
        document.addEventListener("mousedown", h);
        return () => document.removeEventListener("mousedown", h);
    }, [open]);
    // mousedown + preventDefault keeps the cell's text selection while we recolor it.
    const apply = (color) => (e) => {
        e.preventDefault();
        document.execCommand("styleWithCSS", false, true);
        document.execCommand("foreColor", false, color);
        document.execCommand("styleWithCSS", false, false);
        setOpen(false);
    };
    return (
        <div className="tb-color" ref={ref}>
            <button className="tb-btn" disabled={disabled} title="Text color"
                onMouseDown={(e) => { e.preventDefault(); setOpen((o) => !o); }}><span className="tb-A">A</span></button>
            {open && (
                <div className="color-pop" onMouseDown={(e) => e.preventDefault()}>
                    {TEXT_COLORS.map((c) => (
                        <button key={c} className="swatch" style={{ background: c }} title={c} onMouseDown={apply(c)} />
                    ))}
                </div>
            )}
        </div>
    );
}

// ═══════════════════════════════════════
// FORMAT TOOLBAR (acts on the selected cell)
// ═══════════════════════════════════════
function FormatToolbar({ cell, selectedKey, onMode, onAlign }) {
    const toolbarRef = useRef(null);
    const lastSizeRef = useRef({ width: 0, height: 0 });
    const [pos, setPos] = useState(null);
    const disabled = !cell || !selectedKey;
    const mode = cell?.mode || "text";
    const align = cell?.align || "left";
    const exec = (cmd) => document.execCommand(cmd, false, null);
    const place = useCallback(() => {
        if (!selectedKey) { setPos(null); return; }
        const anchor = document.querySelector(`[data-cell-key="${selectedKey}"]`);
        if (!anchor) { setPos(null); return; }
        const r = anchor.getBoundingClientRect();
        const margin = 8;
        const gap = 8;
        const measuredW = toolbarRef.current?.offsetWidth || 0;
        const measuredH = toolbarRef.current?.offsetHeight || 0;
        const w = measuredW || lastSizeRef.current.width;
        const h = measuredH || lastSizeRef.current.height;
        if (!w || !h) { setPos({ top: -9999, left: -9999, measuring: true }); return; }
        if (measuredW && measuredH) lastSizeRef.current = { width: measuredW, height: measuredH };
        let top = r.bottom + gap;
        const centeredLeft = r.left + (r.width / 2) - (w / 2);
        const maxLeft = Math.max(margin, window.innerWidth - w - margin);
        const left = Math.max(margin, Math.min(centeredLeft, maxLeft));

        if (top + h > window.innerHeight - margin) top = r.top - h - gap;
        if (top < margin) top = Math.min(window.innerHeight - h - margin, r.bottom + gap);
        setPos({ top, left, measuring: false });
    }, [selectedKey]);

    useEffect(() => {
        if (disabled) { setPos(null); return; }
        place();
        const raf = window.requestAnimationFrame(place);
        const raf2 = window.requestAnimationFrame(() => window.requestAnimationFrame(place));
        window.addEventListener("scroll", place, true);
        window.addEventListener("resize", place);
        const anchor = document.querySelector(`[data-cell-key="${selectedKey}"]`);
        const ro = anchor ? new ResizeObserver(place) : null;
        if (ro) ro.observe(anchor);
        return () => {
            window.cancelAnimationFrame(raf);
            window.cancelAnimationFrame(raf2);
            window.removeEventListener("scroll", place, true);
            window.removeEventListener("resize", place);
            if (ro) ro.disconnect();
        };
    }, [disabled, place, mode, align, selectedKey]);

    if (disabled || !pos) return null;

    // B/I/U: keep focus in the cell (preventDefault) so execCommand hits its selection.
    const fmt = (cmd) => (e) => { e.preventDefault(); exec(cmd); };
    const keepFocus = (fn) => (e) => { e.preventDefault(); fn(); };
    // Show ⌘/⌥ on Mac, Ctrl/Alt elsewhere. The handler accepts both either way.
    const isMac = /Mac/i.test(navigator.platform || navigator.userAgent);
    const modAlt = isMac ? "⌘⌥" : "Ctrl+Alt+";
    const modCmd = isMac ? "⌘" : "Ctrl+";
    return createPortal(
        <div className="cell-toolbar" ref={toolbarRef} style={{ top: pos.top, left: pos.left, visibility: pos.measuring ? "hidden" : "visible" }}
            onMouseDown={(e) => e.stopPropagation()}>
            <div className="tb-group">
                <button className={`tb-btn${mode === "text" ? " active" : ""}`} title={`Text mode (${modAlt}1)`} onMouseDown={keepFocus(() => onMode("text"))}>Text</button>
                <button className={`tb-btn${mode === "bullets" ? " active" : ""}`} title={`Bullets mode (${modAlt}2)`} onMouseDown={keepFocus(() => onMode("bullets"))}>
                    <LucideIcon name="list" />Bullets
                </button>
                <button className={`tb-btn${mode === "boxes" ? " active" : ""}`} title={`Boxes mode (${modAlt}3)`} onMouseDown={keepFocus(() => onMode("boxes"))}>
                    <LucideIcon name="square" />Boxes
                </button>
                <button className={`tb-btn${mode === "tags" ? " active" : ""}`} title={`Tags mode (${modAlt}4)`} onMouseDown={keepFocus(() => onMode("tags"))}>
                    <LucideIcon name="tag" />Tags
                </button>
            </div>
            <div className="tb-sep" />
            <div className="tb-group">
                <button className={`tb-btn icon-only${align === "left" ? " active" : ""}`} onMouseDown={keepFocus(() => onAlign("left"))} title={`Align left (${modAlt}L)`} aria-label="Align left" aria-pressed={align === "left"}>
                    <LucideIcon name="alignLeft" />
                </button>
                <button className={`tb-btn icon-only${align === "center" ? " active" : ""}`} onMouseDown={keepFocus(() => onAlign("center"))} title={`Align center (${modAlt}E)`} aria-label="Align center" aria-pressed={align === "center"}>
                    <LucideIcon name="alignCenter" />
                </button>
            </div>
            <div className="tb-sep" />
            <div className="tb-group">
                <button className="tb-btn" disabled={mode === "tags"} title={`Bold (${modCmd}B)`} onMouseDown={fmt("bold")} style={{ fontWeight: 800 }}>B</button>
                <button className="tb-btn" disabled={mode === "tags"} title={`Italic (${modCmd}I)`} onMouseDown={fmt("italic")} style={{ fontStyle: "italic" }}>I</button>
                <button className="tb-btn" disabled={mode === "tags"} title={`Underline (${modCmd}U)`} onMouseDown={fmt("underline")} style={{ textDecoration: "underline" }}>U</button>
                <TextColorControl disabled={mode === "tags"} />
            </div>
        </div>, document.body
    );
}

function BlueprintColGroup({ total, includeAddColumn = false }) {
    return (
        <colgroup>
            <col style={{ width: LBL_W }} />
            {Array.from({ length: total }, (_, i) => <col key={i} style={{ width: COL_W }} />)}
            {includeAddColumn && <col style={{ width: 62 }} />}
        </colgroup>
    );
}

// ═══════════════════════════════════════
// JOURNEY VIEW
// ═══════════════════════════════════════
function JourneyView({ journey, jIdx, editMode, selected, onSelect, onDeselect,
        onTitleEdit, onCellEdit, onCellTags, onRowAction, onStageAction, onAddRow,
        lockedByPeer, onAcquireLock, onReleaseLock }) {
    const ref = useRef(null);
    const [dragState, setDragState] = useState(null);
    const [dropTarget, setDropTarget] = useState(null);
    const stages = journey.stages;
    const total = totalLeaves(stages);
    const hasSub = stages.some((s) => (s.subStages?.length || 0) > 0);
    const tw = LBL_W + total * COL_W;
    const hdrW = tw + (editMode ? 62 : 0);
    const onStage = (action, payload) => onStageAction(jIdx, action, payload);
    const clearDrag = () => { setDragState(null); setDropTarget(null); };
    const startDrag = (e, state) => {
        setDragState(state);
        setDropTarget(null);
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", JSON.stringify(state));
    };
    const getDropSide = (e) => {
        const r = e.currentTarget.getBoundingClientRect();
        return e.clientX > r.left + r.width / 2 ? "after" : "before";
    };
    const rowDragOver = (e, sjIdx, rowIdx) => {
        if (dragState?.type !== "row" || dragState.sjIdx !== sjIdx) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        setDropTarget({ type: "row", sjIdx, rowIdx });
    };
    const rowDrop = (e, sjIdx, rowIdx) => {
        if (dragState?.type !== "row" || dragState.sjIdx !== sjIdx) return;
        e.preventDefault();
        onRowAction(jIdx, dragState.sjIdx, dragState.rowIdx, "moveTo", { toRowIdx: rowIdx });
        clearDrag();
    };
    const rowDropEnd = (e, sjIdx, rowCount) => {
        if (dragState?.type !== "row" || dragState.sjIdx !== sjIdx) return;
        e.preventDefault();
        onRowAction(jIdx, sjIdx, dragState.rowIdx, "moveTo", { toRowIdx: rowCount });
        clearDrag();
    };
    const stageDragOver = (e, stageIdx) => {
        if (dragState?.type !== "stage") return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        setDropTarget({ type: "stage", stageIdx, side: getDropSide(e) });
    };
    const stageDrop = (e, stageIdx) => {
        if (dragState?.type !== "stage") return;
        e.preventDefault();
        const side = getDropSide(e);
        onStage("moveStage", { fromIdx: dragState.stageIdx, toIdx: stageIdx + (side === "after" ? 1 : 0) });
        clearDrag();
    };
    const subDragOver = (e, stageIdx, subIdx) => {
        if (dragState?.type !== "subStage" || dragState.stageIdx !== stageIdx) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        setDropTarget({ type: "subStage", stageIdx, subIdx, side: getDropSide(e) });
    };
    const subDrop = (e, stageIdx, subIdx) => {
        if (dragState?.type !== "subStage" || dragState.stageIdx !== stageIdx) return;
        e.preventDefault();
        const side = getDropSide(e);
        onStage("moveSubStage", { stageIdx, fromIdx: dragState.subIdx, toIdx: subIdx + (side === "after" ? 1 : 0) });
        clearDrag();
    };

    // scroll sync
    useEffect(() => {
        const c = ref.current;
        if (!c) return;
        const els = Array.from(c.querySelectorAll("[data-ss]"));
        if (els.length < 2) return;
        let lock = false;
        const hm = new Map();
        els.forEach((el) => {
            const h = () => {
                if (lock) return;
                lock = true;
                const l = el.scrollLeft;
                els.forEach((o) => { if (o !== el) o.scrollLeft = l; });
                requestAnimationFrame(() => { lock = false; });
            };
            hm.set(el, h);
            el.addEventListener("scroll", h, { passive: true });
        });
        return () => hm.forEach((h, el) => el.removeEventListener("scroll", h));
    }, [journey, editMode]);

    return (
        <div ref={ref}>
            {/* Chapter header */}
            <div className="ch-hdr">
                <h2>
                    <InlineTitleEdit value={journey.title} fallback="Untitled Journey"
                        inputClassName="ch-title-input" onCommit={(value) => onTitleEdit(jIdx, value)} />
                </h2>
            </div>

            {/* Stage header — sticky (two rows when sub-stages exist) */}
            <div className="stage-outer">
                <div className="scroll-hide" data-ss="">
                    <table className="bp" style={{ minWidth: hdrW }}>
                        <BlueprintColGroup total={total} includeAddColumn={editMode} />
                        <tbody>
                            <tr>
                                <td className="ll stg-ll" rowSpan={hasSub ? 2 : 1}>
                                    <span className={editMode ? "hdr-edit" : ""} contentEditable={editMode} suppressContentEditableWarning
                                        onBlur={editMode ? (e) => onStage("setStageLabel", { value: e.currentTarget.textContent }) : undefined}>
                                        {journey.stageLabel}
                                    </span>
                                </td>
                                {stages.map((s, si) => {
                                    const lc = leafCount(s);
                                    const sHasSub = (s.subStages?.length || 0) > 0;
                                    return (
                                        <td key={si} className={`stg-c${hasSub && !sHasSub ? " stg-empty-subrow" : ""}${dropTarget?.type === "stage" && dropTarget.stageIdx === si ? ` drop-${dropTarget.side}` : ""}`} colSpan={lc}
                                            rowSpan={hasSub && !sHasSub ? 2 : 1}
                                            style={{ minWidth: lc * COL_W }}
                                            onDragOver={editMode ? (e) => stageDragOver(e, si) : undefined}
                                            onDrop={editMode ? (e) => stageDrop(e, si) : undefined}>
                                            {editMode && (
                                                <>
                                                <span className="drag-handle stg-drag" draggable title="Drag to reorder stage"
                                                    onDragStart={(e) => startDrag(e, { type: "stage", stageIdx: si })}
                                                    onDragEnd={clearDrag}>⠿</span>
                                                <Menu align="right">
                                                    {(close) => (
                                                        <>
                                                            <button className="menu-item" onClick={() => { onStage("addSubStage", { stageIdx: si }); close(); }}>＋ Add sub-stage</button>
                                                            <button className="menu-item" onClick={() => { onStage("addStage", { stageIdx: si }); close(); }}>＋ Add stage</button>
                                                            <div className="menu-sep" />
                                                            <button className="menu-item danger" onClick={() => { onStage("deleteStage", { stageIdx: si }); close(); }}><LucideIcon name="trash2" />Delete stage</button>
                                                        </>
                                                    )}
                                                </Menu>
                                                {si < stages.length - 1 && (
                                                    <span className="insert-zone ins-stage-r-zone">
                                                        <button type="button" className="ins-btn" title="Add stage here"
                                                            onClick={() => onStage("addStage", { stageIdx: si })}>+</button>
                                                    </span>
                                                )}
                                                {!sHasSub && (
                                                    <span className="insert-zone ins-stage-b-zone">
                                                        <button type="button" className="ins-btn" title="Add sub-stage"
                                                            onClick={() => onStage("addSubStage", { stageIdx: si })}>+</button>
                                                    </span>
                                                )}
                                                </>
                                            )}
                                            <span className="stage-card">
                                                <span className="stage-card-label">
                                                {(s.num != null || editMode) && <span className="stage-num" style={{ flexShrink: 0 }}
                                                    contentEditable={editMode} suppressContentEditableWarning
                                                    title={editMode ? "Edit number" : undefined}
                                                    onBlur={editMode ? (e) => onStage("renumberStage", { stageIdx: si, value: e.currentTarget.textContent }) : undefined}>{s.num}</span>}
                                                <span className={`stage-title${editMode ? " hdr-edit" : ""}`} contentEditable={editMode} suppressContentEditableWarning
                                                    onBlur={editMode ? (e) => onStage("renameStage", { stageIdx: si, value: e.currentTarget.textContent }) : undefined}>
                                                    {s.title}
                                                </span>
                                                </span>
                                            </span>
                                        </td>
                                    );
                                })}
                                {editMode && (
                                    <td className="add-col-c" rowSpan={hasSub ? 2 : 1}>
                                        <button className="add-btn" title="Add stage" onClick={() => onStage("addStage", {})}>＋</button>
                                    </td>
                                )}
                            </tr>
                            {hasSub && (
                                <tr>
                                    {stages.map((s, si) => {
                                        const subs = s.subStages || [];
                                        if (!subs.length) return null;
                                        return subs.map((ss, ssi) => (
                                            <td key={si + "-" + ssi}
                                                className={`sub-c${dropTarget?.type === "subStage" && dropTarget.stageIdx === si && dropTarget.subIdx === ssi ? ` drop-${dropTarget.side}` : ""}`}
                                                style={{ minWidth: COL_W }}
                                                onDragOver={editMode ? (e) => subDragOver(e, si, ssi) : undefined}
                                                onDrop={editMode ? (e) => subDrop(e, si, ssi) : undefined}>
                                                {editMode && (
                                                    <>
                                                    <span className="drag-handle sub-drag" draggable title="Drag within this stage"
                                                        onDragStart={(e) => startDrag(e, { type: "subStage", stageIdx: si, subIdx: ssi })}
                                                        onDragEnd={clearDrag}>⠿</span>
                                                    <Menu align="right">
                                                        {(close) => (
                                                            <>
                                                                <button className="menu-item" onClick={() => { onStage("addSubStage", { stageIdx: si }); close(); }}>＋ Add sub-stage</button>
                                                                <div className="menu-sep" />
                                                                <button className="menu-item danger" onClick={() => { onStage("deleteSubStage", { stageIdx: si, subIdx: ssi }); close(); }}><LucideIcon name="trash2" />Delete sub-stage</button>
                                                            </>
                                                        )}
                                                    </Menu>
                                                    <span className="insert-zone ins-sub-r-zone">
                                                        <button type="button" className="ins-btn" title="Add sub-stage here"
                                                            onClick={() => onStage("addSubStage", { stageIdx: si, subIdx: ssi })}>+</button>
                                                    </span>
                                                    </>
                                                )}
                                                <span className="step-chip">
                                                <span className={`step-chip-label${editMode ? " hdr-edit" : ""}`} contentEditable={editMode} suppressContentEditableWarning
                                                    onBlur={editMode ? (e) => onStage("renameSubStage", { stageIdx: si, subIdx: ssi, value: e.currentTarget.textContent }) : undefined}>
                                                    {ss.title}
                                                </span>
                                                </span>
                                            </td>
                                        ));
                                    })}
                                </tr>
                            )}
                        </tbody>
                    </table>
                </div>
            </div>

            {/* Sub-journeys (rows only; section breaks use divider rows) */}
            {journey.subJourneys.map((sj, si) => (
                <div key={si} className="bp-lane-wrap">
                    <div className="bpw" data-ss="">
                        <table className="bp" style={{ minWidth: hdrW }}>
                            <BlueprintColGroup total={total} includeAddColumn={editMode} />
                            <tbody>
                                {sj.rows.map((row, ri) => (
                                    <BlueprintRow key={ri} row={row} rowIdx={ri}
                                        editMode={editMode} total={total}
                                        cellKeyPrefix={`cell-${jIdx}-${si}-${ri}`}
                                        dragState={dragState?.type === "row" && dragState.sjIdx === si ? dragState : null}
                                        dropRowIdx={dropTarget?.type === "row" && dropTarget.sjIdx === si ? dropTarget.rowIdx : null}
                                        selectedCellIdx={selected && selected.jIdx === jIdx && selected.sjIdx === si && selected.rowIdx === ri ? selected.cellIdx : null}
                                        onSelect={(ci) => onSelect({ jIdx, sjIdx: si, rowIdx: ri, cellIdx: ci })}
                                        onCellEdit={(ci, html) => onCellEdit(jIdx, si, ri, ci, html)}
                                        onCellTags={(ci, tags) => onCellTags(jIdx, si, ri, ci, tags)}
                                        onRowAction={(action, value) => onRowAction(jIdx, si, ri, action, value)}
                                        onRowDragStart={(e) => startDrag(e, { type: "row", sjIdx: si, rowIdx: ri })}
                                        onRowDragOver={(e, targetRowIdx) => rowDragOver(e, si, targetRowIdx)}
                                        onRowDrop={(e, targetRowIdx) => rowDrop(e, si, targetRowIdx)}
                                        onDragEnd={clearDrag}
                                        onDeselect={onDeselect}
                                        lockedByPeer={lockedByPeer}
                                        onAcquireLock={onAcquireLock} onReleaseLock={onReleaseLock} />
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {editMode && (
                        <div className={`add-row-bar${dropTarget?.type === "rowEnd" && dropTarget.sjIdx === si ? " drop-end" : ""}`}
                            onDragOver={editMode ? (e) => {
                                if (dragState?.type === "row" && dragState.sjIdx === si) {
                                    e.preventDefault();
                                    setDropTarget({ type: "rowEnd", sjIdx: si });
                                }
                            } : undefined}
                            onDrop={editMode ? (e) => rowDropEnd(e, si, sj.rows.length) : undefined}>
                            <button className="add-row-btn" onClick={() => onAddRow(jIdx, si)}>＋ Add row</button>
                        </div>
                    )}
                </div>
            ))}
            {editMode && <div className="edit-bottom-pad" aria-hidden="true" />}
        </div>
    );
}

// ═══════════════════════════════════════
// APP
// ═══════════════════════════════════════
function App() {
    const [journeys, setJourneys] = useState([]);
    const [tab, setTab] = useState(0);
    const [modal, setModal] = useState(false);
    // "library" = home screen listing projects; "project" = working inside one.
    const [view, setView] = useState("library");
    const [confirmState, setConfirmState] = useState(null);
    const [projects, setProjects] = useState([]);
    const [sharedMaps, setSharedMaps] = useState([]);
    const [currentId, setCurrentId] = useState(null);
    const [standaloneName, setStandaloneName] = useState(null);
    const [viewOnly, setViewOnly] = useState(false);
    const [ready, setReady] = useState(false);
    const [saveState, setSaveState] = useState("idle");
    // Edit is the default working mode; users switch to View when they want to read.
    const [editMode, setEditMode] = useState(true);
    const [selected, setSelected] = useState(null);
    const [lastSaved, setLastSaved] = useState(null);
    const [lastSavedBy, setLastSavedBy] = useState(null);
    const [profile, setProfile] = useState(() => getPresenceIdentity());
    const [historyState, setHistoryState] = useState({ canUndo: false, canRedo: false });
    // Collaborative sync. status: "off" | "enabling" | "synced" | "error".
    const [sync, setSync] = useState({ mapId: null, role: null, status: "off", error: null });
    // Presence (Phase 3): other people currently in this map. Ephemeral roster
    // pushed by the DO; excludes our own clientId. [{clientId, name, color}].
    const [peers, setPeers] = useState([]);
    // Cell locking (Phase 8): the DO's lock roster. Each entry is
    // {cellId, clientId, name, color, lockedAt}. A separate presence-like channel
    // layered on top of doc.* sync — does NOT touch the whole-doc push/version.
    const [locks, setLocks] = useState([]);
    // The cell we are currently editing (its stable cell.id), tracked in a ref so
    // the heartbeat interval and release-on-hide handlers can read it without
    // re-subscribing. null when not editing.
    const editingCellIdRef = useRef(null);
    // Password gate (Phase 5): when opening a password-protected share link, this
    // holds {mapId, token} and surfaces the password modal. Cleared once a valid
    // session is obtained (or the gate is dismissed). Owners never see it.
    const [passwordGate, setPasswordGate] = useState(null);
    const syncVersionRef = useRef(0);
    // Live WebSocket channel (Phase 2). wsRef holds the open socket; a pending
    // remote payload is stashed when a peer update arrives while the local user
    // is actively editing a cell, then applied on the next blur.
    const wsRef = useRef(null);
    const pendingRemoteRef = useRef(null);
    // Set when applying a remote payload so the push effect skips the resulting
    // journeys change (prevents an echo loop back to the server).
    const skipNextPushRef = useRef(false);
    const appBarRef = useRef(null);
