<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Blueprint Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@19.2.0",
            "react/jsx-runtime": "https://esm.sh/react@19.2.0/jsx-runtime",
            "react-dom": "https://esm.sh/react-dom@19.2.0",
            "react-dom/": "https://esm.sh/react-dom@19.2.0/",
            "dexie": "https://esm.sh/dexie@4.0.8"
        }
    }
    </script>


    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary: #2c3e6b;
            --accent: #e8911a;
            --red: #c62828;
            --green: #2e7d32;
            --blue: #1565c0;
            --purple: #6a1b9a;
            --gold: #e65100;
            --bg: #f4f5f9;
            --border: #d0d5dd;
            --border-light: #e8ecf1;
            --text: #1a1a2e;
            --text-sec: #5a6376;
            --legend-h: 48px;
            --toolbar-h: 0px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

        /* ===== TOP APP BAR ===== */
        .app-bar{background:linear-gradient(135deg,var(--primary),#1a2744);color:#fff;position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(0,0,0,.12)}
        .app-bar-main{display:flex;align-items:center;gap:16px;padding:10px 24px}
        .ab-brand{display:flex;flex-direction:column;min-width:0;line-height:1.25}
        .ab-eyebrow{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
        .ab-title{font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .inline-title{cursor:default}
        .inline-title.editable{cursor:text}
        .inline-title-input{font:inherit;font-weight:inherit;color:inherit;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);border-radius:5px;padding:1px 5px;min-width:60px;max-width:100%;outline:none}
        .ab-brand .inline-title-input{width:100%}
        .ch-hdr .inline-title-input{width:min(720px,100%)}
        .ch-title-input{background:#fff;border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,145,26,.15);padding:2px 6px}
        .ab-actions{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
        .ab-btn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.22);padding:6px 13px;border-radius:7px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap}
        .ab-btn:hover{background:rgba(255,255,255,.2)}
        .ab-btn:disabled{opacity:.4;cursor:not-allowed}
        .ab-btn.primary{background:var(--accent);border-color:var(--accent)}
        .ab-btn.primary:hover{background:#cf7e14}
        .ab-btn[aria-expanded="true"]{background:rgba(255,255,255,.22)}
        .save-state{font-size:.72rem;font-weight:600;margin-right:2px;white-space:nowrap}
        .save-saving{color:#ffe0b2}
        .save-saved{color:#bdeec2}

        /* ===== COLOR KEY (collapsible) ===== */
        .ab-key{display:flex;flex-wrap:wrap;gap:14px;align-items:center;padding:10px 24px;background:#fff;color:var(--text-sec);border-top:1px solid rgba(0,0,0,.08)}
        .legend-item{display:flex;align-items:center;gap:5px;font-size:.74rem;color:var(--text-sec)}
        .legend-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0}

        /* ===== MAIN ===== */
        .main-content{padding-bottom:50px;min-height:60vh}

        /* ===== EMPTY ===== */
        .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:10px;text-align:center;padding:40px 20px}
        .empty-icon{font-size:4rem}
        .empty-state h2{font-size:1.25rem;color:var(--primary)}
        .empty-state p{color:var(--text-sec);max-width:400px;font-size:.88rem}
        .empty-hint{font-size:.76rem;color:var(--text-sec);margin-top:4px}
        .empty-hint code{background:#e8ecf1;padding:2px 6px;border-radius:4px;font-family:Menlo,Consolas,monospace;font-size:.7rem}

        /* ===== BUTTONS ===== */
        .btn-p{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:.86rem;font-weight:600;cursor:pointer;transition:background .15s}
        .btn-p:hover{background:#cf7e14}
        .btn-p:disabled{opacity:.4;cursor:not-allowed}
        .btn-s{background:#fff;color:var(--text);border:1px solid var(--border);padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:500;cursor:pointer;transition:background .15s}
        .btn-s:hover{background:#f1f3f4}

        /* ===== CHAPTER HDR ===== */
        .ch-hdr{padding:16px 32px 8px}
        .ch-hdr h2{font-size:1.05rem;color:var(--primary);font-weight:700}

        /* ===== STAGE HDR (STICKY) ===== */
        .stage-outer{position:sticky;top:calc(var(--legend-h,48px) + var(--toolbar-h,0px));z-index:35;background:var(--primary);border-bottom:2px solid var(--accent);box-shadow:0 3px 8px rgba(0,0,0,.12)}
        .scroll-hide{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
        .scroll-hide::-webkit-scrollbar{display:none}

        /* ===== SUB-JOURNEY HDR ===== */
        .sj-scroll{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;background:#1e293b;border:1px solid var(--border);border-top:none}
        .sj-scroll::-webkit-scrollbar{display:none}

        /* ===== BP TABLE ===== */
        .bp{border-collapse:collapse;table-layout:fixed}
        .bp td{border:1px solid var(--border-light);padding:10px 12px;vertical-align:top;text-align:left;font-size:.8rem}

        /* Lane label */
        .ll{width:180px;min-width:180px;max-width:180px;position:sticky;left:0;z-index:10;font-weight:700;font-size:.74rem;text-transform:uppercase;letter-spacing:.5px;background:#fff;border-right:2px solid var(--border)}

        /* Stage header cells */
        .stg-ll{background:var(--primary)!important;color:#fff!important;border:1px solid rgba(255,255,255,.15)!important;border-right:2px solid rgba(255,255,255,.3)!important;text-align:left!important}
        .stg-c{min-width:260px;background:var(--primary)!important;color:#fff!important;font-weight:700!important;font-size:.84rem!important;text-align:center!important;vertical-align:middle!important;border:1px solid rgba(255,255,255,.15)!important}

        /* SJ header cells */
        .sj-ll{background:#1e293b!important;color:#fff!important;border:1px solid rgba(255,255,255,.1)!important;border-right:2px solid rgba(255,255,255,.2)!important;font-size:.74rem!important;text-align:left!important}
        .sj-tc{background:#1e293b!important;color:#fff!important;font-weight:700!important;font-size:.7rem!important;text-transform:uppercase!important;letter-spacing:1.5px!important;text-align:center!important;padding:8px 12px!important;border:1px solid rgba(255,255,255,.1)!important}

        /* Data cell */
        .dc{min-width:260px}
        .dc-span{min-width:auto!important;width:auto!important}

        /* Wrapper */
        .bpw{overflow-x:auto;background:#fff;border:1px solid var(--border);border-top:none}
        .bpw::-webkit-scrollbar{height:10px}
        .bpw::-webkit-scrollbar-track{background:#eee}
        .bpw::-webkit-scrollbar-thumb{background:var(--accent);border-radius:5px}
        .bpw{scrollbar-width:thin;scrollbar-color:var(--accent) #eee}

        /* ===== ROW TYPES ===== */
        .row-agencies>.ll{background:#f5f5f5;color:#616161}
        .row-agencies>.dc{background:#fafafa}

        .row-operator>.ll{background:#fff;color:var(--text)}
        .row-operator>.dc{background:#fff}

        .row-fs-human>.ll{background:#dbeafe;color:#1565c0}
        .row-fs-human>.dc{background:#f0f7ff}

        .row-fs-system>.ll{background:#dbeafe;color:#1565c0}
        .row-fs-system>.dc{background:#f0f7ff}

        .row-divider>.ll{background:#ff6f00;color:#fff;border-right-color:rgba(255,255,255,.4)}
        .row-divider>.dc{background:#ff6f00;color:#fff;font-weight:800;text-align:center;padding:6px 12px;font-size:.72rem;text-transform:uppercase;letter-spacing:2px}

        .row-bs-human>.ll{background:#fce8c8;color:#e65100}
        .row-bs-human>.dc{background:#fdf6ee}

        .row-bs-system>.ll{background:#fce8c8;color:#e65100}
        .row-bs-system>.dc{background:#fdf6ee}

        .row-support>.ll{background:#e8dff5;color:#6a1b9a}
        .row-support>.dc{background:#f3f0f9}

        .row-pain>.ll{background:#fecdd3;color:#c62828}
        .row-pain>.dc{background:#fff5f5}

        .row-verbatim>.ll{background:#fef3c7;color:#92400e}
        .row-verbatim>.dc{background:#fffbeb;font-style:italic;color:#92400e;font-size:.76rem}

        .row-emotion>.ll{background:#d1fae5;color:#2e7d32}
        .row-emotion>.dc{background:#f0faf0;text-align:center}

        .row-suggest>.ll{background:#bfdbfe;color:#1565c0}
        .row-suggest>.dc{background:#eff6ff}

        /* ===== INNER CELL ELEMENTS ===== */
        .bp-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.68rem;font-weight:600;margin:2px 2px 2px 0}
        .tag-ecda{background:#dbeafe;color:#1e40af}.tag-scdf{background:#fecdd3;color:#991b1b}
        .tag-ura{background:#ede9fe;color:#5b21b6}.tag-bca{background:#ffedd5;color:#9a3412}
        .tag-nea{background:#d1fae5;color:#065f46}.tag-hpb{background:#ccfbf1;color:#115e59}
        .tag-msf{background:#fce7f3;color:#9d174d}.tag-gobiz{background:#ede9fe;color:#4338ca}
        .tag-cms{background:#e0e7ff;color:#3730a3}.tag-acra{background:#f3f4f6;color:#374151}

        .bp-bullet{padding-left:14px;position:relative;margin-bottom:4px}
        .bp-bullet::before{content:'•';position:absolute;left:2px;color:var(--accent);font-weight:700}

        .bp-pain-item{padding:4px 8px;background:#fee2e2;border:1px solid #f3b9bd;border-radius:4px;margin-bottom:4px;font-size:.76rem}
        .bp-suggest-item{padding:4px 8px;background:#dbeafe;border:1px solid #b7d3f3;border-radius:4px;margin-bottom:4px;font-size:.76rem}

        .emotion-icon{font-size:1.4rem;display:block;margin-bottom:2px}
        .emotion-text{font-size:.72rem;font-weight:600}
        .emotion-neg{color:var(--red)}.emotion-pos{color:var(--green)}.emotion-neu{color:var(--gold)}

        .stage-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-weight:800;font-size:.8rem;margin-right:6px}

        /* ===== EDITABLE ===== */
        td[contenteditable="true"]{cursor:text;outline:none;transition:box-shadow .15s}
        td[contenteditable="true"]:hover{box-shadow:inset 0 0 0 2px rgba(232,145,26,.25)}
        td[contenteditable="true"]:focus{box-shadow:inset 0 0 0 2px var(--accent)}

        /* ===== TAB BAR ===== */
        .tab-bar{position:fixed;bottom:0;left:0;right:0;height:42px;background:#e2e6ec;border-top:1px solid #bcc3cf;display:flex;align-items:flex-end;padding:0 8px;z-index:100}
        .tab-scroll{display:flex;align-items:flex-end;overflow-x:auto;flex:1;gap:2px;scrollbar-width:none}
        .tab-scroll::-webkit-scrollbar{display:none}
        .tab-btn{flex-shrink:0;height:33px;padding:0 15px;border:1px solid #bcc3cf;border-bottom:none;border-radius:7px 7px 0 0;background:#d5dae2;font-size:.72rem;font-weight:600;cursor:pointer;color:var(--text-sec);display:flex;align-items:center;gap:6px;transition:background .15s;max-width:340px;white-space:nowrap;overflow:hidden;font-family:inherit}
        .tab-btn:hover{background:#e8ecf1}
        .tab-btn.active{background:#fff;color:var(--text);border-top:2px solid var(--accent);height:35px;z-index:1}
        .tab-bdg{background:var(--primary);color:#fff;padding:1px 7px;border-radius:9px;font-size:.6rem;font-weight:700;flex-shrink:0}
        .tab-ttl{overflow:hidden;text-overflow:ellipsis}
        .tab-actions{display:flex;align-items:flex-end;gap:6px;margin:0 0 5px 8px;flex-shrink:0}
        .tab-load{height:29px;padding:0 13px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:.72rem;font-weight:600;cursor:pointer;color:var(--primary);transition:background .15s;font-family:inherit}
        .tab-load:hover{background:#f1f3f4}

        /* ===== MODAL ===== */
        .m-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
        .m-box{background:#fff;border-radius:12px;width:100%;max-width:620px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
        .m-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border-light)}
        .m-hdr h3{font-size:1rem;color:var(--primary)}
        .m-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-sec);padding:4px}
        .m-body{padding:14px 20px;flex:1;overflow-y:auto}
        .m-body>p{font-size:.84rem;color:var(--text-sec);margin-bottom:10px}
        .m-body textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:11px;font-family:Menlo,Consolas,monospace;font-size:.74rem;resize:vertical;line-height:1.5;outline:none}
        .m-body textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,145,26,.15)}
        .m-file{margin-top:10px}
        .m-ft{padding:12px 20px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px}

        /* ===== PROJECT MANAGER ===== */
        .proj-list{display:flex;flex-direction:column;gap:8px}
        .proj-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border-light);border-radius:8px;background:#fafbfc}
        .proj-row.current{border-color:var(--accent);background:#fffaf2}
        .proj-info{flex:1;min-width:0}
        .proj-info .pn{font-weight:600;font-size:.84rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .proj-info .pn .cur-badge{display:inline-block;background:var(--accent);color:#fff;font-size:.6rem;font-weight:700;padding:1px 7px;border-radius:9px;margin-left:6px;vertical-align:middle;text-transform:uppercase;letter-spacing:.5px}
        .proj-info .pm{font-size:.7rem;color:var(--text-sec);margin-top:2px}
        .proj-actions{display:flex;gap:6px;flex-shrink:0}
        .icon-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-sec);transition:background .15s}
        .icon-btn:hover{background:#f1f3f4;color:var(--text)}
        .icon-btn.danger:hover{background:#fee2e2;color:var(--red);border-color:#f5b5b5}
        .proj-empty{text-align:center;color:var(--text-sec);padding:24px 12px;font-size:.84rem}

        /* ===== RESPONSIVE ===== */
        @media(max-width:640px){
            .app-bar-main{padding:9px 14px;gap:10px}
            .ab-key{padding:9px 14px;gap:9px}
            .ch-hdr{padding:12px 16px 6px}
            .ch-hdr h2{font-size:.95rem}
        }
        @media print{
            .tab-bar,.m-ov,.ab-actions,.edit-toolbar,.menu-wrap,.add-col-c,.add-row-bar{display:none}
            .app-bar,.stage-outer{position:static}
            .ll{position:static}
        }

        /* ===== EDIT MODE ===== */
        .edit-toolbar{position:sticky;top:var(--legend-h,48px);z-index:40;display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:7px 16px;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 2px 4px rgba(0,0,0,.06)}
        .tb-group{display:flex;align-items:center;gap:3px}
        .tb-sep{width:1px;height:20px;background:var(--border);margin:0 5px}
        .tb-label{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-sec);margin-right:3px}
        .tb-btn{background:#f4f5f9;border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:.74rem;font-weight:600;cursor:pointer;color:var(--text-sec);font-family:inherit;line-height:1.1}
        .tb-btn:hover:not(:disabled){background:#e8ecf1;color:var(--text)}
        .tb-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
        .tb-btn:disabled{opacity:.4;cursor:not-allowed}
        .tb-hint{font-size:.7rem;color:var(--text-sec);margin-left:auto}

        /* dropdown menus */
        .menu-wrap{position:relative;display:inline-block}
        .menu-trigger{background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:5px;width:20px;height:20px;line-height:1;font-size:.85rem;font-weight:700;cursor:pointer;color:var(--text);padding:0;display:inline-flex;align-items:center;justify-content:center}
        .menu-trigger:hover{background:#fff}
        .menu-pop{position:absolute;z-index:130;top:100%;left:0;margin-top:3px;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:6px;min-width:180px;text-align:left;color:var(--text)}
        .menu-pop.right{left:auto;right:0}
        .menu-portal{position:fixed;z-index:300;margin-top:0}
        .menu-item{display:flex;align-items:center;gap:7px;width:100%;background:none;border:none;padding:7px 9px;border-radius:6px;font-size:.78rem;font-weight:500;color:var(--text);cursor:pointer;font-family:inherit;text-align:left}
        .menu-item:hover{background:#f1f3f4}
        .menu-item.danger{color:var(--red)}
        .menu-item.danger:hover{background:#fee2e2}
        .menu-head{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-sec);padding:6px 9px 3px}
        .menu-sep{height:1px;background:var(--border-light);margin:5px 0}
        .menu-select{width:calc(100% - 2px);margin:0 1px 4px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:.76rem}
        .swatches{display:flex;flex-wrap:wrap;gap:5px;padding:4px 9px 6px}
        .swatch{width:20px;height:20px;border-radius:5px;border:1px solid rgba(0,0,0,.15);cursor:pointer;padding:0}
        .swatch:hover{outline:2px solid var(--accent);outline-offset:1px}
        .sw-custom{position:relative;overflow:hidden;background:conic-gradient(#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)}
        .sw-input{position:absolute;inset:-4px;width:130%;height:130%;opacity:0;cursor:pointer;border:none;padding:0;background:none}

        /* text-color control in the format toolbar */
        .tb-color{position:relative;display:inline-block}
        .tb-A{border-bottom:3px solid #c62828;line-height:1;padding-bottom:1px;font-weight:800}
        .color-pop{position:absolute;top:100%;left:0;margin-top:4px;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:7px;display:flex;flex-wrap:wrap;gap:5px;width:120px;z-index:320}

        /* header cell menus + editable titles */
        .stg-c,.sub-c{position:relative}
        .stg-c .menu-wrap,.sub-c .menu-wrap{position:absolute;top:4px;right:4px}
        .row-menu{position:absolute;top:3px;right:3px;z-index:11}
        .hdr-edit{outline:none;cursor:text}
        .hdr-edit:focus{box-shadow:inset 0 0 0 2px var(--accent);border-radius:4px}

        /* sub-stage header row */
        .sub-c{background:#243049!important;color:#fff!important;font-weight:600!important;font-size:.73rem!important;text-align:center!important;vertical-align:middle!important;border:1px solid rgba(255,255,255,.12)!important}

        /* add column / add row affordances */
        .add-col-c{min-width:62px;width:62px;background:var(--primary)!important;text-align:center!important;border:1px solid rgba(255,255,255,.15)!important;vertical-align:middle!important}
        .add-btn{background:rgba(255,255,255,.15);color:#fff;border:1px dashed rgba(255,255,255,.55);border-radius:6px;padding:5px 11px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit}
        .add-btn:hover{background:rgba(255,255,255,.3)}
        .add-row-bar{padding:6px 12px;background:#fafbfc;border:1px solid var(--border);border-top:none}
        .add-row-btn{background:#fff;border:1px dashed var(--border);border-radius:6px;padding:5px 12px;font-size:.74rem;font-weight:600;color:var(--text-sec);cursor:pointer;font-family:inherit}
        .add-row-btn:hover{background:#f1f3f4;color:var(--text)}

        /* selected cell highlight */
        .dc.cell-sel{box-shadow:inset 0 0 0 2px var(--accent)}

        /* alignment */
        .al-center{text-align:center!important}
        .al-left{text-align:left!important}

        /* tags-mode cell */
        .cell-tags{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
        .tag-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:4px;font-size:.68rem;font-weight:600}
        .tag-x{cursor:pointer;font-weight:800;opacity:.55;font-size:.72rem}
        .tag-x:hover{opacity:1}
        .tag-add{display:inline-flex;gap:3px;align-items:center;margin-top:4px}
        .tag-add input{border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:.7rem;font-family:inherit;width:74px;outline:none}
        .tag-add input:focus{border-color:var(--accent)}

<body>

<script type="text/babel" data-type="module">
import React, { useState, useEffect, useRef, useCallback } from "react";
import { createRoot } from "react-dom/client";
import { createPortal } from "react-dom";
import Dexie from "dexie";

const COL_W = 260;
const LBL_W = 180;
const DIVIDER_TYPE = "row-divider";

// ═══════════════════════════════════════
// STRUCTURE HELPERS (columns / rows / cells)
// ═══════════════════════════════════════
// A "leaf" is a rendered data column. A stage with sub-stages contributes one
// leaf per sub-stage; a stage with none contributes a single leaf (itself).
const leafCount   = (stage) => Math.max((stage?.subStages?.length || 0), 1);
const totalLeaves = (stages) => (stages || []).reduce((n, s) => n + leafCount(s), 0);
const leafStart   = (stages, stageIdx) =>
    (stages || []).slice(0, stageIdx).reduce((n, s) => n + leafCount(s), 0);

const newCell = () => ({ mode: "text", html: "", align: "left" });
const newRow  = (total) => ({
    rowType: "row-operator",
    laneLabel: "New row",
    cells: Array.from({ length: Math.max(total, 1) }, newCell),
});
const blankCells = (total, mode = "text", align = "left") =>
    Array.from({ length: Math.max(total, 1) }, () => ({ mode, html: "", align }));

const rowWidth = (cells) => (cells || []).reduce((a, c) => a + (c.colspan || 1), 0);

// Insert one leaf column at global leaf index `at`. If the position falls inside
// a spanning cell, widen that cell; otherwise insert a fresh empty cell.
function insertLeafIntoRow(cells, at) {
    let pos = 0;
    for (let i = 0; i < cells.length; i++) {
        const w = cells[i].colspan || 1;
        if (at < pos + w) {
            const nc = cells.slice();
            if (at === pos) nc.splice(i, 0, newCell());
            else nc[i] = { ...nc[i], colspan: w + 1 };
            return nc;
        }
        pos += w;
    }
    return [...cells, newCell()];
}

// Remove the leaf column at global leaf index `at`. Shrinks a spanning cell or
// drops a single-width cell.
function removeLeafFromRow(cells, at) {
    let pos = 0;
    for (let i = 0; i < cells.length; i++) {
        const w = cells[i].colspan || 1;
        if (at < pos + w) {
            const nc = cells.slice();
            if (w > 1) {
                const cell = { ...nc[i], colspan: w - 1 };
                if (cell.colspan === 1) delete cell.colspan;
                nc[i] = cell;
            } else nc.splice(i, 1);
            return nc;
        }
        pos += w;
    }
    return cells;
}

// Pad/trim a row's cells so its total width matches `total` leaves.
function normalizeRowCells(cells, total) {
    let w = rowWidth(cells);
    if (w === total) return cells;
    const nc = cells.slice();
    while (w < total) { nc.push(newCell()); w++; }
    while (w > total && nc.length) {
        const last = nc[nc.length - 1];
        const lw = last.colspan || 1;
        if (lw > 1) {
            const c = { ...last, colspan: lw - 1 };
            if (c.colspan === 1) delete c.colspan;
            nc[nc.length - 1] = c;
        } else nc.pop();
        w--;
    }
    return nc;
}

// A divider row is always a single cell merged across every column.
function collapseDivider(cells, total) {
    const first = cells[0] || newCell();
    const c = { mode: "text", html: first.html ?? "", align: first.align || "center" };
    if (total > 1) c.colspan = total;
    return [c];
}
// Expand a (former) divider back into one cell per column.
function expandDivider(cells, total) {
    const first = { ...(cells[0] || newCell()) };
    delete first.colspan;
    return normalizeRowCells([first], total);
}

// Normalize loaded data: ensure stages/cells carry the fields the editor needs.
function hydrate(journeys) {
    return (journeys || []).map((j) => {
        const stages = (j.stages || []).map((s) => ({ ...s, subStages: s.subStages || [] }));
        const total = totalLeaves(stages);
        const subJourneys = (j.subJourneys || []).map((sj) => ({
            ...sj,
            rows: (sj.rows || []).map((r) => {
                // Migrate the old "line of visibility" row to the general divider.
                const rowType = r.rowType === "row-lov" ? DIVIDER_TYPE : r.rowType;
                let cells = (r.cells || []).map((c) => ({
                    mode: c.mode || "text",
                    html: c.html ?? "",
                    align: c.align || "left",
                    ...(c.colspan ? { colspan: c.colspan } : {}),
                    ...(c.tags ? { tags: c.tags } : {}),
                }));
                cells = normalizeRowCells(cells, total);
                if (rowType === DIVIDER_TYPE) cells = collapseDivider(cells, total);
                return { ...r, rowType, cells };
            }),
        }));
        return { ...j, stages, subJourneys };
    });
}

// Accept a JSON array of journeys, or an exported project file
// ({ name, journeys }). Returns { name?, journeys }.
function parseInput(text) {
    const t = text.trim();
    if (!t) throw new Error("Input is empty.");
    let obj;
    try {
        obj = JSON.parse(t);
    } catch (e) {
        throw new Error(`Invalid JSON: ${e.message}`);
    }
    if (Array.isArray(obj)) return { journeys: obj };
    if (obj && Array.isArray(obj.journeys)) return { name: obj.name, journeys: obj.journeys };
    throw new Error("Expected a JSON array of journeys, or an object with a \"journeys\" array.");
}

function downloadFile(filename, text, type) {
    const blob = new Blob([text], { type: type || "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    a.remove(); URL.revokeObjectURL(url);
}

const safeName = (s) => (s || "export").replace(/[^a-z0-9_-]+/gi, "_").replace(/^_+|_+$/g, "") || "export";

    if (!ts) return "—";

};

function InlineTitleEdit({ value, fallback, className, inputClassName, disabled, onCommit }) {
    const [editing, setEditing] = useState(false);
    const [draft, setDraft] = useState(value || "");
    const inputRef = useRef(null);

    useEffect(() => {
        if (!editing) setDraft(value || "");
    }, [value, editing]);

    useEffect(() => {
        if (!editing) return;
        inputRef.current?.focus();
        inputRef.current?.select();
    }, [editing]);

    const save = () => {
        const next = draft.trim();
        setEditing(false);
        if (next && next !== value) onCommit(next);
    };
    const cancel = () => {
        setDraft(value || "");
        setEditing(false);
    };

    if (editing) {
        return (
            <input ref={inputRef} className={`${className || ""} inline-title-input ${inputClassName || ""}`}
                value={draft} onChange={(e) => setDraft(e.target.value)}
                onBlur={save}
                onKeyDown={(e) => {
                    if (e.key === "Enter") { e.preventDefault(); save(); }
                    if (e.key === "Escape") { e.preventDefault(); cancel(); }
                }} />
        );
    }

    return (
        <span className={`${className || ""} inline-title${disabled ? "" : " editable"}`}
            title={disabled ? (value || "") : "Double-click to edit"}
            onDoubleClick={disabled ? undefined : () => setEditing(true)}>
            {value || fallback}
        </span>
    );
}

function LoadModal({ onLoad, onClose }) {

// ═══════════════════════════════════════
// DROPDOWN MENU (click-away)
// ═══════════════════════════════════════
function Menu({ trigger, align, children }) {
    const [open, setOpen] = useState(false);
    const [pos, setPos] = useState(null);
    const triggerRef = useRef(null);
    const popRef = useRef(null);

    // Position the popup (rendered in a body-level portal so it escapes the
    // table's overflow:auto scroll containers and sticky stacking contexts).
    const place = useCallback(() => {
        const t = triggerRef.current;
        if (!t) return;
        const r = t.getBoundingClientRect();
        setPos({ top: r.bottom + 3, left: r.left, right: window.innerWidth - r.right });
    }, []);

    useEffect(() => {
        if (!open) return;
        place();
        const onDown = (e) => {
            if (popRef.current?.contains(e.target) || triggerRef.current?.contains(e.target)) return;
            setOpen(false);
        };
        document.addEventListener("mousedown", onDown);
        window.addEventListener("scroll", place, true);
        window.addEventListener("resize", place);
        return () => {
            document.removeEventListener("mousedown", onDown);
            window.removeEventListener("scroll", place, true);
            window.removeEventListener("resize", place);
        };
    }, [open, place]);

    return (
        <span className="menu-wrap" ref={triggerRef}>
            <button className="menu-trigger" title="Options"
                onClick={(e) => { e.stopPropagation(); setOpen((o) => !o); }}>{trigger || "⋮"}</button>
            {open && pos && createPortal(
                <div ref={popRef} className="menu-pop menu-portal"
                    style={align === "right" ? { top: pos.top, right: pos.right } : { top: pos.top, left: pos.left }}
                    onClick={(e) => e.stopPropagation()}>
                    {typeof children === "function" ? children(() => setOpen(false)) : children}
                </div>, document.body)}
        </span>
    );
}

function TagAdder({ onAdd }) {

    return (
        <div className="tag-add" contentEditable={false}>
            <button className="tag-add-color" style={{ background: c.bg }} title={`color: ${c.name}`}
                onClick={() => setCi((ci + 1) % TAG_COLORS.length)} />
            <input value={text} placeholder="add tag…" onChange={(e) => setText(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); add(); } }} />
            <button className="tag-add-go" onClick={add}>＋</button>
        </div>
    );
}

// ═══════════════════════════════════════
// EDITABLE CELL (uncontrolled contentEditable + save/discard)
// ═══════════════════════════════════════
// We own the DOM after mount and only re-sync innerHTML from props when the
// element is NOT focused. This avoids React resetting the caret to the start
// while typing. Editing is a draft until committed (✓ / blur) or discarded (✕).
function EditableCell({ html, editMode, className, style, colSpan, onCommit, onFocusCell, onDone }) {
    const ref = useRef(null);
    const baseline = useRef(html || "");
    const [focused, setFocused] = useState(false);
    const [pos, setPos] = useState(null);

    useEffect(() => {
        const el = ref.current;
        if (!el || document.activeElement === el) return;
        const next = html || "";
        if (el.innerHTML !== next) el.innerHTML = next;
        baseline.current = next;
    }, [html]);

    const place = useCallback(() => {
        const el = ref.current;
        if (!el) return;
        const r = el.getBoundingClientRect();
        const groupWidth = 56;
        const groupHeight = 26;
        const margin = 8;

        let top = r.top - groupHeight / 2;
        let left = r.right - groupWidth / 2;

        if (top < margin) top = r.top + 4;
        if (top + groupHeight > window.innerHeight - margin) {
            top = Math.max(margin, window.innerHeight - groupHeight - margin);
        }

        left = Math.max(margin, Math.min(left, window.innerWidth - groupWidth - margin));
        setPos({ top, left });
    }, []);

    useEffect(() => {
        if (!focused) return;
        place();
        window.addEventListener("scroll", place, true);
        window.addEventListener("resize", place);
        return () => { window.removeEventListener("scroll", place, true); window.removeEventListener("resize", place); };
    }, [focused, place]);

    const handleFocus = () => {
        baseline.current = ref.current?.innerHTML ?? "";
        setFocused(true);
        onFocusCell?.();
    };
    const handleBlur = () => {
        setFocused(false);
        onCommit(ref.current?.innerHTML ?? "");
    };
    // Buttons use mousedown+preventDefault to keep the caret in the cell;
    // we then blur() to commit and onDone() to drop the selection entirely.
    const save = (e) => { e.preventDefault(); ref.current?.blur(); onDone?.(); };
    const discard = (e) => {
        e.preventDefault();
        if (ref.current) ref.current.innerHTML = baseline.current;
        ref.current?.blur();
        onDone?.();
    };

    return (
        <>
            <td ref={ref} className={className} style={style} colSpan={colSpan}
                contentEditable={editMode} suppressContentEditableWarning
                onFocus={handleFocus} onBlur={handleBlur} />
            {focused && pos && createPortal(
                <div className="cell-tick" style={{ top: pos.top, left: pos.left }}>
                    <button className="ct-btn ct-ok" title="Save changes" onMouseDown={save}>✓</button>
                    <button className="ct-btn ct-no" title="Discard changes" onMouseDown={discard}>✕</button>
                </div>, document.body)}
        </>
    );
}

// ═══════════════════════════════════════
// CELL
// ═══════════════════════════════════════
function Cell({ cell, editMode, selected, rowBg, onSelect, onEditHtml, onTagsChange, onDeselect }) {
    const mode = cell.mode || "text";
    const alignClass = (cell.align || "left") === "center" ? "al-center" : "al-left";
    const cls = `dc ${alignClass}${cell.colspan ? " dc-span" : ""}${selected ? " cell-sel" : ""}`;
    const style = rowBg ? { background: rowBg } : undefined;

    if (mode === "tags") {
        const tags = cell.tags || [];
        return (
            <td className={cls} colSpan={cell.colspan || undefined} style={style} onClick={onSelect}>
                <div className="cell-tags" style={{ justifyContent: (cell.align || "left") === "center" ? "center" : "flex-start" }}>
                    {tags.map((t, i) => (
                        <span key={i} className="tag-chip" style={{ background: t.bg, color: t.fg }}>
                            {t.text}
                            {editMode && <span className="tag-x" title="remove"
                                onClick={(e) => { e.stopPropagation(); onTagsChange(tags.filter((_, k) => k !== i)); }}>✕</span>}
                        </span>
                    ))}
                    {!tags.length && !editMode && <span style={{ color: "var(--text-sec)" }}>—</span>}
                </div>
                {editMode && <TagAdder onAdd={(t) => onTagsChange([...tags, t])} />}
            </td>
        );
    }

    const modeClass = mode === "bullets" ? " cell-bullets" : mode === "boxes" ? " cell-boxes" : "";
    return (
        <EditableCell html={cell.html} editMode={editMode}
            className={`${cls}${modeClass}`} colSpan={cell.colspan || undefined} style={style}
            onCommit={onEditHtml} onFocusCell={onSelect} onDone={onDeselect} />
    );
}

// ═══════════════════════════════════════
// BLUEPRINT ROW
// ═══════════════════════════════════════
function BlueprintRow({ row, editMode, total, selectedCellIdx, onSelect, onCellEdit, onCellTags, onRowAction, onDeselect }) {
    const rowBg = row.customColor || null;
    const isDivider = row.rowType === DIVIDER_TYPE;
    return (
        <tr className={row.rowType || ""}>
            <td className="ll" style={rowBg ? { background: rowBg } : undefined}>
                {editMode && (
                    <span className="row-menu">
                        <Menu trigger="⋮" align="left">
                            {(close) => (
                                <>
                                    <button className="menu-item" onClick={() => { onRowAction("insertAbove"); close(); }}>↑ Insert row above</button>
                                    <button className="menu-item" onClick={() => { onRowAction("insertBelow"); close(); }}>↓ Insert row below</button>
                                    <div className="menu-sep" />
                                    <div className="menu-head">Row type</div>
                                    <select className="menu-select" value={row.rowType || ""} onChange={(e) => onRowAction("type", e.target.value)}>
                                        {ROW_TYPES.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                                    </select>
                                    <div className="menu-head">Background</div>
                                    <div className="swatches">
                                        {ROW_COLORS.map((c) => (
                                            <button key={c} className="swatch" style={{ background: c }} title={c}
                                                onClick={() => onRowAction("color", c)} />
                                        ))}
                                        <label className="swatch sw-custom" title="Custom color…">
                                            <input type="color" className="sw-input"
                                                onChange={(e) => onRowAction("color", e.target.value)} />
                                        </label>
                                        <button className="swatch" title="clear override"
                                            style={{ background: "repeating-linear-gradient(45deg,#fff,#fff 3px,#ddd 3px,#ddd 6px)" }}
                                            onClick={() => onRowAction("color", null)} />
                                    </div>
                                    <div className="menu-sep" />
                                    <button className="menu-item danger" onClick={() => { onRowAction("delete"); close(); }}>🗑 Delete row</button>
                                </>
                            )}
                        </Menu>
                    </span>
                )}
                <span className={editMode ? "hdr-edit" : ""} contentEditable={editMode} suppressContentEditableWarning
                    onBlur={editMode ? (e) => onRowAction("label", e.currentTarget.textContent) : undefined}>
                    {row.laneLabel}
                </span>
            </td>
            {isDivider ? (
                <EditableCell html={(row.cells[0] || {}).html || ""} editMode={editMode}
                    className={`dc dc-span al-center${selectedCellIdx === 0 ? " cell-sel" : ""}`}
                    colSpan={total} style={rowBg ? { background: rowBg } : undefined}
                    onCommit={(html) => onCellEdit(0, html)} onFocusCell={() => onSelect(0)} onDone={onDeselect} />
            ) : (
                row.cells.map((cell, ci) => (
                    <Cell key={ci} cell={cell} editMode={editMode} rowBg={rowBg}
                        selected={ci === selectedCellIdx}
                        onSelect={() => onSelect(ci)}
                        onEditHtml={(html) => onCellEdit(ci, html)}
                        onTagsChange={(tags) => onCellTags(ci, tags)}
                        onDeselect={onDeselect} />
                ))
            )}
        </tr>
    );
}

// ═══════════════════════════════════════
// TEXT COLOR CONTROL (popover of swatches)
// ═══════════════════════════════════════
function TextColorControl({ disabled }) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);
    useEffect(() => {
        if (!open) return;
        const h = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
        document.addEventListener("mousedown", h);
        return () => document.removeEventListener("mousedown", h);
    }, [open]);
    // mousedown + preventDefault keeps the cell's text selection while we recolor it.
    const apply = (color) => (e) => {
        e.preventDefault();
        document.execCommand("styleWithCSS", false, true);
        document.execCommand("foreColor", false, color);
        document.execCommand("styleWithCSS", false, false);
        setOpen(false);
    };
    return (
        <div className="tb-color" ref={ref}>
            <button className="tb-btn" disabled={disabled} title="Text color"
                onMouseDown={(e) => { e.preventDefault(); setOpen((o) => !o); }}><span className="tb-A">A</span></button>
            {open && (
                <div className="color-pop" onMouseDown={(e) => e.preventDefault()}>
                    {TEXT_COLORS.map((c) => (
                        <button key={c} className="swatch" style={{ background: c }} title={c} onMouseDown={apply(c)} />
                    ))}
                </div>
            )}
        </div>
    );
}

// ═══════════════════════════════════════
// FORMAT TOOLBAR (acts on the selected cell)
// ═══════════════════════════════════════
function FormatToolbar({ innerRef, cell, onMode, onAlign }) {
    const disabled = !cell;
    const mode = cell?.mode || "text";
    const align = cell?.align || "left";
    const exec = (cmd) => document.execCommand(cmd, false, null);
    // B/I/U: keep focus in the cell (preventDefault) so execCommand hits its selection.
    const fmt = (cmd) => (e) => { e.preventDefault(); exec(cmd); };
    return (
        <div className="edit-toolbar" ref={innerRef}>
            <span className="tb-label">Cell</span>
            <div className="tb-group">
                <button className={`tb-btn${mode === "text" ? " active" : ""}`} disabled={disabled} onClick={() => onMode("text")}>Text</button>
                <button className={`tb-btn${mode === "bullets" ? " active" : ""}`} disabled={disabled} onClick={() => onMode("bullets")}>• Bullets</button>
                <button className={`tb-btn${mode === "boxes" ? " active" : ""}`} disabled={disabled} onClick={() => onMode("boxes")}>▢ Boxes</button>
                <button className={`tb-btn${mode === "tags" ? " active" : ""}`} disabled={disabled} onClick={() => onMode("tags")}>Tags</button>
            </div>
            <div className="tb-sep" />
            <div className="tb-group">
                <button className={`tb-btn${align === "left" ? " active" : ""}`} disabled={disabled} onClick={() => onAlign("left")} title="Align left">⬅</button>
                <button className={`tb-btn${align === "center" ? " active" : ""}`} disabled={disabled} onClick={() => onAlign("center")} title="Align center">⬄</button>
            </div>
            <div className="tb-sep" />
            <div className="tb-group">
                <button className="tb-btn" disabled={disabled || mode === "tags"} onMouseDown={fmt("bold")} style={{ fontWeight: 800 }}>B</button>
                <button className="tb-btn" disabled={disabled || mode === "tags"} onMouseDown={fmt("italic")} style={{ fontStyle: "italic" }}>I</button>
                <button className="tb-btn" disabled={disabled || mode === "tags"} onMouseDown={fmt("underline")} style={{ textDecoration: "underline" }}>U</button>
                <TextColorControl disabled={disabled || mode === "tags"} />
            </div>
            <span className="tb-hint">
                {disabled ? "Click a cell to format it" : "Text & bullets support ⌘/Ctrl + B / I / U"}
            </span>
        </div>
    );
}

// ═══════════════════════════════════════
// JOURNEY VIEW
// ═══════════════════════════════════════
function JourneyView({ journey, jIdx, editMode, selected, onSelect, onDeselect,
        onTitleEdit, onCellEdit, onCellTags, onRowAction, onStageAction, onAddRow }) {
    const ref = useRef(null);
    const stages = journey.stages;
    const total = totalLeaves(stages);
    const hasSub = stages.some((s) => (s.subStages?.length || 0) > 0);
    const tw = LBL_W + total * COL_W;
    const hdrW = tw + (editMode ? 62 : 0);
    const onStage = (action, payload) => onStageAction(jIdx, action, payload);

    // scroll sync
    useEffect(() => {
        const c = ref.current;
        if (!c) return;
        const els = Array.from(c.querySelectorAll("[data-ss]"));
        if (els.length < 2) return;
        let lock = false;
        const hm = new Map();
        els.forEach((el) => {
            const h = () => {
                if (lock) return;
                lock = true;
                const l = el.scrollLeft;
                els.forEach((o) => { if (o !== el) o.scrollLeft = l; });
                requestAnimationFrame(() => { lock = false; });
            };
            hm.set(el, h);
            el.addEventListener("scroll", h, { passive: true });
        });
        return () => hm.forEach((h, el) => el.removeEventListener("scroll", h));
    }, [journey, editMode]);

    return (
        <div ref={ref}>
            {/* Chapter header */}
            <div className="ch-hdr">
                <h2>
                    <InlineTitleEdit value={journey.title} fallback="Untitled Journey"
                        inputClassName="ch-title-input" onCommit={(value) => onTitleEdit(jIdx, value)} />
                </h2>
            </div>

            {/* Stage header — sticky (two rows when sub-stages exist) */}
            <div className="stage-outer">
                <div className="scroll-hide" data-ss="">
                    <table className="bp" style={{ minWidth: hdrW }}>
                        <tbody>
                            <tr>
                                <td className="ll stg-ll" rowSpan={hasSub ? 2 : 1}>
                                    <span className={editMode ? "hdr-edit" : ""} contentEditable={editMode} suppressContentEditableWarning
                                        onBlur={editMode ? (e) => onStage("setStageLabel", { value: e.currentTarget.textContent }) : undefined}>
                                        {journey.stageLabel}
                                    </span>
                                </td>
                                {stages.map((s, si) => {
                                    const lc = leafCount(s);
                                    const sHasSub = (s.subStages?.length || 0) > 0;
                                    return (
                                        <td key={si} className="stg-c" colSpan={lc}
                                            rowSpan={hasSub && !sHasSub ? 2 : 1}
                                            style={{ minWidth: lc * COL_W }}>
                                            {editMode && (
                                                <Menu trigger="⋮" align="right">
                                                    {(close) => (
                                                        <>
                                                            <button className="menu-item" onClick={() => { onStage("addSubStage", { stageIdx: si }); close(); }}>＋ Add sub-stage</button>
                                                            <button className="menu-item" onClick={() => { onStage("addStage", {}); close(); }}>＋ Add stage (at end)</button>
                                                            <div className="menu-sep" />
                                                            <button className="menu-item danger" onClick={() => { onStage("deleteStage", { stageIdx: si }); close(); }}>🗑 Delete stage</button>
                                                        </>
                                                    )}
                                                </Menu>
                                            )}
                                            {s.num != null && <span className="stage-num">{s.num}</span>}{" "}
                                            <span className={editMode ? "hdr-edit" : ""} contentEditable={editMode} suppressContentEditableWarning
                                                onBlur={editMode ? (e) => onStage("renameStage", { stageIdx: si, value: e.currentTarget.textContent }) : undefined}>
                                                {s.title}
                                            </span>
                                        </td>
                                    );
                                })}
                                {editMode && (
                                    <td className="add-col-c" rowSpan={hasSub ? 2 : 1}>
                                        <button className="add-btn" title="Add stage" onClick={() => onStage("addStage", {})}>＋</button>
                                    </td>
                                )}
                            </tr>
                            {hasSub && (
                                <tr>
                                    {stages.map((s, si) => {
                                        const subs = s.subStages || [];
                                        if (!subs.length) return null;
                                        return subs.map((ss, ssi) => (
                                            <td key={si + "-" + ssi} className="sub-c" style={{ minWidth: COL_W }}>
                                                {editMode && (
                                                    <Menu trigger="⋮" align="right">
                                                        {(close) => (
                                                            <>
                                                                <button className="menu-item" onClick={() => { onStage("addSubStage", { stageIdx: si }); close(); }}>＋ Add sub-stage</button>
                                                                <div className="menu-sep" />
                                                                <button className="menu-item danger" onClick={() => { onStage("deleteSubStage", { stageIdx: si, subIdx: ssi }); close(); }}>🗑 Delete sub-stage</button>
                                                            </>
                                                        )}
                                                    </Menu>
                                                )}
                                                <span className={editMode ? "hdr-edit" : ""} contentEditable={editMode} suppressContentEditableWarning
                                                    onBlur={editMode ? (e) => onStage("renameSubStage", { stageIdx: si, subIdx: ssi, value: e.currentTarget.textContent }) : undefined}>
                                                    {ss.title}
                                                </span>
                                            </td>
                                        ));
                                    })}
                                </tr>
                            )}
                        </tbody>
                    </table>
                </div>
            </div>

            {/* Sub-journeys (rows only; section breaks use divider rows) */}
            {journey.subJourneys.map((sj, si) => (
                <div key={si}>
                    <div className="bpw" data-ss="">
                        <table className="bp" style={{ minWidth: tw }}>
                            <tbody>
                                {sj.rows.map((row, ri) => (
                                    <BlueprintRow key={ri} row={row} editMode={editMode} total={total}
                                        selectedCellIdx={selected && selected.jIdx === jIdx && selected.sjIdx === si && selected.rowIdx === ri ? selected.cellIdx : null}
                                        onSelect={(ci) => onSelect({ jIdx, sjIdx: si, rowIdx: ri, cellIdx: ci })}
                                        onCellEdit={(ci, html) => onCellEdit(jIdx, si, ri, ci, html)}
                                        onCellTags={(ci, tags) => onCellTags(jIdx, si, ri, ci, tags)}
                                        onRowAction={(action, value) => onRowAction(jIdx, si, ri, action, value)}
                                        onDeselect={onDeselect} />
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {editMode && (
                        <div className="add-row-bar">
                            <button className="add-row-btn" onClick={() => onAddRow(jIdx, si)}>＋ Add row</button>
                        </div>
                    )}
                </div>
            ))}
        </div>
    );
}

// ═══════════════════════════════════════
// APP
// ═══════════════════════════════════════
function App() {
    const [journeys, setJourneys] = useState([]);
    const [tab, setTab] = useState(0);
    const [modal, setModal] = useState(false);
    const [projModal, setProjModal] = useState(false);
    const [projects, setProjects] = useState([]);
    const [currentId, setCurrentId] = useState(null);
    const [ready, setReady] = useState(false);
    const [saveState, setSaveState] = useState("idle");
    const [editMode, setEditMode] = useState(false);
    const [selected, setSelected] = useState(null);
    const [lastSaved, setLastSaved] = useState(null);
    const legendRef = useRef(null);
    const toolbarRef = useRef(null);
    const saveTimer = useRef(null);
    const lastSavedRef = useRef(null);
    // Mirror of `journeys` kept in sync synchronously so export/save always
    // read the latest value (contentEditable onBlur fires before button clicks).
    const journeysRef = useRef([]);

    const updateJourneys = useCallback((next) => {
        journeysRef.current = typeof next === "function" ? next(journeysRef.current) : next;
        setJourneys(journeysRef.current);
    }, []);

    const refreshProjects = useCallback(async () => {
        setProjects(await dbListProjects());
    }, []);

    const currentName = projects.find((p) => p.id === currentId)?.name || null;

    // ── Init: load project list + reopen last project ──
    useEffect(() => {
        (async () => {
            const list = await dbListProjects();
            setProjects(list);
            const last = Number(localStorage.getItem(LAST_KEY));
            const open = list.find((p) => p.id === last) || list[0];
            if (open) {
                setCurrentId(open.id);
                updateJourneys(hydrate(open.journeys || []));
                setLastSaved(open.updatedAt || null);
                localStorage.setItem(LAST_KEY, String(open.id));
            }
            setReady(true);
        })();
    }, [updateJourneys]);

    // ── Autosave current project (debounced) ──
    useEffect(() => {
        if (!ready || currentId == null) return;
        setSaveState("saving");
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => {
            dbSaveJourneys(currentId, journeysRef.current)
                .then(refreshProjects)
                .then(() => { setSaveState("saved"); setLastSaved(Date.now()); });
        }, 600);
        return () => clearTimeout(saveTimer.current);
    }, [journeys, currentId, ready, refreshProjects]);

    // ── Load data (JSON array / exported project) ──
    const loadFromText = useCallback(async (text) => {
        const parsed = parseInput(text);
        const data = hydrate(parsed.journeys);
        if (!data.length) throw new Error("No valid journey data found.");
        let id = currentId;
        if (id == null) {
            const name = parsed.name || defaultName(projects);
            id = await dbCreateProject(name, data);
            setCurrentId(id);
            localStorage.setItem(LAST_KEY, String(id));
        }
        updateJourneys(data);
        setTab(0);
        await refreshProjects();
        console.log(`%c✅ Loaded ${data.length} service journey(s)`, "color:#2e7d32;font-weight:bold;font-size:14px");
    }, [currentId, projects, refreshProjects, updateJourneys]);

    // ── Immutable updaters ──
    const editJourney = useCallback((jIdx, fn) => {
        updateJourneys((prev) => {
            const j = prev[jIdx];
            if (!j) return prev;
            const nj = fn(j);
            if (nj === j) return prev;
            const next = prev.slice();
            next[jIdx] = nj;
            return next;
        });
    }, [updateJourneys]);

    // Mutate a single cell via `fn(cellCopy) -> cell`.
    const editCell = useCallback((jIdx, sjIdx, rowIdx, cellIdx, fn) => {
        editJourney(jIdx, (j) => {
            const cur = j.subJourneys?.[sjIdx]?.rows?.[rowIdx]?.cells?.[cellIdx];
            if (!cur) return j;
            const nc = fn({ ...cur });
            if (nc === cur) return j;
            const sjs = j.subJourneys.slice();
            const sj = { ...sjs[sjIdx], rows: sjs[sjIdx].rows.slice() };
            const row = { ...sj.rows[rowIdx], cells: sj.rows[rowIdx].cells.slice() };
            row.cells[cellIdx] = nc;
            sj.rows[rowIdx] = row;
            sjs[sjIdx] = sj;
            return { ...j, subJourneys: sjs };
        });
    }, [editJourney]);

    // ── Cell handlers ──
    const handleCellEdit = useCallback((jIdx, sjIdx, rowIdx, cellIdx, html) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, (c) => (c.html === html ? c : { ...c, html })), [editCell]);
    const handleCellTags = useCallback((jIdx, sjIdx, rowIdx, cellIdx, tags) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, (c) => ({ ...c, tags })), [editCell]);
    const handleCellMode = useCallback((jIdx, sjIdx, rowIdx, cellIdx, mode) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, (c) => ({ ...c, mode, ...(mode === "tags" && !c.tags ? { tags: [] } : {}) })), [editCell]);
    const handleCellAlign = useCallback((jIdx, sjIdx, rowIdx, cellIdx, align) =>
        editCell(jIdx, sjIdx, rowIdx, cellIdx, (c) => ({ ...c, align })), [editCell]);

    // ── Row handlers ──
    const handleRowAction = useCallback((jIdx, sjIdx, rowIdx, action, value) => {
        editJourney(jIdx, (j) => {
            const total = totalLeaves(j.stages);
            const sjs = j.subJourneys.slice();
            const sj = { ...sjs[sjIdx], rows: sjs[sjIdx].rows.slice() };
            const rows = sj.rows;
            if (action === "delete") rows.splice(rowIdx, 1);
            else if (action === "insertAbove") rows.splice(rowIdx, 0, newRow(total));
            else if (action === "insertBelow") rows.splice(rowIdx + 1, 0, newRow(total));
            else if (action === "type") {
                const cur = rows[rowIdx];
                const wasDivider = cur.rowType === DIVIDER_TYPE;
                const willDivider = value === DIVIDER_TYPE;
                let cells = cur.cells;
                if (willDivider && !wasDivider) cells = collapseDivider(cells, total);
                else if (!willDivider && wasDivider) cells = expandDivider(cells, total);
                rows[rowIdx] = { ...cur, rowType: value, cells };
            }
            else if (action === "color") rows[rowIdx] = { ...rows[rowIdx], customColor: value || undefined };
            else if (action === "label") {
                if (rows[rowIdx].laneLabel === value) return j;
                rows[rowIdx] = { ...rows[rowIdx], laneLabel: value };
            } else return j;
            sj.rows = rows;
            sjs[sjIdx] = sj;
            return { ...j, subJourneys: sjs };
        });
    }, [editJourney]);

    const handleAddRow = useCallback((jIdx, sjIdx) => {
        editJourney(jIdx, (j) => {
            const sjs = j.subJourneys.slice();
            sjs[sjIdx] = { ...sjs[sjIdx], rows: [...sjs[sjIdx].rows, newRow(totalLeaves(j.stages))] };
            return { ...j, subJourneys: sjs };
        });
    }, [editJourney]);

    // ── Stage / sub-stage (column) handlers ──
    const handleStageAction = useCallback((jIdx, action, payload) => {
        editJourney(jIdx, (j) => {
            const stages = j.stages.map((s) => ({ ...s, subStages: (s.subStages || []).slice() }));
            const mapRows = (fn) => j.subJourneys.map((sj) => ({
                ...sj, rows: sj.rows.map((r) => ({ ...r, cells: fn(r.cells) })),
            }));

            if (action === "addStage") {
                stages.push({ title: "New Stage", subStages: [] });
                return { ...j, stages, subJourneys: mapRows((cells) => [...cells, newCell()]) };
            }
            if (action === "deleteStage") {
                const { stageIdx } = payload;
                if (stages.length <= 1) { alert("A journey needs at least one stage."); return j; }
                const start = leafStart(j.stages, stageIdx);
                const cnt = leafCount(j.stages[stageIdx]);
                stages.splice(stageIdx, 1);
                return { ...j, stages, subJourneys: mapRows((cells) => {
                    let c = cells;
                    for (let k = 0; k < cnt; k++) c = removeLeafFromRow(c, start);
                    return c;
                }) };
            }
            if (action === "addSubStage") {
                const { stageIdx } = payload;
                const before = stages[stageIdx].subStages.length;
                stages[stageIdx].subStages.push({ title: "New" });
                const oldL = Math.max(before, 1), newL = Math.max(before + 1, 1);
                if (newL > oldL) {
                    const gi = leafStart(j.stages, stageIdx) + oldL;
                    return { ...j, stages, subJourneys: mapRows((cells) => insertLeafIntoRow(cells, gi)) };
                }
                return { ...j, stages };
            }
            if (action === "deleteSubStage") {
                const { stageIdx, subIdx } = payload;
                const before = stages[stageIdx].subStages.length;
                stages[stageIdx].subStages.splice(subIdx, 1);
                const oldL = Math.max(before, 1), newL = Math.max(before - 1, 1);
                if (newL < oldL) {
                    const gi = leafStart(j.stages, stageIdx) + Math.min(subIdx, oldL - 1);
                    return { ...j, stages, subJourneys: mapRows((cells) => removeLeafFromRow(cells, gi)) };
                }
                return { ...j, stages };
            }
            if (action === "renameStage") { stages[payload.stageIdx] = { ...stages[payload.stageIdx], title: payload.value }; return { ...j, stages }; }
            if (action === "renameSubStage") {
                stages[payload.stageIdx].subStages[payload.subIdx] = { ...stages[payload.stageIdx].subStages[payload.subIdx], title: payload.value };
                return { ...j, stages };
            }
            if (action === "setStageLabel") {
                if (j.stageLabel === payload.value) return j;
                return { ...j, stageLabel: payload.value };
            }
            return j;
        });
    }, [editJourney]);

    // ── Project actions ──
    const openProject = useCallback(async (id) => {
        const p = await dbGetProject(id);
        if (!p) return;
        setCurrentId(id);
        updateJourneys(hydrate(p.journeys || []));
        setLastSaved(p.updatedAt || null);
        setTab(0);
        localStorage.setItem(LAST_KEY, String(id));
        setProjModal(false);
    }, [updateJourneys]);

    const deleteProject = useCallback(async (id, name) => {
        if (!confirm(`Delete project "${name}"?\nThis permanently removes its saved data and cannot be undone.`)) return;
        await dbDeleteProject(id);
        if (id === currentId) {
            const remaining = (await dbListProjects());
            const fallback = remaining[0];
            if (fallback) {
                setCurrentId(fallback.id);
                updateJourneys(hydrate(fallback.journeys || []));
                localStorage.setItem(LAST_KEY, String(fallback.id));
            } else {
                setCurrentId(null);
                updateJourneys([]);
                localStorage.removeItem(LAST_KEY);
            }
            setTab(0);
        }
        await refreshProjects();
    }, [currentId, refreshProjects, updateJourneys]);

    const renameProject = useCallback(async (id, name) => {
        const nn = prompt("Rename project", name);
        if (nn == null || !nn.trim()) return;
        await dbRenameProject(id, nn.trim());
        await refreshProjects();
    }, [refreshProjects]);

    const renameCurrentProject = useCallback(async (name) => {
        if (currentId == null || !name.trim()) return;
        await dbRenameProject(currentId, name.trim());
        await refreshProjects();
    }, [currentId, refreshProjects]);

    const renameJourneyTitle = useCallback((jIdx, title) => {
        editJourney(jIdx, (j) => {
            const nextTitle = title.trim();
            if (!nextTitle || j.title === nextTitle) return j;
            return { ...j, title: nextTitle };
        });
    }, [editJourney]);

    const newProject = useCallback(async () => {
        const name = prompt("New project name", defaultName(projects));
        if (name == null) return;
        const id = await dbCreateProject(name.trim() || defaultName(projects), []);
        setCurrentId(id);
        updateJourneys([]);
        setTab(0);
        localStorage.setItem(LAST_KEY, String(id));
        await refreshProjects();
        setProjModal(false);
        setModal(true); // prompt to load data into the fresh project
    }, [projects, refreshProjects, updateJourneys]);

    const newBlankJourney = useCallback(async () => {
        const journey = createBlankJourney(journeysRef.current.length);
        let id = currentId;
        if (id == null) {
            id = await dbCreateProject("Blank Service Journey", [journey]);
            setCurrentId(id);
            localStorage.setItem(LAST_KEY, String(id));
            updateJourneys([journey]);
            setTab(0);
            await refreshProjects();
            return;
        }
        updateJourneys((prev) => {
            const next = [...prev, journey];
            setTab(next.length - 1);
            return next;
        });
    }, [currentId, refreshProjects, updateJourneys]);

    // ── Export full project state ──
    const exportProject = useCallback(() => {
        const data = journeysRef.current;
        if (!data.length) return;
        const payload = {
            type: "service-journey-mapper",
            version: 1,
            name: currentName || "Service Journeys",
            exportedAt: new Date().toISOString(),
            lastSavedAt: lastSavedRef.current ? new Date(lastSavedRef.current).toISOString() : null,
            journeys: data,
        };
        downloadFile(safeName(currentName) + ".json", JSON.stringify(payload, null, 2), "application/json");
    }, [currentName]);

    // Expose to console
    useEffect(() => {
        window.loadJSON = loadFromText;
        window.exportProject = exportProject;
        return () => { delete window.loadJSON; delete window.exportProject; };
    }, [loadFromText, exportProject]);

    // Legend height → CSS var
    useEffect(() => {
        const el = legendRef.current;
        if (!el) return;
        const update = () => document.documentElement.style.setProperty("--legend-h", el.offsetHeight + "px");
        update();
        const ro = new ResizeObserver(update);
        ro.observe(el);
        return () => ro.disconnect();
    }, []);

    // Format-toolbar height → CSS var (so the sticky stage header sits below it)
    useEffect(() => {
        const root = document.documentElement;
        const el = toolbarRef.current;
        if (!editMode || !el) { root.style.setProperty("--toolbar-h", "0px"); return; }
        const update = () => root.style.setProperty("--toolbar-h", el.offsetHeight + "px");
        update();
        const ro = new ResizeObserver(update);
        ro.observe(el);
        return () => { ro.disconnect(); root.style.setProperty("--toolbar-h", "0px"); };
    }, [editMode]);

    // Leaving edit mode clears the cell selection.
    useEffect(() => { if (!editMode) setSelected(null); }, [editMode]);

    // Mirror lastSaved into a ref so export reads the latest value.
    useEffect(() => { lastSavedRef.current = lastSaved; }, [lastSaved]);

    // The cell the format toolbar currently targets.
    const selectedCell = selected
        ? journeys[selected.jIdx]?.subJourneys?.[selected.sjIdx]?.rows?.[selected.rowIdx]?.cells?.[selected.cellIdx]
        : null;

    return (
        <>
            <TopBar innerRef={legendRef} currentName={currentName}
                onRenameCurrent={renameCurrentProject}
                onProjects={() => setProjModal(true)} onExport={exportProject}
                canExport={journeys.length > 0} saveState={saveState} lastSaved={lastSaved}
                editMode={editMode} onToggleEdit={() => setEditMode((e) => !e)} />
            {editMode && journeys.length > 0 && (
                <FormatToolbar innerRef={toolbarRef} cell={selectedCell}
                    onMode={(m) => selected && handleCellMode(selected.jIdx, selected.sjIdx, selected.rowIdx, selected.cellIdx, m)}
                    onAlign={(a) => selected && handleCellAlign(selected.jIdx, selected.sjIdx, selected.rowIdx, selected.cellIdx, a)} />
            )}
            <main className="main-content">
                {journeys.length === 0 ? (
                    <EmptyState onNew={newBlankJourney} onLoad={() => setModal(true)} />
                ) : (
                    journeys.map((j, i) => (
                        <div key={j.id + "-" + i} style={{ display: i === tab ? "block" : "none" }}>
                            <JourneyView journey={j} jIdx={i} editMode={editMode}
                                selected={selected} onSelect={setSelected} onDeselect={() => setSelected(null)}
                                onTitleEdit={renameJourneyTitle}
                                onCellEdit={handleCellEdit} onCellTags={handleCellTags}
                                onRowAction={handleRowAction} onStageAction={handleStageAction}
                                onAddRow={handleAddRow} />
                        </div>
                    ))
                )}
            </main>
            <TabBar journeys={journeys} activeTab={tab} setActiveTab={setTab}
                onNew={newBlankJourney} onLoad={() => setModal(true)} />
            {modal && <LoadModal onLoad={loadFromText} onClose={() => setModal(false)} />}
            {projModal && <ProjectManager projects={projects} currentId={currentId}
                onOpen={openProject} onDelete={deleteProject} onRename={renameProject}
                onNew={newProject} onClose={() => setProjModal(false)} />}
        </>
    );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
